{% set tpl = ix_lib.base.render.Render(values) %}

{% set c1 = tpl.add_container(values.consts.newt_container_name, "image") %}
{% do c1.healthcheck.set_custom_test(["CMD", "test", "-f", values.consts.health_file_path]) %}

{% do c1.set_user(values.run_as.user, values.run_as.group) %}

{% if values.newt.docker_socket %}
  {% do c1.environment.add_env("DOCKER_SOCKET", "unix:///var/run/docker.sock") %}
  {% do c1.add_docker_socket(read_only=true) %}
{% endif %}

{% do c1.environment.add_env("PANGOLIN_ENDPOINT", values.newt.pangolin_endpoint) %}
{% do c1.environment.add_env("NEWT_ID", values.newt.newt_id) %}
{% do c1.environment.add_env("NEWT_SECRET", values.newt.newt_secret) %}
{% do c1.environment.add_env("CONFIG_FILE", values.consts.config_file_path) %}
{% do c1.environment.add_env("HEALTH_FILE", values.consts.health_file_path) %}
{% do c1.environment.add_user_envs(values.newt.additional_envs) %}

{% for store in values.storage.additional_storage %}
  {% do c1.add_storage(store.mount_path, store) %}
{% endfor %}

{{ tpl.render() | tojson }}
