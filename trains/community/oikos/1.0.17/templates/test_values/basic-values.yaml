resources:
  limits:
    cpus: 2.0
    memory: 4096

oikos:
  session_secret: "dummy_session_secret_for_ci_testing_only_0123456789"
  db_encryption_key: ""
  additional_envs: []

network:
  host_network: false
  web_port:
    bind_mode: published
    port_number: 8080

run_as:
  user: 568
  group: 568

ix_volumes:
  data: /opt/tests/mnt/oikos/data
  backups: /opt/tests/mnt/oikos/backups

storage:
  data:
    type: ix_volume
    ix_volume_config:
      dataset_name: data
      create_host_path: true
  backups:
    type: ix_volume
    ix_volume_config:
      dataset_name: backups
      create_host_path: true
  additional_storage: []
