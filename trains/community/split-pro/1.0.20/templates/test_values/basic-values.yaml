resources:
  limits:
    cpus: 2
    memory: 4096

TZ: Etc/UTC

splitpro:
  postgres_image_selector: postgres_18_image
  db_password: test-password-123
  nextauth_secret: exactly32-chars-a-zA-Z0-9symbols
  nextauth_url: http://localhost:8080
  additional_envs: []

run_as:
  user: 568
  group: 568

network:
  web_port:
    bind_mode: published
    port_number: 8080

ix_volumes:
  postgres_data: /opt/tests/mnt/split-pro/postgres
  uploads: /opt/tests/mnt/split-pro/uploads

storage:
  uploads:
    type: ix_volume
    ix_volume_config:
      dataset_name: uploads
      create_host_path: true
  postgres_data:
    type: ix_volume
    ix_volume_config:
      dataset_name: postgres_data
      create_host_path: true
  additional_storage: []
