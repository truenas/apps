resources:
  limits:
    cpus: 2.0
    memory: 4096

cloudreve:
  postgres_image_selector: postgres_18_image
  db_password: secret
  redis_password: secret
  enable_fts: true
  meilisearch_master_key: masterkey
  additional_envs: []

run_as:
  user: 568
  group: 568

network:
  web_port:
    bind_mode: published
    port_number: 8080

ix_volumes:
  data: /opt/tests/mnt/cloudreve/data
  meili_data: /opt/tests/mnt/cloudreve/meili_data
  postgres_data: /opt/tests/mnt/cloudreve/postgres_data

storage:
  data:
    type: ix_volume
    ix_volume_config:
      dataset_name: data
      create_host_path: true
  meili_data:
    type: ix_volume
    ix_volume_config:
      dataset_name: meili_data
      create_host_path: true
  postgres_data:
    type: ix_volume
    ix_volume_config:
      dataset_name: postgres_data
      create_host_path: true
  additional_storage: []
