resources:
  limits:
    cpus: 2.0
    memory: 4096

pulsarr:
  allow_iframes: false
  cookie_secured: false
  authentication: "requiredExceptLocal"
  additional_envs: []

network:
  host_network: false
  web_port:
    bind_mode: published
    port_number: 8080

run_as:
  user: 568
  group: 568

ix_volumes:
  app_data: /opt/tests/mnt/pulsarr/app_data

storage:
  app_data:
    type: ix_volume
    ix_volume_config:
      dataset_name: app_data
      create_host_path: true
  additional_storage: []
