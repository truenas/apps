resources:
  limits:
    cpus: 2.0
    memory: 4096

TZ: Etc/UTC
bookorbit:
  postgres_image_selector: postgres_18_image
  db_password: some-secret-password
  jwt_secret: some-secret-jwt-secret
  bootstrap_token: some-secret-bookstrap-token
  additional_envs: []

network:
  web_port:
    bind_mode: published
    port_number: 8080

run_as:
  user: 568
  group: 568

ix_volumes:
  data: /opt/tests/mnt/bookorbit/data
  books: /opt/tests/mnt/bookorbit/books
  book_drop: /opt/tests/mnt/bookorbit/book-drop
  postgres_data: /opt/tests/mnt/bookorbit/postgres-data

storage:
  data:
    type: ix_volume
    ix_volume_config:
      dataset_name: data
      create_host_path: true
  books:
    type: ix_volume
    ix_volume_config:
      dataset_name: books
      create_host_path: true
  book_drop:
    type: ix_volume
    ix_volume_config:
      dataset_name: book_drop
      create_host_path: true
  postgres_data:
    type: ix_volume
    ix_volume_config:
      dataset_name: postgres_data
      create_host_path: true
  additional_storage: []
