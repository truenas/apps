{% set tpl = ix_lib.base.render.Render(values) %}

{% set sure_net = tpl.networks.create_internal("sure-net") %}

{% set web = tpl.add_container(values.consts.web_container_name, "image") %}
{% do web.add_network(sure_net) %}

{% set worker = tpl.add_container(values.consts.worker_container_name, "image") %}
{% do worker.add_network(sure_net) %}

{% set perm_container = tpl.deps.perms(values.consts.perms_container_name) %}
{% set perms_config = {"uid": values.consts.run_as_user, "gid": values.consts.run_as_group, "mode": "check"} %}

{# Postgres #}
{% set pg_config = {
  "user": values.consts.db_user,
  "password": values.sure.db_password,
  "database": values.consts.db_name,
  "volume": values.storage.postgres_data,
} %}
{% set postgres = tpl.deps.postgres(values.consts.postgres_container_name, values.sure.postgres_image_selector, pg_config, perm_container) %}
{% do postgres.container.add_network(sure_net) %}

{# Redis #}
{% set redis_config = {
  "password": values.sure.redis_password,
  "volume": tpl.funcs.temp_config("redis_data"),
} %}
{% set redis = tpl.deps.redis(values.consts.redis_container_name, "redis_image", redis_config, perm_container) %}
{% do redis.container.add_network(sure_net) %}

{% do web.environment.add_env("PORT", values.network.web_port.port_number) %}
{% do web.healthcheck.set_test("curl", {"port": values.network.web_port.port_number, "path": "/up"}) %}

{% do worker.set_command(["bundle", "exec", "sidekiq"]) %}
{% do worker.healthcheck.set_test("pgrep", {"process": "sidekiq"}) %}
{% do worker.depends.add_dependency(values.consts.web_container_name, "service_healthy") %}

{% for c in [web, worker] %}
  {% do c.set_user(values.consts.run_as_user, values.consts.run_as_group) %}
  {% do c.depends.add_dependency(values.consts.postgres_container_name, "service_healthy") %}
  {% do c.depends.add_dependency(values.consts.redis_container_name, "service_healthy") %}

  {% do c.environment.add_env("RAILS_ENV", "production") %}
  {% do c.environment.add_env("SELF_HOSTED", true) %}
  {% do c.environment.add_env("DB_HOST", values.consts.postgres_container_name) %}
  {% do c.environment.add_env("DB_PORT", postgres.get_port()) %}
  {% do c.environment.add_env("POSTGRES_USER", values.consts.db_user) %}
  {% do c.environment.add_env("POSTGRES_PASSWORD", values.sure.db_password) %}
  {% do c.environment.add_env("POSTGRES_DB", values.consts.db_name) %}
  {% do c.environment.add_env("REDIS_URL", redis.get_url("redis")) %}
  {% do c.environment.add_env("SECRET_KEY_BASE", values.sure.secret_key_base) %}

  {% do c.environment.add_env("RAILS_FORCE_SSL", false) %}
  {% do c.environment.add_env("RAILS_ASSUME_SSL", false) %}

  {% do c.environment.add_user_envs(values.sure.additional_envs) %}

  {% do c.add_storage("/rails/storage", values.storage.data) %}

  {% for store in values.storage.additional_storage %}
    {% do c.add_storage(store.mount_path, store) %}
  {% endfor %}
{% endfor %}

{% do perm_container.add_or_skip_action("data", values.storage.data, perms_config) %}
{% for store in values.storage.additional_storage %}
  {% do perm_container.add_or_skip_action(store.mount_path, store, perms_config) %}
{% endfor %}

{% do web.add_port(values.network.web_port) %}

{% if perm_container.has_actions() %}
  {% do perm_container.activate() %}
  {% do postgres.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
  {% do redis.container.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
  {% do web.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
  {% do worker.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
{% endif %}

{% do tpl.portals.add(values.network.web_port) %}

{{ tpl.render() | tojson }}
