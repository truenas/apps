resources:
  limits:
    cpus: 2.0
    memory: 4096

TZ: Etc/UTC

sure:
  postgres_image_selector: postgres_18_image
  db_password: secret
  redis_password: secret
  secret_key_base: secret-longer-than-32-chars-a-zA-Z0-9symbols
  additional_envs:
    - name: RAILS_LOG_LEVEL
      value: info

network:
  web_port:
    bind_mode: published
    port_number: 8080

ix_volumes:
  postgres_data: /opt/tests/mnt/sure/postgres_data
  data: /opt/tests/mnt/sure/data

storage:
  postgres_data:
    type: ix_volume
    ix_volume_config:
      dataset_name: postgres_data
      create_host_path: true
  data:
    type: ix_volume
    ix_volume_config:
      dataset_name: data
      create_host_path: true
  additional_storage: []
