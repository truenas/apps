resources:
  limits:
    cpus: 2.0
    memory: 4096

TZ: Etc/UTC

ae_netscope:
  postgres_image_selector: postgres_18_image
  db_password: test-db-password
  redis_password: test-redis-password
  session_secret: test-session-secret-change-me-32-bytes-minimum
  app_url: http://127.0.0.1:30080
  https_mode: false
  additional_envs: []

run_as:
  user: 568
  group: 568

network:
  web_port:
    bind_mode: published
    port_number: 8080

ix_volumes:
  postgres_data: /opt/tests/mnt/ae-netscope/postgres-data

storage:
  postgres_data:
    type: ix_volume
    ix_volume_config:
      dataset_name: postgres_data
      create_host_path: true
  additional_storage: []
