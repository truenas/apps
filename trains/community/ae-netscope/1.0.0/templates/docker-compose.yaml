{% set tpl = ix_lib.base.render.Render(values) %}

{% set ae_net = tpl.networks.create_internal("ae-netscope-net") %}

{% set c1 = tpl.add_container(values.consts.ae_netscope_container_name, "image") %}
{% set perm_container = tpl.deps.perms(values.consts.perms_container_name) %}
{% set perms_config = {"uid": values.run_as.user, "gid": values.run_as.group, "mode": "check"} %}

{% set pg_config = {
  "user": values.consts.db_user,
  "password": values.ae_netscope.db_password,
  "database": values.consts.db_name,
  "volume": values.storage.postgres_data,
} %}
{% set postgres = tpl.deps.postgres(values.consts.postgres_container_name, values.ae_netscope.postgres_image_selector, pg_config, perm_container) %}
{% do postgres.container.add_network(ae_net) %}

{% set redis_config = {
  "password": values.ae_netscope.redis_password,
  "volume": {"type": "temporary", "volume_config": {"volume_name": "redis-data"}},
} %}
{% set redis = tpl.deps.redis(values.consts.redis_container_name, "redis_image", redis_config, perm_container) %}
{% do redis.container.add_network(ae_net) %}

{% set app_url = values.ae_netscope.app_url.rstrip("/") %}

{% do c1.add_network(ae_net) %}
{% do c1.set_user(values.run_as.user, values.run_as.group) %}
{% do c1.depends.add_dependency(values.consts.postgres_container_name, "service_healthy") %}
{% do c1.depends.add_dependency(values.consts.redis_container_name, "service_healthy") %}
{% do c1.healthcheck.set_test("http", {"port": values.consts.internal_web_port, "path": "/api/health/live"}) %}

{% do c1.environment.add_env("APP_ENV", "production") %}
{% do c1.environment.add_env("APP_NAME", "AE NetScope") %}
{% do c1.environment.add_env("APP_URL", app_url) %}
{% do c1.environment.add_env("APP_WEB_DIST_DIR", "/app/web") %}
{% do c1.environment.add_env("API_CORS_ORIGINS", app_url) %}
{% do c1.environment.add_env("POSTGRES_HOST", values.consts.postgres_container_name) %}
{% do c1.environment.add_env("POSTGRES_PORT", postgres.get_port()) %}
{% do c1.environment.add_env("POSTGRES_DB", values.consts.db_name) %}
{% do c1.environment.add_env("POSTGRES_USER", values.consts.db_user) %}
{% do c1.environment.add_env("POSTGRES_PASSWORD", values.ae_netscope.db_password) %}
{% do c1.environment.add_env("REDIS_HOST", values.consts.redis_container_name) %}
{% do c1.environment.add_env("REDIS_PORT", redis.get_port()) %}
{% do c1.environment.add_env("REDIS_DB", 0) %}
{% do c1.environment.add_env("REDIS_PASSWORD", values.ae_netscope.redis_password) %}
{% do c1.environment.add_env("SESSION_SECRET", values.ae_netscope.session_secret) %}
{% do c1.environment.add_env("SESSION_COOKIE_SECURE", values.ae_netscope.https_mode) %}
{% do c1.environment.add_env("SECURITY_HSTS_ENABLED", values.ae_netscope.https_mode) %}
{% do c1.environment.add_user_envs(values.ae_netscope.additional_envs) %}

{% do c1.add_port(values.network.web_port, {"container_port": values.consts.internal_web_port}) %}

{% for store in values.storage.additional_storage %}
  {% do c1.add_storage(store.mount_path, store) %}
  {% do perm_container.add_or_skip_action(store.mount_path, store, perms_config) %}
{% endfor %}

{% if perm_container.has_actions() %}
  {% do perm_container.activate() %}
  {% do c1.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
  {% do postgres.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
  {% do redis.container.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
{% endif %}

{% do tpl.portals.add(values.network.web_port) %}

{{ tpl.render() | tojson }}
