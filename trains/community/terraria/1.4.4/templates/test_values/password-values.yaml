resources:
  limits:
    cpus: 2.0
    memory: 4096

ci: true

terraria:
  world_seed: ""
  world_file_name: world.wld
  world_evil: random
  world_size: 1
  world_difficulty: 0
  max_players: 8
  password: some-password
  secure: false
  force_update: false
  additional_args: []
  additional_envs: []

network:
  host_network: false
  server_port:
    bind_mode: published
    port_number: 8080

ix_volumes:
  config: /opt/tests/mnt/terraria/config
  world: /opt/tests/mnt/terraria/world

storage:
  config:
    type: ix_volume
    ix_volume_config:
      dataset_name: config
      create_host_path: true
  world:
    type: ix_volume
    ix_volume_config:
      dataset_name: world
      create_host_path: true
  additional_storage: []
