{% from "macros/setup.sh" import fetch_cli, seed %}

{% set tpl = ix_lib.base.render.Render(values) %}

{% set c1 = tpl.add_container(values.consts.stalwart_container_name, "image") %}
{% set init = tpl.add_container(values.consts.init_container_name, "cli_image") %}
{% set config = tpl.add_container(values.consts.config_container_name, "image") %}
{% set perm_container = tpl.deps.perms(values.consts.perms_container_name) %}
{% set perms_config = {"uid": values.run_as.user, "gid": values.run_as.group, "mode": "check"} %}

{# Shared volume holding the separately-distributed stalwart-cli binary (not shipped in the server image). #}
{% set cli_vol = {"type": "temporary", "volume_config": {"volume_name": "stalwart-cli"}} %}

{# ---- init: fetch the stalwart-cli binary into the shared volume (needs network access) ---- #}
{% do init.setup_as_helper(disable_network=false) %}
{% do init.configs.add("init", fetch_cli(values), "/init.sh", "0755") %}
{% do init.set_entrypoint(["/init.sh"]) %}
{% do init.add_storage(values.consts.cli_dir, cli_vol) %}

{# Declarative listener plan consumed by `stalwart-cli apply`. We destroy only the listeners we
   manage (by name) so disabling a port removes its listener while leaving listeners the user
   created in the WebUI untouched, then (re)create the ones that are enabled. #}
{% set listeners = [
  ("http", values.network.http_port, "http", false),
  ("https", values.network.https_port, "http", true),
  ("smtp", values.network.smtp_port, "smtp", false),
  ("submission", values.network.submission_port, "smtp", false),
  ("submissions", values.network.submissions_port, "smtp", true),
  ("imap", values.network.imap_port, "imap", false),
  ("imaptls", values.network.imaps_port, "imap", true),
  ("pop3", values.network.pop3_port, "pop3", false),
  ("pop3s", values.network.pop3s_port, "pop3", true),
  ("sieve", values.network.sieve_port, "manageSieve", false),
] %}
{% set plan = namespace(x=[]) %}
{% for name, port, proto, tls in listeners %}
  {% set name = "tn-%s"|format(name) %}
  {% do plan.x.append({"@type": "destroy", "object": "NetworkListener", "value": {"name": name}}) %}

  {% if not port.bind_mode %}{% continue %}{% endif %}
  {% set bind = {"0.0.0.0:%d"|format(port.port_number): true} %}
  {% do plan.x.append({
    "@type": "create", "object": "NetworkListener",
    "value": {
      name: {"name": name, "bind": bind,"protocol": proto, "useTls": tls, "tlsImplicit": tls},
    },
  }) %}
{% endfor %}

{# ---- config: seed the database via recovery mode + `stalwart-cli apply` ---- #}
{% set config_json = {"@type":"RocksDb","path": "%s/data"|format(values.consts.data_path)} %}
{% do config.setup_as_helper() %}
{% do config.add_caps(["NET_BIND_SERVICE"]) %}
{% do config.configs.add("config_json", config_json | tojson, values.consts.config_file, "0644") %}
{% do config.configs.add("plan", plan.x | map("tojson") | join("\n"), values.consts.plan_file, "0644") %}
{% do config.configs.add("seed", seed(values), "/seed.sh", "0755") %}
{% do config.set_entrypoint(["/seed.sh"]) %}
{% do config.set_user(values.run_as.user, values.run_as.group) %}
{% do config.add_storage(values.consts.data_path, values.storage.data) %}
{% do config.add_storage(values.consts.cli_dir, cli_vol) %}
{% do config.depends.add_dependency(values.consts.init_container_name, "service_completed_successfully") %}

{# ---- main stalwart server (image default: stalwart --config /etc/stalwart/config.json) ---- #}
{% do c1.add_caps(["NET_BIND_SERVICE"]) %}
{% do c1.set_user(values.run_as.user, values.run_as.group) %}
{% do c1.add_storage(values.consts.data_path, values.storage.data) %}
{% do c1.configs.add("config_json", config_json | tojson, values.consts.config_file, "0644") %}
{% do c1.depends.add_dependency(values.consts.config_container_name, "service_completed_successfully") %}
{% do c1.healthcheck.set_test("curl", {"port": values.network.http_port.port_number, "path": "/healthz/live", "headers": [("X-Forwarded-For", "127.0.0.1")]}) %}
{% if values.stalwart.recovery_user %}
  {% do c1.environment.add_env("STALWART_RECOVERY_ADMIN", "%s:%s"|format(values.stalwart.recovery_user, values.stalwart.recovery_pass)) %}
{% endif %}
{% do c1.environment.add_user_envs(values.stalwart.additional_envs) %}

{% do c1.add_port(values.network.http_port) %}
{% do c1.add_port(values.network.https_port) %}
{% do c1.add_port(values.network.smtp_port) %}
{% do c1.add_port(values.network.submission_port) %}
{% do c1.add_port(values.network.submissions_port) %}
{% do c1.add_port(values.network.imap_port) %}
{% do c1.add_port(values.network.imaps_port) %}
{% do c1.add_port(values.network.pop3_port) %}
{% do c1.add_port(values.network.pop3s_port) %}
{% do c1.add_port(values.network.sieve_port) %}

{% do perm_container.add_or_skip_action("data", values.storage.data, perms_config) %}
{% for store in values.storage.additional_storage %}
  {% do c1.add_storage(store.mount_path, store) %}
  {% do perm_container.add_or_skip_action(store.mount_path, store, perms_config) %}
{% endfor %}

{% set containers = [c1, config, init] %}
{% if perm_container.has_actions() %}
  {% do perm_container.activate() %}
  {% for c in containers %}
    {% do c.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
  {% endfor %}
{% endif %}

{% do tpl.portals.add(values.network.http_port, {"path": "/admin"}) %}
{% do tpl.notes.set_body(values.consts.notes_body) %}

{{ tpl.render() | tojson }}
