resources:
  limits:
    cpus: 2.0
    memory: 4096

bulwark:
  jmap_server_urls:
    - "https://mail.example.com"
  app_name: "Bulwark Webmail"
  session_secret: ""
  additional_envs: []

run_as:
  user: 568
  group: 568

network:
  host_network: false
  web_port:
    bind_mode: published
    port_number: 8080

ix_volumes:
  data: /opt/tests/mnt/bulwark-webmail/data

storage:
  data:
    type: ix_volume
    ix_volume_config:
      dataset_name: data
      create_host_path: true
  additional_storage: []
