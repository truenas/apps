{% set tpl = ix_lib.base.render.Render(values) %}

{% set c1 = tpl.add_container(values.consts.dropgate_container_name, "image") %}
{% set perm_container = tpl.deps.perms(values.consts.perms_container_name) %}
{% set perms_config = {"uid": values.run_as.user, "gid": values.run_as.group, "mode": "check"} %}

{% do c1.set_user(values.run_as.user, values.run_as.group) %}
{# The upstream image's entrypoint relies on su-exec and root privileges. #}
{# Override it so the server runs directly as the configured UID/GID. #}
{% do c1.set_entrypoint(["node", "server.js"]) %}
{% do c1.healthcheck.set_test("wget", {"port": values.network.web_port.port_number, "path": "/api/info"}) %}

{% do c1.environment.add_env("SERVER_PORT", values.network.web_port.port_number) %}
{% do c1.environment.add_env("SERVER_NAME", values.dropgate.server_name) %}
{% do c1.environment.add_env("ENABLE_WEB_UI", values.dropgate.enable_web_ui) %}

{% do c1.environment.add_env("ENABLE_UPLOAD", values.dropgate.upload.enable_upload) %}
{% if values.dropgate.upload.enable_upload %}
  {% do c1.environment.add_env("UPLOAD_ENABLE_E2EE", values.dropgate.upload.enable_e2ee) %}
  {% do c1.environment.add_env("UPLOAD_PRESERVE_UPLOADS", values.dropgate.upload.preserve_uploads) %}
  {% do c1.environment.add_env("UPLOAD_MAX_FILE_SIZE_MB", values.dropgate.upload.max_file_size_mb) %}
  {% do c1.environment.add_env("UPLOAD_MAX_STORAGE_GB", values.dropgate.upload.max_storage_gb) %}
  {% do c1.environment.add_env("UPLOAD_MAX_FILE_LIFETIME_HOURS", values.dropgate.upload.max_file_lifetime_hours) %}
  {% do c1.environment.add_env("UPLOAD_MAX_FILE_DOWNLOADS", values.dropgate.upload.max_file_downloads) %}
{% endif %}

{% do c1.environment.add_env("ENABLE_P2P", values.dropgate.p2p.enable_p2p) %}
{% if values.dropgate.p2p.enable_p2p %}
  {% do c1.environment.add_env("P2P_STUN_SERVERS", values.dropgate.p2p.stun_servers | join(",")) %}
{% endif %}

{% do c1.environment.add_user_envs(values.dropgate.additional_envs) %}

{% do c1.add_port(values.network.web_port) %}

{% if values.dropgate.upload.enable_upload and values.dropgate.upload.preserve_uploads %}
  {% do c1.add_storage("/usr/src/app/uploads", values.storage.uploads) %}
  {% do perm_container.add_or_skip_action("uploads", values.storage.uploads, perms_config) %}
{% endif %}

{% for store in values.storage.additional_storage %}
  {% do c1.add_storage(store.mount_path, store) %}
  {% do perm_container.add_or_skip_action(store.mount_path, store, perms_config) %}
{% endfor %}

{% if perm_container.has_actions() %}
  {% do perm_container.activate() %}
  {% do c1.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
{% endif %}

{% do tpl.portals.add(values.network.web_port) %}

{{ tpl.render() | tojson }}
