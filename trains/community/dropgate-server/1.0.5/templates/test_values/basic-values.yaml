TZ: Etc/UTC

resources:
  limits:
    cpus: 2.0
    memory: 1024

dropgate:
  server_name: "Dropgate Server"
  enable_web_ui: true
  upload:
    enable_upload: true
    enable_e2ee: true
    preserve_uploads: true
    max_file_size_mb: 100
    max_storage_gb: 10
    max_file_lifetime_hours: 24
    max_file_downloads: 1
  p2p:
    enable_p2p: true
    stun_servers: ["stun:stun.cloudflare.com:3478"]
  additional_envs: []

run_as:
  user: 568
  group: 568

network:
  web_port:
    bind_mode: published
    port_number: 8080

ix_volumes:
  uploads: /opt/tests/mnt/dropgate/uploads

storage:
  uploads:
    type: ix_volume
    ix_volume_config:
      dataset_name: uploads
      create_host_path: true
  additional_storage: []
