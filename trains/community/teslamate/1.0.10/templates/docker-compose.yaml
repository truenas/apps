{% set tpl = ix_lib.base.render.Render(values) %}

{% set tm_net = tpl.networks.create_internal("teslamate-net") %}

{% set perm_container = tpl.deps.perms(values.consts.perms_container_name) %}
{% set perms_config = {"uid": values.run_as.user, "gid": values.run_as.group, "mode": "check"} %}

{% set pg_config = {
  "user": values.consts.db_user,
  "password": values.teslamate.db_password,
  "database": values.consts.db_name,
  "volume": values.storage.postgres_data,
} %}
{% set postgres = tpl.deps.postgres(values.consts.postgres_container_name, values.teslamate.postgres_image_selector, pg_config, perm_container) %}
{% do postgres.container.add_network(tm_net) %}

{% set tm = tpl.add_container(values.consts.teslamate_container_name, "image") %}
{% set containers = namespace(x=[tm]) %}

{% set api = namespace(x=None) %}
{% if values.teslamate.enable_api %}
  {% set api.x = tpl.add_container(values.consts.api_container_name, "api_image") %}
  {% do containers.x.append(api.x) %}
{% endif %}

{% for c in containers.x %}
  {% do c.add_network(tm_net) %}
  {% do c.set_user(values.run_as.user, values.run_as.group) %}

  {% do c.depends.add_dependency(values.consts.postgres_container_name, "service_healthy") %}

  {% do c.environment.add_env("ENCRYPTION_KEY", values.teslamate.encryption_key) %}
  {% do c.environment.add_env("DATABASE_USER", values.consts.db_user) %}
  {% do c.environment.add_env("DATABASE_PASS", values.teslamate.db_password) %}
  {% do c.environment.add_env("DATABASE_NAME", values.consts.db_name) %}
  {% do c.environment.add_env("DATABASE_HOST", values.consts.postgres_container_name) %}
  {% do c.environment.add_env("DATABASE_PORT", postgres.get_port()) %}

  {% do c.environment.add_env("DISABLE_MQTT", values.teslamate.disable_mqtt) %}
  {% if not values.teslamate.disable_mqtt %}
    {% do c.environment.add_env("MQTT_HOST", values.teslamate.mqtt_host) %}
    {% do c.environment.add_env("MQTT_PORT", values.teslamate.mqtt_port) %}
    {% if values.teslamate.mqtt_username %}
      {% do c.environment.add_env("MQTT_USERNAME", values.teslamate.mqtt_username) %}
    {% endif %}
    {% if values.teslamate.mqtt_password %}
      {% do c.environment.add_env("MQTT_PASSWORD", values.teslamate.mqtt_password) %}
    {% endif %}
  {% endif %}

  {% do c.environment.add_user_envs(values.teslamate.additional_envs) %}

  {% for store in values.storage.additional_storage %}
    {% do c.add_or_skip_action(store.mount_path, store, perms_config) %}
  {% endfor %}
{% endfor %}

{# TeslaMate #}
{% do tm.environment.add_env("PORT", values.network.web_port.port_number) %}
{% do tm.healthcheck.set_test("http", {"port": values.network.web_port.port_number, "path": "/health_check"}) %}
{% do tm.add_port(values.network.web_port) %}

{% do tm.add_storage("/opt/app/import", values.storage.import_data) %}
{% do perm_container.add_or_skip_action("import_data", values.storage.import_data, perms_config) %}

{# TeslaMateAPI (optional) #}
{% if api.x %}
  {% do api.x.depends.add_dependency(values.consts.teslamate_container_name, "service_healthy") %}
  {% do api.x.healthcheck.set_test("wget", {"port": values.consts.internal_api_port, "path": "/api/ping"}) %}
  {% do api.x.add_port(values.network.api_port, {"container_port": values.consts.internal_api_port}) %}

  {% do api.x.environment.add_env("TESLAMATE_HOST", values.consts.teslamate_container_name) %}
  {% do api.x.environment.add_env("TESLAMATE_PORT", values.network.web_port.port_number) %}

  {% do api.x.environment.add_env("API_TOKEN_DISABLE", values.teslamate.api_token|length == 0) %}
  {% if values.teslamate.api_token %}
    {% do api.x.environment.add_env("API_TOKEN", values.teslamate.api_token) %}
  {% endif %}

  {% do tpl.portals.add(values.network.api_port, {"name": "API"}) %}
{% endif %}

{% for store in values.storage.additional_storage %}
  {% do perm_container.add_or_skip_action(store.mount_path, store, perms_config) %}
{% endfor %}

{% if perm_container.has_actions() %}
  {% do perm_container.activate() %}
  {% do postgres.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
  {% for c in containers.x %}
    {% do c.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
  {% endfor %}
{% endif %}

{% do tpl.portals.add(values.network.web_port) %}

{{ tpl.render() | tojson }}
