resources:
  limits:
    cpus: 2.0
    memory: 4096

continuwuity:
  server_name: example.com
  allow_registration: true
  allow_federation: true
  registration_token: your_token
  trusted_servers: ["matrix.org"]
  additional_envs: []

network:
  web_port:
    bind_mode: published
    port_number: 8080
  host_network: false

run_as:
  user: 568
  group: 568

ix_volumes:
  data: /opt/tests/mnt/continuwuity/data

storage:
  data:
    type: ix_volume
    ix_volume_config:
      dataset_name: data
      create_host_path: true
  additional_storage: []
