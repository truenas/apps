{% set tpl = ix_lib.base.render.Render(values) %}

{% set c1 = tpl.add_container(values.consts.umlautadaptarrex_container_name, "image") %}
{% do c1.add_caps(["CHOWN", "SETGID", "SETUID"]) %}
{% do c1.healthcheck.set_test("wget", {"port": values.network.web_port.port_number, "path": "/api/health"}) %}

{% do c1.environment.add_env("NODE_ENV", "production") %}
{% do c1.environment.add_env("DATABASE_URL", "file:%s/umlautadaptarrex.db"|format(values.consts.data_path)) %}
{% do c1.environment.add_env("UMLAUTADAPTARREX_LEGACYAPI_PORT", values.network.legacyapi_port.port_number) %}
{% do c1.environment.add_env("UMLAUTADAPTARREX_PROXY_PORT", values.network.proxy_port.port_number) %}
{% do c1.environment.add_env("UMLAUTADAPTARREX_WEBUI_PORT", values.network.web_port.port_number) %}
{% do c1.environment.add_user_envs(values.umlautadaptarrex.additional_envs) %}

{% do c1.add_port(values.network.legacyapi_port) %}
{% do c1.add_port(values.network.proxy_port) %}
{% do c1.add_port(values.network.web_port) %}

{% do c1.add_storage(values.consts.data_path, values.storage.data) %}

{% for store in values.storage.additional_storage %}
  {% do c1.add_storage(store.mount_path, store) %}
{% endfor %}

{% do tpl.portals.add(values.network.web_port) %}

{{ tpl.render() | tojson }}
