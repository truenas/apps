resources:
  limits:
    cpus: 2.0
    memory: 4096

TZ: Etc/UTC

peertube:
  postgres_image_selector: postgres_18_image
  db_password: secret
  redis_password: secret
  secret: supersecretkey1234567890abcdef1234567890abcdef
  admin_email: admin@example.com
  initial_root_password: TestRootPass123!
  webserver_hostname: localhost
  webserver_port: 8080
  webserver_https: false
  additional_envs: []

run_as:
  user: 568
  group: 568

network:
  web_port:
    bind_mode: published
    port_number: 8080
  rtmp_port:
    bind_mode: published
    port_number: 8081

ix_volumes:
  data: /opt/tests/mnt/peertube/data
  config: /opt/tests/mnt/peertube/config
  postgres_data: /opt/tests/mnt/peertube/postgres_data

storage:
  data:
    type: ix_volume
    ix_volume_config:
      dataset_name: data
      create_host_path: true
  config:
    type: ix_volume
    ix_volume_config:
      dataset_name: config
      create_host_path: true
  postgres_data:
    type: ix_volume
    ix_volume_config:
      dataset_name: postgres_data
      create_host_path: true
  additional_storage: []
