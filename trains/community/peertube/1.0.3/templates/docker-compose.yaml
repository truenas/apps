{% set tpl = ix_lib.base.render.Render(values) %}

{% set peertube_net = tpl.networks.create_internal("peertube-net") %}

{% set perm_container = tpl.deps.perms(values.consts.perms_container_name) %}
{% set perms_config = {"uid": values.run_as.user, "gid": values.run_as.group, "mode": "check"} %}

{% set pg_config = {
  "user": values.consts.db_user,
  "password": values.peertube.db_password,
  "database": values.consts.db_name,
  "volume": values.storage.postgres_data,
} %}
{% set postgres = tpl.deps.postgres(values.consts.postgres_container_name, values.peertube.postgres_image_selector, pg_config, perm_container) %}
{% do postgres.container.add_network(peertube_net) %}

{% set redis_config = {
  "password": values.peertube.redis_password,
  "volume": {"type": "temporary", "volume_config": {"volume_name": "redis-data"}},
} %}
{% set redis = tpl.deps.redis(values.consts.redis_container_name, "redis_image", redis_config, perm_container) %}
{% do redis.container.add_network(peertube_net) %}

{% set c = tpl.add_container(values.consts.peertube_container_name, "image") %}
{% do c.add_network(peertube_net) %}
{% do c.set_user(values.run_as.user, values.run_as.group) %}
{% do c.depends.add_dependency(values.consts.postgres_container_name, "service_healthy") %}
{% do c.depends.add_dependency(values.consts.redis_container_name, "service_healthy") %}

{% do c.healthcheck.set_test("curl", {"port": values.network.web_port.port_number, "path": "/api/v1/ping"}) %}

{% do c.environment.add_env("PEERTUBE_LISTEN_PORT", values.network.web_port.port_number) %}
{% do c.environment.add_env("PEERTUBE_LIVE_RTMP_PORT", values.network.rtmp_port.port_number) %}
{% do c.environment.add_env("PEERTUBE_DB_HOSTNAME", values.consts.postgres_container_name) %}
{% do c.environment.add_env("PEERTUBE_DB_USERNAME", values.consts.db_user) %}
{% do c.environment.add_env("PEERTUBE_DB_PASSWORD", values.peertube.db_password) %}
{% do c.environment.add_env("PEERTUBE_DB_NAME", values.consts.db_name) %}
{% do c.environment.add_env("PEERTUBE_DB_PORT", postgres.get_port()) %}
{% do c.environment.add_env("PEERTUBE_REDIS_HOSTNAME", values.consts.redis_container_name) %}
{% do c.environment.add_env("PEERTUBE_REDIS_AUTH", values.peertube.redis_password) %}
{% do c.environment.add_env("PEERTUBE_WEBSERVER_HOSTNAME", values.peertube.webserver_hostname) %}
{% do c.environment.add_env("PEERTUBE_WEBSERVER_PORT", values.peertube.webserver_port) %}
{% do c.environment.add_env("PEERTUBE_WEBSERVER_HTTPS", values.peertube.webserver_https) %}
{% do c.environment.add_env("PEERTUBE_SECRET", values.peertube.secret) %}
{% do c.environment.add_env("PEERTUBE_ADMIN_EMAIL", values.peertube.admin_email) %}
{% do c.environment.add_env("PT_INITIAL_ROOT_PASSWORD", values.peertube.initial_root_password) %}
{% do c.environment.add_user_envs(values.peertube.additional_envs) %}

{% do c.add_storage("/data", values.storage.data) %}
{% do perm_container.add_or_skip_action("data", values.storage.data, perms_config) %}

{% do c.add_storage("/config", values.storage.config) %}
{% do perm_container.add_or_skip_action("config", values.storage.config, perms_config) %}

{% for store in values.storage.additional_storage %}
  {% do c.add_storage(store.mount_path, store) %}
  {% do perm_container.add_or_skip_action(store.mount_path, store, perms_config) %}
{% endfor %}

{% do c.add_port(values.network.web_port) %}
{% do c.add_port(values.network.rtmp_port) %}

{% if perm_container.has_actions() %}
  {% do perm_container.activate() %}
  {% do c.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
  {% do postgres.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
  {% do redis.container.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
{% endif %}

{% do tpl.portals.add(values.network.web_port) %}

{{ tpl.render() | tojson }}
