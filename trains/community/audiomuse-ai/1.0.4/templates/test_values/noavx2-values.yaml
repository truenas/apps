resources:
  limits:
    cpus: 2
    memory: 4096

TZ: America/New_York

audiomuse:
  postgres_image_selector: postgres_18_image
  db_password: SecureDBPassword123!
  redis_password: SecureRedisPassword123!
  image_selector: noavx2_image
  additional_envs: []

run_as:
  user: 568
  group: 568

ix_volumes:
  postgres_data: /opt/tests/mnt/audiomuse-ai/postgres-data
  temp_audio: /opt/tests/mnt/audiomuse-ai/temp-audio

network:
  web_port:
    bind_mode: published
    port_number: 8080

storage:
  postgres_data:
    type: ix_volume
    ix_volume_config:
      dataset_name: postgres_data
      create_host_path: true
  temp_audio:
    type: ix_volume
    ix_volume_config:
      dataset_name: temp_audio
      create_host_path: true
  additional_storage: []
