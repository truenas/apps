{% set tpl = ix_lib.base.render.Render(values) %}

{% set perm_container = tpl.deps.perms(values.consts.perms_container_name) %}
{% set perms_config = {"uid": values.run_as.user, "gid": values.run_as.group, "mode": "check"} %}

{% set c1 = tpl.add_container(values.consts.openclaw_container_name, "image") %}
{% set config = tpl.add_container(values.consts.config_container_name, "image") %}

{% set container = [config, c1] %}
{% for c in container %}
  {% do c.set_user(values.run_as.user, values.run_as.group) %}
  {% do c.set_init(true) %}

  {% do c.environment.add_env("HOME", values.consts.home_dir) %}
  {% do c.environment.add_env("NODE_ENV", "production") %}

  {% do c.add_storage(values.consts.home_dir, values.storage.config) %}

  {% for store in values.storage.additional_storage %}
    {% do c.add_storage(store.mount_path, store) %}
  {% endfor %}
{% endfor %}

{% do config.setup_as_helper(disable_network=false) %}
{% do config.set_entrypoint(["/entrypoint.sh"]) %}
{% do config.set_tty(true) %}

{% set allowed_origins = namespace(x=[]) %}
{% for origin in values.openclaw.allowed_origins %}
  {% do allowed_origins.x.append(origin.rstrip("/")) %}
{% endfor %}

{% set base = "node dist/index.js config set" %}

{% set cmds = [
  "%s gateway.controlUi.dangerouslyAllowHostHeaderOriginFallback %s" | format(base, "false" if allowed_origins.x | length > 0 else "true"),
  "%s gateway.controlUi.allowedOrigins '%s'" | format(base, allowed_origins.x | tojson),
] %}

{% if not allowed_origins.x %}
  {% do tpl.notes.add_warning("No allowed origins specified. Falling back to dangerouslyAllowHostHeaderOriginFallback=true.") %}
{% endif %}

{% set entrypoint = "#!/bin/sh\nset -e\n%s" | format(cmds | join("\n")) %}
{% do config.configs.add("entrypoint", entrypoint, "/entrypoint.sh", "0755") %}

{% do c1.depends.add_dependency(values.consts.config_container_name, "service_completed_successfully") %}
{% do c1.healthcheck.set_test("curl", {"port": values.network.gateway_port.port_number, "path": "/healthz"}) %}
{% do c1.set_command([
  "node", "openclaw.mjs",
  "gateway", "--allow-unconfigured",
  "--bind", "lan",
  "--port", values.network.gateway_port.port_number,
]) %}

{% do c1.environment.add_env("OPENCLAW_GATEWAY_TOKEN", values.openclaw.gateway_token) %}
{% do c1.environment.add_user_envs(values.openclaw.additional_envs) %}

{% do c1.add_port(values.network.gateway_port) %}

{% do perm_container.add_or_skip_action("config", values.storage.config, perms_config) %}

{% for store in values.storage.additional_storage %}
  {% do perm_container.add_or_skip_action(store.mount_path, store, perms_config) %}
{% endfor %}

{% if perm_container.has_actions() %}
  {% do perm_container.activate() %}
  {% for c in container %}
    {% do c.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
  {% endfor %}
{% endif %}

{% do tpl.portals.add(values.network.gateway_port) %}

{{ tpl.render() | tojson }}
