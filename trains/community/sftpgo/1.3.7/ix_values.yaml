images:
  image:
    repository: drakkan/sftpgo
    tag: v2.7.1
  container_utils_image:
    repository: ixsystems/container-utils
    tag: 1.0.2
  plugins_image:
    repository: drakkan/sftpgo
    tag: v2.7.1-plugins

consts:
  sftpgo_container_name: sftpgo
  perms_container_name: permissions
  config_dir_path: /var/lib/sftpgo
  data_dir_path: /srv/sftpgo/data
  backups_dir_path: /srv/sftpgo/backups
  ssl_key_dir: /srv/sftpgo/certs
  ssl_cert_dir: /srv/sftpgo/certs
  ssl_key_name: private.key
  ssl_cert_name: public.crt
