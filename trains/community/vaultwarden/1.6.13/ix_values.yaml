images:
  image:
    repository: vaultwarden/server
    tag: 1.35.8
  container_utils_image:
    repository: ixsystems/container-utils
    tag: 1.0.2
  postgres_17_image:
    repository: postgres
    tag: 17.9-bookworm
  postgres_18_image:
    repository: postgres
    tag: 18.3-trixie
  postgres_upgrade_image:
    repository: ixsystems/postgres-upgrade
    tag: 1.2.7

consts:
  vaultwarden_container_name: vaultwarden
  postgres_container_name: postgres
  perms_container_name: permissions
  ssl_cert_path: /certs/public.crt
  ssl_key_path: /certs/private.key
  db_user: vaultwarden
  db_name: vaultwarden
  pg_run_user: 999
  pg_run_group: 999
