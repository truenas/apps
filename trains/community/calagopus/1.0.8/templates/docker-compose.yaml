{% from "macros/config.sh" import config %}
{% set tpl = ix_lib.base.render.Render(values) %}

{% set calagopus_net = tpl.networks.create_internal("calagopus-net") %}

{% set perm_container = tpl.deps.perms(values.consts.perms_container_name) %}
{% set init = tpl.add_container(values.consts.init_container_name, "yq_image") %}
{% set c1 = tpl.add_container(values.consts.calagopus_container_name, values.calagopus.image_selector) %}

{% set wings_temp_path = tpl.funcs.get_host_path(values.storage.wings_temp) %}
{% set wings_host_path = tpl.funcs.get_host_path(values.storage.wings_data) %}
{% set wings_config_path = "%s/%s"|format(wings_host_path, values.consts.wings_config_file) %}

{# https://calagopus.com/docs/wings/configuration #}
{% set cfg = namespace(x=[
  {"app_name": values.calagopus.server_name},
  {"system.sftp.enabled": values.network.sftp_port.bind_mode != ""},
  {"system.sftp.bind_address": "0.0.0.0"},
  {"system.sftp.bind_port": values.network.sftp_port.port_number},
  {"docker.socket": "/var/run/docker.sock"},
  {"system.root_directory": wings_host_path},
  {"system.vmount_directory": "%s/vmounts"|format(wings_host_path)},
  {"system.data": "%s/volumes"|format(wings_host_path)},
  {"system.archive_directory": "%s/archives"|format(wings_host_path)},
  {"system.backup_directory": "%s/backups"|format(wings_host_path)},
  {"system.tmp_directory": wings_temp_path},
]) %}

{% do init.set_user(0, 0) %}
{% do init.setup_as_helper() %}
{% do init.configs.add("config.sh", config(values=values, cfg_path=wings_config_path, cfg=cfg.x,), "/setup/config.sh", "0755") %}
{% do init.set_entrypoint(["/setup/config.sh"]) %}

{% set pg_config = {
  "user": values.consts.db_user,
  "password": values.calagopus.db_password,
  "database": values.consts.db_name,
  "volume": values.storage.postgres_data,
} %}
{% set postgres = tpl.deps.postgres(values.consts.postgres_container_name, values.calagopus.postgres_image_selector, pg_config, perm_container) %}
{% do postgres.container.add_network(calagopus_net) %}

{% set redis_config = {
  "password": values.calagopus.redis_password,
  "volume": {"type": "temporary", "volume_config": {"volume_name": "redis-data"}},
} %}
{% set redis = tpl.deps.redis(values.consts.redis_container_name, "redis_image", redis_config, perm_container) %}
{% do redis.container.add_network(calagopus_net) %}

{% do c1.set_user(0, 0) %}
{% do c1.add_network(calagopus_net) %}
{% do c1.add_docker_socket(read_only=False) %}
{% do c1.add_caps(["CHOWN", "DAC_OVERRIDE", "FOWNER", "KILL", "SETFCAP", "SETGID", "SETPCAP", "SETUID"]) %}

{% do c1.healthcheck.set_test("tcp" if values.calagopus.image_selector == "heavy_image" else "netcat", {"port": values.network.web_port.port_number}) %}

{% do c1.depends.add_dependency(values.consts.postgres_container_name, "service_healthy") %}
{% do c1.depends.add_dependency(values.consts.redis_container_name, "service_healthy") %}
{% do c1.depends.add_dependency(values.consts.init_container_name, "service_completed_successfully") %}

{# https://calagopus.com/docs/panel/environment #}
{% do c1.environment.add_env("REDIS_MODE", "redis") %}
{% do c1.environment.add_env("REDIS_URL", redis.get_url("redis")) %}
{% do c1.environment.add_env("DATABASE_MIGRATE", true) %}
{% do c1.environment.add_env("DATABASE_URL", postgres.get_url("postgresql")) %}
{% do c1.environment.add_env("BIND", "0.0.0.0") %}
{% do c1.environment.add_env("PORT", values.network.web_port.port_number) %}
{% do c1.environment.add_env("APP_PRIMARY", true) %}
{% do c1.environment.add_env("APP_ENCRYPTION_KEY", values.calagopus.encryption_key) %}
{% do c1.environment.add_env("APP_TRUSTED_PROXIES", values.calagopus.trusted_proxies | join(",")) %}
{% do c1.environment.add_env("SERVER_NAME", values.calagopus.server_name) %}
{% do c1.environment.add_env("AIO_BASE_WINGS_CONFIGURATION", wings_config_path) %}

{% do c1.environment.add_user_envs(values.calagopus.additional_envs) %}

{% do c1.add_port(values.network.web_port) %}
{% do c1.add_port(values.network.sftp_port) %}

{# Panel Data Storage #}
{% do c1.add_storage("/var/lib/calagopus", values.storage.data) %}
{# Wings Data Storage #}
{% do c1.add_storage(wings_temp_path, values.storage.wings_temp) %}
{% do c1.add_storage(wings_host_path, values.storage.wings_data) %}
{% do init.add_storage(wings_host_path, values.storage.wings_data) %}

{% if values.calagopus.image_selector == "heavy_image" %}
  {% do c1.add_storage("/app/binaries", values.storage.binaries) %}
  {% do c1.add_storage("/app/translations", values.storage.translations) %}
  {% do c1.add_storage("/app/extensions", values.storage.extensions) %}
  {% do c1.add_storage("/app/repo/database/extension-migrations", values.storage.extension_migrations) %}
{% endif %}

{% for store in values.storage.additional_storage %}
  {% do c1.add_storage(store.mount_path, store) %}
{% endfor %}

{% if perm_container.has_actions() %}
  {% do perm_container.activate() %}
  {% do c1.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
  {% do init.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
  {% do postgres.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
  {% do redis.container.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
{% endif %}

{% do tpl.portals.add(values.network.web_port) %}

{{ tpl.render() | tojson }}
