resources:
  limits:
    cpus: 2.0
    memory: 4096

TZ: Etc/UTC

npmplus:
  additional_envs: []

network:
  web_port:
    bind_mode: published
    port_number: 8081
  http_port:
    bind_mode: published
    port_number: 8080
  https_port:
    bind_mode: published
    port_number: 8443
  additional_ports: []

run_as:
  user: 568
  group: 568

ix_volumes:
  data: /opt/tests/mnt/npmplus/data

storage:
  data:
    type: ix_volume
    ix_volume_config:
      dataset_name: data
      create_host_path: true
  additional_storage: []
