{% set tpl = ix_lib.base.render.Render(values) %}

{% set c1 = tpl.add_container(values.consts.wallabag_container_name, "image") %}
{% do c1.add_caps(["CHOWN", "DAC_OVERRIDE", "FOWNER", "SETUID", "SETGID"]) %}
{% do c1.healthcheck.set_test("wget", {"port": values.consts.internal_web_port, "path": "/api/info"}) %}

{% do c1.environment.add_env("SYMFONY__ENV__DATABASE_DRIVER", "pdo_sqlite") %}
{% do c1.environment.add_env("SYMFONY__ENV__DOMAIN_NAME", values.wallabag.domain_name.rstrip("/")) %}
{% do c1.environment.add_user_envs(values.wallabag.additional_envs) %}

{% do c1.add_port(values.network.web_port, {"container_port": values.consts.internal_web_port}) %}

{% do c1.add_storage("/var/www/wallabag/data", values.storage.data) %}
{% do c1.add_storage("/var/www/wallabag/web/assets/images", values.storage.images) %}

{% for store in values.storage.additional_storage %}
  {% do c1.add_storage(store.mount_path, store) %}
{% endfor %}

{% do tpl.portals.add(values.network.web_port) %}

{{ tpl.render() | tojson }}
