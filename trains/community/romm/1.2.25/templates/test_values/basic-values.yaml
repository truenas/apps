resources:
  limits:
    cpus: 2.0
    memory: 4096

romm:
  postgres_image_selector: postgres_18_image
  db_password: postgres-password
  redis_password: redis-password
  auth_secret_key: change-me
  enable_rescan_on_filesystem_change: false
  enable_scheduled_rescan: false
  scheduled_rescan_cron: "0 3 * * *"
  disable_download_endpoint_auth: false
  flashpoint_api_enabled: false
  hasheous_api_enabled: false
  hltb_api_enabled: false
  igdb_client_id: igdb-client-id
  igdb_client_secret: igdb-client-secret
  launchbox_api_enabled: false
  mobygames_api_key: mobygames-api-key
  playmatch_api_enabled: false
  retroachievements_api_key: ""
  screenscraper_user: ""
  screenscraper_password: ""
  steamgriddb_api_key: steamgriddb-api-key
  additional_envs: []

network:
  web_port:
    bind_mode: published
    port_number: 8080

run_as:
  user: 568
  group: 568

ix_volumes:
  library: /opt/tests/mnt/library
  resources: /opt/tests/mnt/resources
  config: /opt/tests/mnt/config
  assets: /opt/tests/mnt/assets
  postgres_data: /opt/tests/mnt/postgres_data

storage:
  library:
    type: ix_volume
    ix_volume_config:
      dataset_name: library
      create_host_path: true
  resources:
    type: ix_volume
    ix_volume_config:
      dataset_name: resources
      create_host_path: true
  config:
    type: ix_volume
    ix_volume_config:
      dataset_name: config
      create_host_path: true
  assets:
    type: ix_volume
    ix_volume_config:
      dataset_name: assets
      create_host_path: true
  postgres_data:
    type: ix_volume
    ix_volume_config:
      dataset_name: postgres_data
      create_host_path: true
  additional_storage: []
