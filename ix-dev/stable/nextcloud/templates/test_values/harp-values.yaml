resources:
  limits:
    cpus: 2.0
    memory: 4096

nextcloud:
  postgres_image_selector: postgres_18_image
  admin_user: admin
  admin_password: password
  apt_packages: []
  tesseract_languages: []
  imaginary:
    enabled: false
  harp:
    enabled: true
    shared_key: testharpsharedkey
    port:
      bind_mode: published
      port_number: 30028
  host: localhost:8080
  data_dir_path: /var/www/html/data
  redis_password: password
  db_user: nextcloud
  db_password: password
  php_upload_limit: 3
  php_memory_limit: 512
  op_cache_interned_strings_buffer: 32
  op_cache_memory_consumption: 128
  max_execution_time: 30
  cron:
    enabled: false
  additional_envs: []
network:
  web_port:
    bind_mode: published
    port_number: 8080
  certificate_id:
  nginx:
    proxy_timeout: 60
    use_different_port: false

ix_volumes:
  postgres_data: /opt/tests/mnt/postgres_data
  nextcloud-data: /opt/tests/mnt/nextcloud-data
  nextcloud-html: /opt/tests/mnt/nextcloud-html

storage:
  data:
    type: ix_volume
    ix_volume_config:
      dataset_name: nextcloud-data
      create_host_path: true
  html:
    type: ix_volume
    ix_volume_config:
      dataset_name: nextcloud-html
      create_host_path: true
  postgres_data:
    type: ix_volume
    ix_volume_config:
      dataset_name: postgres_data
      create_host_path: true
  additional_storage: []
