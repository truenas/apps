{% set tpl = ix_lib.base.render.Render(values) %}

{% set c1 = tpl.add_container(values.consts.toparr_container_name, "image") %}

{% do c1.set_user(0, 0) %}
{% do c1.add_caps(["DAC_READ_SEARCH", "PERFMON", "SYS_ADMIN", "SYS_PTRACE"]) %}
{% do c1.set_pid_mode("host") %}
{% do c1.remove_security_opt("no-new-privileges") %}

{% do c1.healthcheck.set_test("http", {"port": values.consts.toparr_port, "path": "/api/status"}) %}

{% do c1.environment.add_env("GPU_TDP_WATTS", values.toparr.gpu_tdp_watts) %}
{% do c1.environment.add_user_envs(values.toparr.additional_envs) %}

{% do c1.add_port(values.network.web_port, {"container_port": values.consts.toparr_port}) %}

{# Debugfs mount for GPU client enumeration #}
{% do c1.add_storage("/sys/kernel/debug", {"type": "host_path", "read_only": true, "host_path_config": {"path": "/sys/kernel/debug"}}) %}

{% for store in values.storage.additional_storage %}
  {% do c1.add_storage(store.mount_path, store) %}
{% endfor %}

{% do tpl.portals.add(values.network.web_port) %}

{{ tpl.render() | tojson }}
