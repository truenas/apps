{% set tpl = ix_lib.base.render.Render(values) %}

{% set c1 = tpl.add_container(values.consts.forgejo_runner_container_name, "image") %}
{% set perm_container = tpl.deps.perms(values.consts.perms_container_name) %}
{% set perms_config = {"uid": values.run_as.user, "gid": values.run_as.group, "mode": "check"} %}

{% do c1.set_user(values.run_as.user, values.run_as.group) %}
{% do c1.healthcheck.set_test("pgrep", {"process": "forgejo-runner"}) %}
{% do c1.add_extra_host("host.docker.internal", "host-gateway") %}

  {% do c1.set_entrypoint(["/bin/bash", "-c", [
    "set -e",
    "test -f /data/config.yaml || touch /data/config.yaml",
    "echo '%s' > /tmp/runner-token" | format(values.forgejo_runner.runner_registration_token),
    'exec forgejo-runner "$@"',
  ] | join("\n"), "--"]) %}

  {% set cmd = namespace(x=[
    "daemon", "--config", "/data/config.yaml",
    "--url", values.forgejo_runner.instance_url,
    "--uuid", values.forgejo_runner.runner_uuid,
    "--token-url", "file:///tmp/runner-token"
  ]) %}

{% for label in values.forgejo_runner.runner_labels %}
  {% do cmd.x.extend(["--label", label]) %}
{% endfor %}

{% do c1.set_command(cmd.x) %}

{% do c1.environment.add_user_envs(values.forgejo_runner.additional_envs) %}

{% for port in values.network.additional_ports %}
  {% do c1.add_port(port) %}
{% endfor %}

{% do c1.add_docker_socket(read_only=False) %}

{% do c1.add_storage("/data", values.storage.data) %}
{% do perm_container.add_or_skip_action("data", values.storage.data, perms_config) %}

{% for store in values.storage.additional_storage %}
  {% do c1.add_storage(store.mount_path, store) %}
  {% do perm_container.add_or_skip_action(store.mount_path, store, perms_config) %}
{% endfor %}

{% if perm_container.has_actions() %}
  {% do perm_container.activate() %}
  {% do c1.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
{% endif %}

{{ tpl.render() | tojson }}
