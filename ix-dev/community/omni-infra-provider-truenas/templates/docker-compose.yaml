{% set tpl = ix_lib.base.render.Render(values) %}

{% set c1 = tpl.add_container(values.consts.omni_container_name, "image") %}
{% set perm_container = tpl.deps.perms(values.consts.perms_container_name) %}
{# Upstream image is pinned to USER 65534 (nobody); perms must match. #}
{% set perms_config = {"uid": 65534, "gid": 65534, "mode": "check"} %}

{% do c1.set_user(65534, 65534) %}
{# Upstream image runs read-only; nothing is written to the container rootfs. #}
{% do c1.set_read_only(true) %}
{% do c1.healthcheck.disable() %}

{% do c1.add_extra_host("host.docker.internal", "host-gateway") %}

{% do c1.environment.add_env("OMNI_ENDPOINT", values.omni.endpoint) %}
{% do c1.environment.add_env("OMNI_SERVICE_ACCOUNT_KEY", values.omni.service_account_key) %}
{% do c1.environment.add_env("OMNI_INSECURE_SKIP_VERIFY", values.omni.insecure_skip_verify) %}
{% do c1.environment.add_env("PROVIDER_ID", values.omni.provider_id) %}
{% do c1.environment.add_env("PROVIDER_NAME", values.omni.provider_name) %}
{% do c1.environment.add_env("PROVIDER_DESCRIPTION", values.omni.provider_description) %}

{% do c1.environment.add_env("TRUENAS_HOST", values.truenas.host) %}
{% do c1.environment.add_env("TRUENAS_API_KEY", values.truenas.api_key) %}
{% do c1.environment.add_env("TRUENAS_INSECURE_SKIP_VERIFY", values.truenas.insecure_skip_verify) %}

{% do c1.environment.add_env("DEFAULT_POOL", values.vm.default_pool) %}
{% if values.vm.default_network_interface %}
  {% do c1.environment.add_env("DEFAULT_NETWORK_INTERFACE", values.vm.default_network_interface) %}
{% endif %}
{% do c1.environment.add_env("DEFAULT_BOOT_METHOD", values.vm.default_boot_method) %}
{% do c1.environment.add_env("GRACEFUL_SHUTDOWN_TIMEOUT", values.vm.graceful_shutdown_timeout) %}

{% do c1.environment.add_env("CONCURRENCY", values.advanced.concurrency) %}
{% do c1.environment.add_env("LOG_LEVEL", values.advanced.log_level) %}
{% do c1.environment.add_env("MAX_ERROR_RECOVERIES", values.advanced.max_error_recoveries) %}

{% do c1.environment.add_user_envs(values.omni.additional_envs) %}

{% for store in values.storage.additional_storage %}
  {% do c1.add_storage(store.mount_path, store) %}
  {% do perm_container.add_or_skip_action(store.mount_path, store, perms_config) %}
{% endfor %}

{% if perm_container.has_actions() %}
  {% do perm_container.activate() %}
  {% do c1.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
{% endif %}

{{ tpl.render() | tojson }}
