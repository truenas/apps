resources:
  limits:
    cpus: 2.0
    memory: 4096

omni:
  endpoint: "https://omni.test.example.com"
  service_account_key: "dGVzdC1rZXktbm90LXJlYWw="
  insecure_skip_verify: false
  provider_id: "truenas-test"
  provider_name: "TrueNAS"
  provider_description: "TrueNAS SCALE infrastructure provider"
  additional_envs: []

truenas:
  host: "host.docker.internal"
  api_key: "1-testapikeynotreal"
  insecure_skip_verify: true

vm:
  default_pool: "tank"
  default_network_interface: "br0"
  default_boot_method: "UEFI"
  graceful_shutdown_timeout: 30

advanced:
  concurrency: 4
  log_level: "info"
  max_error_recoveries: 5

network:
  networks: []

ix_volumes:
  cache: /opt/tests/mnt/cache

storage:
  additional_storage:
    - type: ix_volume
      mount_path: /tmp/cache
      ix_volume_config:
        dataset_name: cache
        create_host_path: true

labels:
  - key: "com.bearbinary.omni-provider"
    value: "test"
    containers:
      - omni-infra-provider-truenas
