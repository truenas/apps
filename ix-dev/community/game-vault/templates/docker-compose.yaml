{% set tpl = ix_lib.base.render.Render(values) %}

{% set gv_net = tpl.networks.create_internal("game-vault-net") %}

{% set c1 = tpl.add_container(values.consts.game_vault_container_name, "image") %}
{% set perm_container = tpl.deps.perms(values.consts.perms_container_name) %}
{% set perms_config = {"uid": values.run_as.user, "gid": values.run_as.group, "mode": "check"} %}

{% set pg_config = {
  "user": values.consts.db_user,
  "password": values.game_vault.db_password,
  "database": values.consts.db_name,
  "volume": values.storage.postgres_data,
} %}
{% set postgres = tpl.deps.postgres(values.consts.postgres_container_name, values.game_vault.postgres_image_selector, pg_config, perm_container) %}

{% do c1.add_network(gv_net) %}
{% do postgres.container.add_network(gv_net) %}

{% do c1.set_user(values.run_as.user, values.run_as.group) %}
{% do c1.depends.add_dependency(values.consts.postgres_container_name, "service_healthy") %}
{% do c1.healthcheck.set_test("curl", {"port": values.network.http_port.port_number, "path": "/api/status"}) %}

{% do c1.environment.add_env("SERVER_HTTPS_ENABLED", values.network.certificate_id != "") %}
{% if values.network.certificate_id %}
  {% set cert = values.ix_certificates[values.network.certificate_id] %}
  {% do c1.configs.add("private", cert.privatekey, values.consts.ssl_key_path) %}
  {% do c1.configs.add("public", cert.certificate, values.consts.ssl_cert_path) %}

  {% do c1.environment.add_env("SERVER_HTTPS_PORT", values.network.https_port.port_number) %}
  {% do c1.environment.add_env("SERVER_HTTPS_KEY_PATH", values.consts.ssl_key_path) %}
  {% do c1.environment.add_env("SERVER_HTTPS_CERT_PATH", values.consts.ssl_cert_path) %}

  {% do tpl.portals.add(values.network.https_port, {"name": "HTTPS", "scheme": "https"}) %}
{% endif %}

{% do c1.environment.add_env("SERVER_PORT", values.network.http_port.port_number) %}
{% do c1.environment.add_env("DB_SYSTEM", "postgres") %}
{% do c1.environment.add_env("DB_HOST", values.consts.postgres_container_name) %}
{% do c1.environment.add_env("DB_PORT", postgres.get_port()) %}
{% do c1.environment.add_env("DB_DATABASE", values.consts.db_name) %}
{% do c1.environment.add_env("DB_USERNAME", values.consts.db_user) %}
{% do c1.environment.add_env("DB_PASSWORD", values.game_vault.db_password) %}
{% do c1.environment.add_env("VOLUMES_PLUGINS", values.consts.plugins_path) %}
{% do c1.environment.add_env("VOLUMES_SAVEFILES", values.consts.savefiles_path) %}
{% do c1.environment.add_env("VOLUMES_MEDIA", values.consts.media_path) %}
{% do c1.environment.add_env("VOLUMES_FILES", values.consts.files_path) %}
{% do c1.environment.add_env("VOLUMES_CONFIG", values.consts.config_path) %}

{% do c1.environment.add_user_envs(values.game_vault.additional_envs) %}

{% do c1.add_port(values.network.http_port) %}

{% do c1.add_storage(values.consts.config_path, values.storage.config) %}
{% do perm_container.add_or_skip_action("config", values.storage.config, perms_config) %}

{% do c1.add_storage(values.consts.plugins_path, values.storage.plugins) %}
{% do perm_container.add_or_skip_action("plugins", values.storage.plugins, perms_config) %}

{% do c1.add_storage(values.consts.media_path, values.storage.media) %}
{% do perm_container.add_or_skip_action("media", values.storage.media, perms_config) %}

{% do c1.add_storage(values.consts.savefiles_path, values.storage.savefiles) %}
{% do perm_container.add_or_skip_action("savefiles", values.storage.savefiles, perms_config) %}

{% do c1.add_storage(values.consts.files_path, values.storage.files) %}
{% do perm_container.add_or_skip_action("files", values.storage.files, perms_config) %}

{% for store in values.storage.additional_storage %}
  {% do c1.add_storage(store.mount_path, store) %}
  {% do perm_container.add_or_skip_action(store.mount_path, store, perms_config) %}
{% endfor %}

{% if perm_container.has_actions() %}
  {% do perm_container.activate() %}
  {% do c1.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
  {% do postgres.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
{% endif %}

{% do tpl.portals.add(values.network.http_port) %}

{{ tpl.render() | tojson }}
