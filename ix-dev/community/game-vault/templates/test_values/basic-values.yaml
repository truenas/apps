resources:
  limits:
    cpus: 2.0
    memory: 4096

game_vault:
  postgres_image_selector: postgres_18_image
  db_password: some-secret-password
  additional_envs: []

network:
  http_port:
    bind_mode: published
    port_number: 8081
  https_port:
    bind_mode: ""
    port_number: 8444
  certificate_id:

run_as:
  user: 568
  group: 568

ix_volumes:
  config: /opt/tests/mnt/game-vault/config
  plugins: /opt/tests/mnt/game-vault/plugins
  media: /opt/tests/mnt/game-vault/media
  savefiles: /opt/tests/mnt/game-vault/savefiles
  files: /opt/tests/mnt/game-vault/files
  postgres_data: /opt/tests/mnt/game-vault/postgres-data

storage:
  config:
    type: ix_volume
    ix_volume_config:
      dataset_name: config
      create_host_path: true
  plugins:
    type: ix_volume
    ix_volume_config:
      dataset_name: plugins
      create_host_path: true
  media:
    type: ix_volume
    ix_volume_config:
      dataset_name: media
      create_host_path: true
  savefiles:
    type: ix_volume
    ix_volume_config:
      dataset_name: savefiles
      create_host_path: true
  files:
    type: ix_volume
    ix_volume_config:
      dataset_name: files
      create_host_path: true
  postgres_data:
    type: ix_volume
    ix_volume_config:
      dataset_name: postgres_data
      create_host_path: true
  additional_storage: []
