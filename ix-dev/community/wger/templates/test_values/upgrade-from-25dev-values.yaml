# Simulates the stored config of a user upgrading from wger 2.5-dev (app version 1.2.26).
# This represents the values a TrueNAS user would have had before the 2.6 upgrade.
# Used to validate that:
#   1. The migration script passes these values through unchanged (no schema keys removed/added)
#   2. The template renders successfully with this config
#   3. The rendered compose is valid
#
# Key differences vs the current 2.5-dev schema: none — no user-facing fields were
# added or removed in 2.6, so this file is structurally identical to basic-values.yaml.
# The breaking changes were all internal env var renames handled in the template.

resources:
  limits:
    cpus: 2.0
    memory: 4096

TZ: America/New_York

wger:
  postgres_image_selector: postgres_18_image
  db_password: myoldpassword
  redis_password: myoldredispassword
  secret_key: aaaaaaaaaabbbbbbbbbbccccccccccddddddddddeeeeeeeeee
  signing_key: 11111111112222222222333333333344444444445555555555
  trusted_origins:
    - http://192.168.1.50:30170
    - https://wger.example.com
  max_upload_size_mb: 50
  additional_envs: []

network:
  host_network: false
  web_port:
    bind_mode: published
    port_number: 30170

ix_volumes:
  static: /opt/tests/mnt/wger/static
  media: /opt/tests/mnt/wger/media
  beat: /opt/tests/mnt/wger/beat
  postgres_data: /opt/tests/mnt/wger/postgres-data

storage:
  static:
    type: ix_volume
    ix_volume_config:
      dataset_name: static
      create_host_path: true
  media:
    type: ix_volume
    ix_volume_config:
      dataset_name: media
      create_host_path: true
  beat:
    type: ix_volume
    ix_volume_config:
      dataset_name: beat
      create_host_path: true
  postgres_data:
    type: ix_volume
    ix_volume_config:
      dataset_name: postgres_data
      create_host_path: true
  additional_storage: []
