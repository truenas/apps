resources:
  limits:
    cpus: 2.0
    memory: 4096

TZ: Etc/UTC

wger:
  postgres_image_selector: postgres_18_image
  db_password: wger
  redis_password: wger
  secret_key: secret
  jwt_private_key: ""
  jwt_public_key: ""
  trusted_origins:
    - http://localhost:8080
  site_url: http://localhost:8080
  refresh_token_lifetime: 3000
  max_upload_size_mb: 100
  additional_envs: []

network:
  host_network: false
  web_port:
    bind_mode: published
    port_number: 8080

ix_volumes:
  static: /opt/tests/mnt/wger/static
  media: /opt/tests/mnt/wger/media
  beat: /opt/tests/mnt/wger/beat
  postgres_data: /opt/tests/mnt/wger/postgres-data

storage:
  static:
    type: ix_volume
    ix_volume_config:
      dataset_name: static
      create_host_path: true
  media:
    type: ix_volume
    ix_volume_config:
      dataset_name: media
      create_host_path: true
  beat:
    type: ix_volume
    ix_volume_config:
      dataset_name: beat
      create_host_path: true
  postgres_data:
    type: ix_volume
    ix_volume_config:
      dataset_name: postgres_data
      create_host_path: true
  additional_storage: []
