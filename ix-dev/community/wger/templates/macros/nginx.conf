{% macro nginx_config(values) -%}
upstream wger {
    server {{ values.consts.server_container_name }}:{{ values.consts.internal_server_port }};
}

server {
    listen {{ values.network.web_port.port_number }};

    location / {
        proxy_pass http://wger;

        # Standard proxy headers
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $final_forwarded_proto;
        proxy_set_header X-Forwarded-Host $http_host;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_redirect off;
        proxy_http_version 1.1;

        # Timeouts for WebSocket connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /static/ {
        alias /wger/static/;

        # Files in the static folder are preprocessed by collectstatic and have a hash
        # in their names, so we can cache longer
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Vary "Accept-Encoding" always;
    }

    location /media/ {
        alias /wger/media/;
    }

    location /health {
        return 200;
    }

    client_max_body_size {{ values.wger.max_upload_size_mb }}M;
}
{% endmacro %}
