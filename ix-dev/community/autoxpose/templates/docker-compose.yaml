{% set tpl = ix_lib.base.render.Render(values) %}

{% set c1 = tpl.add_container(values.consts.autoxpose_container_name, "image") %}

{% do c1.healthcheck.set_test("wget", {"port": values.network.web_port.port_number, "path": "/api/health"}) %}

{% do c1.environment.add_env("PORT", values.network.web_port.port_number) %}
{% do c1.environment.add_env("SERVER_IP", values.autoxpose.server_ip) %}
{% do c1.environment.add_env("LAN_IP", values.autoxpose.lan_ip) %}
{% do c1.environment.add_user_envs(values.autoxpose.additional_envs) %}

{% do c1.add_port(values.network.web_port) %}

{% do c1.add_docker_socket(read_only=True) %}
{% do c1.add_storage(values.consts.data_path, values.storage.data) %}

{% for store in values.storage.additional_storage %}
  {% do c1.add_storage(store.mount_path, store) %}
{% endfor %}

{% do tpl.portals.add(values.network.web_port) %}

{{ tpl.render() | tojson }}
