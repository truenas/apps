images:
  image:
    repository: seafileltd/seafile-mc
    tag: 13.0.24
  mariadb_image:
    repository: mariadb
    tag: 12.3.2
  redis_image:
    repository: valkey/valkey
    tag: 9.1.0
  nginx_image:
    repository: nginxinc/nginx-unprivileged
    tag: 1.31.1
  seadoc_image:
    repository: seafileltd/sdoc-server
    tag: 2.0.9
  container_utils_image:
    repository: ixsystems/container-utils
    tag: 1.0.2

consts:
  seafile_container_name: seafile
  mariadb_container_name: db
  redis_container_name: redis
  nginx_container_name: nginx
  seadoc_container_name: seadoc
  perms_container_name: permissions
  ssl_cert_path: /data/certs/cert.pem
  ssl_key_path: /data/certs/key.pem
  db_user: seafile
  db_name: seafile
  notes_body: |
    Default credentials:
    - Username: `admin@example.com`
    - Password: `<set during installation>`
