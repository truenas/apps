TZ: America/New_York

seafile:
  server_hostname: seafile.example.com:30180
  admin_email: admin@example.com
  admin_password: SecurePassword123!
  jwt_private_key: changethisplaceholderkeythatisatleast32chars
  enable_seadoc: true
  additional_envs:
    - name: ENABLE_AUDIT_LOG
      value: "true"
    - name: MAX_UPLOAD_SIZE
      value: "5368709120"

seadoc:
  seadoc_server_url: http://seafile.example.com:30180/sdoc-server

run_as:
  user: 568
  group: 568

database:
  db_root_password: RootPassword123!
  db_password: SeafilePassword123!
  redis_password: RedisPassword123!

ix_volumes:
  data: /opt/tests/mnt/seafile/data
  db_data: /opt/tests/mnt/seafile/db_data
  redis_data: /opt/tests/mnt/seafile/redis_data
  caddy_data: /opt/tests/mnt/seafile/caddy_data
  seadoc_data: /opt/tests/mnt/seafile/seadoc_data

network:
  web_port:
    bind_mode: published
    port_number: 30180
    host_ips: []

storage:
  data:
    type: host_path
    host_path_config:
      path: /mnt/pool/seafile/data
      acl_enable: false
  db_data:
    type: host_path
    host_path_config:
      path: /mnt/pool/seafile/db_data
      acl_enable: false
  redis_data:
    type: host_path
    host_path_config:
      path: /mnt/pool/seafile/redis_data
      acl_enable: false
  caddy_data:
    type: host_path
    host_path_config:
      path: /mnt/pool/seafile/caddy_data
      acl_enable: false
  seadoc_data:
    type: host_path
    host_path_config:
      path: /mnt/pool/seafile/seadoc_data
      acl_enable: false
  additional_storage:
    - mount_path: /backup
      type: host_path
      read_only: false
      host_path_config:
        path: /mnt/pool/seafile/backup
        acl_enable: false

resources:
  limits:
    cpus: 4
    memory: 4096