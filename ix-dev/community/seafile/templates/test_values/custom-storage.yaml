TZ: America/New_York

seafile:
  server_hostname: seafile.example.com:30426
  admin_email: admin@example.com
  admin_password: SecurePassword123!
  jwt_private_key: changethisplaceholderkeythatisatleast32chars
  enable_seadoc: true
  additional_envs:
    - name: ENABLE_AUDIT_LOG
      value: "true"
    - name: MAX_UPLOAD_SIZE
      value: "5368709120"

seadoc:
  seadoc_server_url: http://seafile.example.com:30426/sdoc-server

run_as:
  user: 568
  group: 568

database:
  db_root_password: RootPassword123!
  db_password: SeafilePassword123!
  redis_password: RedisPassword123!

ix_volumes:
  data: /opt/tests/mnt/seafile/data
  db_data: /opt/tests/mnt/seafile/db_data
  redis_data: /opt/tests/mnt/seafile/redis_data
  caddy_data: /opt/tests/mnt/seafile/caddy_data
  seadoc_data: /opt/tests/mnt/seafile/seadoc_data
  backup: /opt/tests/mnt/seafile/backup

network:
  web_port:
    bind_mode: published
    port_number: 30426
    host_ips: []

storage:
  data:
    type: ix_volume
    ix_volume_config:
      dataset_name: data
      create_host_path: true
  db_data:
    type: ix_volume
    ix_volume_config:
      dataset_name: db_data
      create_host_path: true
  redis_data:
    type: ix_volume
    ix_volume_config:
      dataset_name: redis_data
      create_host_path: true
  caddy_data:
    type: ix_volume
    ix_volume_config:
      dataset_name: caddy_data
      create_host_path: true
  seadoc_data:
    type: ix_volume
    ix_volume_config:
      dataset_name: seadoc_data
      create_host_path: true
  additional_storage:
    - mount_path: /backup
      type: ix_volume
      read_only: false
      ix_volume_config:
        dataset_name: backup
        create_host_path: true

resources:
  limits:
    cpus: 4
    memory: 4096