{% set tpl = ix_lib.base.render.Render(values) %}

{% if not values.seafile.server_hostname %}
  {% do tpl.funcs.fail("Server Hostname is required.") %}
{% endif %}

{% set seafile_net = tpl.networks.create_internal("seafile-net") %}

{% set perm_container = tpl.deps.perms(values.consts.perms_container_name) %}
{% set perms_config = {"uid": values.run_as.user, "gid": values.run_as.group, "mode": "check"} %}

{% set mariadb_config = {
  "user": values.consts.db_user,
  "password": values.database.db_password,
  "database": values.consts.db_name,
  "root_password": values.database.db_root_password,
  "volume": values.storage.db_data,
} %}
{% set mariadb_container = tpl.deps.mariadb(values.consts.mariadb_container_name, "mariadb_image", mariadb_config, perm_container) %}
{% do mariadb_container.container.add_network(seafile_net) %}

{% set redis_config = {
  "password": values.database.redis_password,
  "volume": values.storage.redis_data,
} %}
{% set redis = tpl.deps.redis(values.consts.redis_container_name, "redis_image", redis_config, perm_container) %}
{% do redis.container.add_network(seafile_net) %}

{% set seafile = tpl.add_container(values.consts.seafile_container_name, "image") %}
{% do seafile.add_network(seafile_net) %}
{% do seafile.add_caps(["CHOWN", "DAC_OVERRIDE", "FOWNER", "SETGID", "SETUID"]) %}
{% do seafile.healthcheck.set_test("curl", {"port": 80, "path": "/"}) %}
{% do seafile.healthcheck.set_timeout(10) %}
{% do seafile.healthcheck.set_retries(3) %}
{% do seafile.healthcheck.set_start_period(10) %}
{% do seafile.environment.add_env("SEAFILE_MYSQL_DB_HOST", values.consts.mariadb_container_name) %}
{% do seafile.environment.add_env("SEAFILE_MYSQL_DB_PORT", "3306") %}
{% do seafile.environment.add_env("SEAFILE_MYSQL_DB_USER", values.consts.db_user) %}
{% do seafile.environment.add_env("SEAFILE_MYSQL_DB_PASSWORD", values.database.db_password) %}
{% do seafile.environment.add_env("INIT_SEAFILE_MYSQL_ROOT_PASSWORD", values.database.db_root_password) %}
{% do seafile.environment.add_env("SEAFILE_MYSQL_DB_CCNET_DB_NAME", "ccnet_db") %}
{% do seafile.environment.add_env("SEAFILE_MYSQL_DB_SEAFILE_DB_NAME", "seafile_db") %}
{% do seafile.environment.add_env("SEAFILE_MYSQL_DB_SEAHUB_DB_NAME", "seahub_db") %}
{% do seafile.environment.add_env("SEAFILE_SERVER_HOSTNAME", values.seafile.server_hostname) %}
{% set seafile_proto = "https" if values.network.certificate_id else "http" %}
{% do seafile.environment.add_env("SEAFILE_SERVER_PROTOCOL", seafile_proto) %}
{% do seafile.environment.add_env("INIT_SEAFILE_ADMIN_EMAIL", values.seafile.admin_email) %}
{% do seafile.environment.add_env("INIT_SEAFILE_ADMIN_PASSWORD", values.seafile.admin_password) %}
{% do seafile.environment.add_env("TIME_ZONE", values.TZ) %}
{% do seafile.environment.add_env("CACHE_PROVIDER", "redis") %}
{% do seafile.environment.add_env("REDIS_HOST", values.consts.redis_container_name) %}
{% do seafile.environment.add_env("REDIS_PORT", values.consts.redis_port) %}
{% do seafile.environment.add_env("REDIS_PASSWORD", values.database.redis_password) %}
{% do seafile.environment.add_env("ENABLE_GO_FILESERVER", "true") %}
{% do seafile.environment.add_env("JWT_PRIVATE_KEY", values.seafile.jwt_private_key) %}

{% if values.seafile.enable_seadoc %}
  {% do seafile.environment.add_env("ENABLE_SEADOC", "true") %}
  {% set seadoc_url = values.seadoc.seadoc_server_url or seafile_proto + "://" + values.seafile.server_hostname + "/sdoc-server" %}
  {% do seafile.environment.add_env("SEADOC_SERVER_URL", seadoc_url) %}
{% endif %}

{% do seafile.environment.add_user_envs(values.seafile.additional_envs) %}

{% do seafile.add_storage("/shared", values.storage.data) %}
{% do perm_container.add_or_skip_action("data", values.storage.data, perms_config) %}

{% for store in values.storage.additional_storage %}
  {% do seafile.add_storage(store.mount_path, store) %}
  {% do perm_container.add_or_skip_action(store.mount_path, store, perms_config) %}
{% endfor %}

{% do seafile.depends.add_dependency(values.consts.mariadb_container_name, "service_healthy") %}
{% do seafile.depends.add_dependency(values.consts.redis_container_name, "service_healthy") %}

{% set seadoc = none %}
{% if values.seafile.enable_seadoc %}
  {% set seadoc = tpl.add_container(values.consts.seadoc_container_name, "seadoc_image") %}
  {% do seadoc.add_network(seafile_net) %}
  {% do seadoc.set_user(0, 0) %}
  {% do seadoc.add_caps(["CHOWN", "DAC_OVERRIDE", "FOWNER", "SETGID", "SETUID"]) %}
  {% do seadoc.add_storage("/shared", values.storage.seadoc_data) %}
  {% do seadoc.environment.add_env("DB_HOST", values.consts.mariadb_container_name) %}
  {% do seadoc.environment.add_env("DB_PORT", "3306") %}
  {% do seadoc.environment.add_env("DB_USER", values.consts.db_user) %}
  {% do seadoc.environment.add_env("DB_PASSWORD", values.database.db_password) %}
  {% do seadoc.environment.add_env("DB_NAME", "seahub_db") %}
  {% do seadoc.environment.add_env("TIME_ZONE", values.TZ) %}
  {% do seadoc.environment.add_env("JWT_PRIVATE_KEY", values.seafile.jwt_private_key) %}
  {% do seadoc.environment.add_env("SEAHUB_SERVICE_URL", "http://" + values.consts.seafile_container_name) %}
  {% do seadoc.add_extra_host(values.seafile.server_hostname.split(":")[0], "host-gateway") %}
  {% do seadoc.environment.add_env("NON_ROOT", "false") %}
  {% do seadoc.healthcheck.disable() %}
  {% do seadoc.depends.add_dependency(values.consts.mariadb_container_name, "service_healthy") %}
  {% do perm_container.add_or_skip_action("seadoc_data", values.storage.seadoc_data, {"uid": 0, "gid": 0, "mode": "check"}) %}
{% endif %}

{% set caddyfile_lines = [] %}
{% if values.network.certificate_id %}
  {% do caddyfile_lines.append(":80 {") %}
  {% do caddyfile_lines.append("    redir https://{host}{uri}") %}
  {% do caddyfile_lines.append("}") %}
  {% do caddyfile_lines.append(":443 {") %}
  {% do caddyfile_lines.append("    tls " ~ values.consts.ssl_cert_path ~ " " ~ values.consts.ssl_key_path) %}
{% else %}
  {% do caddyfile_lines.append(":80 {") %}
{% endif %}
{% if values.seafile.enable_seadoc %}
  {% do caddyfile_lines.append("    handle /socket.io/* {") %}
  {% do caddyfile_lines.append("        reverse_proxy " ~ values.consts.seadoc_container_name ~ ":80") %}
  {% do caddyfile_lines.append("    }") %}
  {% do caddyfile_lines.append("    handle_path /sdoc-server/* {") %}
  {% do caddyfile_lines.append("        reverse_proxy " ~ values.consts.seadoc_container_name ~ ":80") %}
  {% do caddyfile_lines.append("    }") %}
{% endif %}
{% do caddyfile_lines.append("    reverse_proxy " ~ values.consts.seafile_container_name ~ ":80") %}
{% do caddyfile_lines.append("}") %}
{% set caddyfile_content = caddyfile_lines | join("\n") %}

{% set caddy = tpl.add_container(values.consts.caddy_container_name, "caddy_image") %}
{% do caddy.add_network(seafile_net) %}
{% do caddy.set_user(values.run_as.user, values.run_as.group) %}
{% do caddy.add_caps(["NET_BIND_SERVICE"]) %}
{% do caddy.add_port(values.network.web_port, {"container_port": 80}) %}
{% if values.network.certificate_id %}
  {% set cert = values.ix_certificates[values.network.certificate_id] %}
  {% do caddy.add_port(values.network.https_port, {"container_port": 443}) %}
  {% do caddy.configs.add("private", cert.privatekey, values.consts.ssl_key_path) %}
  {% do caddy.configs.add("public", cert.certificate, values.consts.ssl_cert_path) %}
{% endif %}
{% do caddy.configs.add("caddyfile", caddyfile_content, "/etc/caddy/Caddyfile") %}
{% do caddy.add_storage("/data", values.storage.caddy_data) %}
{% do caddy.healthcheck.set_test("curl", {"port": 80, "path": "/"}) %}
{% do caddy.depends.add_dependency(values.consts.seafile_container_name, "service_healthy") %}
{% do perm_container.add_or_skip_action("caddy_data", values.storage.caddy_data, perms_config) %}

{% if perm_container.has_actions() %}
  {% do perm_container.activate() %}
  {% do seafile.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
  {% do mariadb_container.container.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
  {% do redis.container.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
  {% do caddy.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
  {% if seadoc %}
    {% do seadoc.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
  {% endif %}
{% endif %}

{% do tpl.portals.add(values.network.web_port) %}
{% if values.network.certificate_id %}
  {% do tpl.portals.add(values.network.https_port, {"name": "HTTPS", "scheme": "https"}) %}
{% endif %}

{% do tpl.notes.set_body(values.consts.notes_body) %}

{{ tpl.render() | tojson }}
