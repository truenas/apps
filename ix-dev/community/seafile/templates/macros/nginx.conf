{% macro nginx_config(values, seadoc_enabled) -%}
{% if values.network.certificate_id %}
server {
    listen {{ values.network.web_port.port_number }};
    location /health {
        return 200;
    }
    return 301 https://$host{{ ":" ~ values.network.https_port.port_number if values.network.https_port.port_number != 443 else "" }}$request_uri;
}

server {
    listen {{ values.network.https_port.port_number }} ssl;
    ssl_certificate {{ values.consts.ssl_cert_path }};
    ssl_certificate_key {{ values.consts.ssl_key_path }};
{% else %}
server {
    listen {{ values.network.web_port.port_number }};
{% endif %}

    location /health {
        return 200;
    }

{% if seadoc_enabled %}
    location /socket.io {
        proxy_pass http://{{ values.consts.seadoc_container_name }}:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffers 8 32k;
        proxy_buffer_size 64k;
    }

    location /sdoc-server/ {
        proxy_pass http://{{ values.consts.seadoc_container_name }}:80/;
        proxy_redirect off;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $server_name;
        client_max_body_size 100m;
    }
{% endif %}

    location / {
        proxy_pass http://{{ values.consts.seafile_container_name }}:80;
        proxy_read_timeout 310s;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_http_version 1.1;
        client_max_body_size 0;
    }
}
{% endmacro %}
