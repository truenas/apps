  name: CHOWN
- description: Seafile requires DAC_OVERRIDE to bypass permission checks during setup.
  name: DAC_OVERRIDE
- description: Seafile requires FOWNER to modify file ownership.
  name: FOWNER
- description: Seafile requires SETGID to run nginx workers as the www-data group.
  name: SETGID
- description: Seafile requires SETUID to run nginx workers as the www-data user.
  name: SETUID
