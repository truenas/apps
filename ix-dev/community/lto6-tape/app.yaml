annotations:
  min_scale_version: 24.10.0
app_version: 1.0.0
capabilities:
- description: LTO-6 Tape Manager needs to perform FUSE filesystem operations (LTFS
    mount).
  name: SYS_ADMIN
- description: LTO-6 Tape Manager needs to perform raw SCSI I/O to the tape drive.
  name: SYS_RAWIO
- description: LTO-6 Tape Manager needs to change file ownership for mount points.
  name: CHOWN
- description: LTO-6 Tape Manager needs to bypass file permission checks.
  name: DAC_OVERRIDE
categories:
- storage
- backup
changelog_url: https://github.com/eddiejdi/truenas-lto6-app/blob/main/ix-dev/stable/lto6-tape/CHANGELOG.md
date_added: ''
description: "Manages LTO-6 tape drives (LTFS) on TrueNAS \u2014 orchestrated mount/eject,\
  \ auto-mount on tape insertion, auto-eject on physical button press, with a mandatory\
  \ pre-tape buffer area and Prometheus monitoring."
home: https://github.com/eddiejdi/truenas-lto6-app
host_mounts:
- description: SCSI generic device for the LTO tape drive (e.g. /dev/sg4)
  host_path: /dev/sg4
- description: No-rewind tape device for the LTO drive (e.g. /dev/nst1)
  host_path: /dev/nst1
- description: "FUSE device \u2014 required for LTFS filesystem mounting"
  host_path: /dev/fuse
- description: "DBus socket \u2014 allows the app to control the host LTFS systemd\
    \ service"
  host_path: /var/run/dbus
icon: https://raw.githubusercontent.com/eddiejdi/truenas-lto6-app/main/icon.png
keywords:
- tape
- lto
- ltfs
- backup
- archive
lib_version: 2.3.4
lib_version_hash: 2e3a8847308fb2eb0da046018f287c73822c094b5950a10377c3235794ff1242
maintainers:
- email: dev@truenas.com
  name: eddiejdi
  url: https://github.com/eddiejdi
name: lto6-tape
run_as_context:
- description: The LTO-6 Tape Manager container runs as root. Direct access to SCSI
    tape hardware (/dev/sg*, /dev/nst*) and FUSE mounts requires root privileges.
    There is no rootless path for raw SCSI device control.
  gid: 0
  group_name: root
  uid: 0
  user_name: root
sources:
- https://github.com/eddiejdi/truenas-lto6-app
- https://github.com/LinearTapeFileSystem/ltfs
title: LTO-6 Tape Manager
train: community
version: 1.0.1
