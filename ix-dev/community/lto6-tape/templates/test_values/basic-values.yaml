drive:
  sg_device: /dev/sg4
  nst_device: /dev/nst1
  drive_id: lto6

buffer:
  host_path: /mnt/tank/pretape/lto6-cache
  min_free_gib: 30
  gate_pct: 80
  kill_pct: 88

ltfs:
  mount_point: /mnt/tape/lto6
  service_name: ltfs-lto6.service
  auto_mount_on_insert: true
  auto_eject_on_button: true
  usage_window_start: "02:00"
  usage_window_end: "04:00"

notifications:
  telegram_bot_token: ""
  telegram_chat_id: ""

network:
  orchestrator_port: 9877
  exporter_port: 9125

resources:
  limits:
    cpus: 2
    memory: 1024
