resources:
  limits:
    cpus: 2.0
    memory: 4096

ci: true
TZ: UTC

xmrig:
  use_remote_pool: false
  remote_pool_address: ""
  local_xmrig_port: 3333
  pool_username: ""
  pool_password: ""
  cpu_threads: 2
  cpu_priority: low
  use_1gb_huge_pages: false
  use_msr_mod: false
  use_proxy: false
  use_arti_app_proxy: false
  arti_app_proxy_port: 9150
  proxy_host: ""
  proxy_port: 9150
  donate_percentage: 1
  use_config_file: false
  additional_args: []

ix_volumes:
  xmrig_config: /opt/tests/mnt/xmrig_config

storage:
  xmrig_config:
    type: ix_volume
    ix_volume_config:
      dataset_name: xmrig_config
      create_host_path: true
  additional_storage: []
