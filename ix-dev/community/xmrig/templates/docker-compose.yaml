{% from "macros/entrypoint.sh" import entrypoint %}
{% set tpl = ix_lib.base.render.Render(values) %}

{% set perm_container = tpl.deps.perms(values.consts.perms_container_name) %}
{% set perm_config = {"uid": values.consts.run_as_user, "gid": values.consts.run_as_group, "mode": "check"} %}

{% set xmrig = tpl.add_container(values.consts.xmrig_container_name, "image") %}
{% do xmrig.set_user(values.consts.run_as_user, values.consts.run_as_group) %}
{% do xmrig.set_privileged(true) %}
{% do xmrig.add_extra_host("host.docker.internal", "host-gateway") %}
{% do xmrig.healthcheck.disable() %}

{% do xmrig.configs.add("entrypoint.sh", entrypoint(values), "/entrypoint.sh", "0755") %}
{% do xmrig.set_entrypoint(["/entrypoint.sh"]) %}

{% set cpu_priority_map = {
  "idle": 0,
  "low": 1,
  "normal": 2,
  "high": 3,
  "higher": 4,
  "critical": 5,
} %}

{% if not values.xmrig.use_config_file %}
  {% set command = namespace(x=[
    "--url=%s" | format(values.xmrig.remote_pool_address if values.xmrig.use_remote_pool else "host.docker.internal:%d" | format(values.xmrig.local_xmrig_port)),
    "--threads=%d" | format(values.xmrig.cpu_threads),
    "--cpu-priority=%d" | format(cpu_priority_map[values.xmrig.cpu_priority]),
    "--donate-level=%d" | format(values.xmrig.donate_percentage)
  ]) %}

  {% if values.xmrig.pool_username %}
    {% do command.x.append("--user=%s" | format(values.xmrig.pool_username)) %}
  {% endif %}

  {% if values.xmrig.pool_password %}
    {% do command.x.append("--pass=%s" | format(values.xmrig.pool_password)) %}
  {% endif %}

  {% if values.xmrig.use_1gb_huge_pages %}
    {% do command.x.append("--randomx-1gb-pages") %}
  {% endif %}

  {% if not values.xmrig.use_msr_mod %}
    {% do command.x.append("--randomx-wrmsr=-1") %}
  {% endif %}

  {% if values.xmrig.use_proxy %}
    {% if values.xmrig.use_arti_app_proxy %}
      {% do command.x.append("--proxy=host.docker.internal:%d" | format(values.xmrig.arti_app_proxy_port)) %}
    {% else %}
      {% do command.x.append("--proxy=%s:%d" | format(values.xmrig.proxy_host, values.xmrig.proxy_port)) %}
    {% endif %}
  {% endif %}

  {% for item in values.xmrig.additional_args %}
    {% set flag = "--%s"|format(item.flag.lstrip("-")) %}
    {% if flag in values.consts.reserved_args %}
      {% do tpl.funcs.fail("Flag [%s] is reserved and cannot be set in [Additional Args]."|format(flag)) %}
    {% endif %}
    {% do command.x.append(flag) %}
    {% if item.value %}{% do command.x.append(item.value) %}{% endif %}
  {% endfor %}

  {% do xmrig.set_command(command.x) %}
{% endif %}

{% do xmrig.add_storage("/dev/hugepages", {"type": "host_path", "host_path_config": {"path": "/dev/hugepages"}}) %}
{% do xmrig.add_storage("/dev/cpu", {"type": "host_path", "host_path_config": {"path": "/dev/cpu"}}) %}

{% do xmrig.add_storage("/root/.config", values.storage.xmrig_config) %}
{% do perm_container.add_or_skip_action("xmrig_config", values.storage.xmrig_config, perm_config) %}

{% for store in values.storage.additional_storage %}
  {% do xmrig.add_storage(store.mount_path, store) %}
  {% do perm_container.add_or_skip_action(store.mount_path, store, perm_config) %}
{% endfor %}

{% if perm_container.has_actions() %}
  {% do perm_container.activate() %}
  {% do xmrig.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
{% endif %}

{{ tpl.render() | tojson }}
