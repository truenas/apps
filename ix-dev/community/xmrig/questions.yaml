groups:
  - name: XMRig Configuration
    description: Configure XMRig
  - name: Network Configuration
    description: Configure Network for XMRig
  - name: Storage Configuration
    description: Configure Storage for XMRig
  - name: Labels Configuration
    description: Configure Labels for XMRig
  - name: Resources Configuration
    description: Configure Resources for XMRig

questions:
  - variable: TZ
    group: XMRig Configuration
    label: Timezone
    schema:
      type: string
      default: Etc/UTC
      required: true
      $ref:
        - definitions/timezone

  - variable: xmrig
    label: ""
    group: XMRig Configuration
    schema:
      type: dict
      attrs:
        - variable: use_remote_pool
          label: Use Remote Pool
          description: |
            Leaving this disabled will attempt to use your installed XMRig.
            If you do not run the XMRig app, you need to specify a pool address.
          schema:
            type: boolean
            default: false
            show_if: [["use_config_file", "=", false]]
        - variable: remote_pool_address
          label: Pool Address
          description: The address of the pool you want to use. E.g.: pool.example.com:3333
          schema:
            type: uri
            required: true
            show_if:
              [["use_remote_pool", "=", true], ["use_config_file", "=", false]]
        - variable: local_xmrig_port
          label: XMRig Port
          description: The port your XMRig app is listening on.
          schema:
            type: int
            min: 1
            max: 65535
            default: 3333
            required: true
            show_if:
              [["use_remote_pool", "=", false], ["use_config_file", "=", false]]
        - variable: pool_username
          label: Pool Username
          schema:
            type: string
            required: false
            show_if: [["use_config_file", "=", false]]
        - variable: pool_password
          label: Pool Password
          schema:
            type: string
            required: false
            private: true
            show_if: [["use_config_file", "=", false]]
        - variable: cpu_threads
          label: CPU Threads
          description: The number of CPU threads to use for mining.
          schema:
            type: int
            min: 1
            max: 100
            default: 1
            required: true
            show_if: [["use_config_file", "=", false]]
        - variable: cpu_priority
          label: CPU Priority
          description: The priority of the XMRig process.
          schema:
            type: string
            deafult: low
            required: true
            enum:
              - value: idle
                description: Idle
              - value: low
                description: Low
              - value: normal
                description: Normal
              - value: high
                description: High
              - value: higher
                description: Higher
              - value: critical
                description: Critical
            show_if: [["use_config_file", "=", false]]
        - variable: use_1gb_huge_pages
          label: Use 1GB Huge Pages
          description: |
            This increases the hashrate by 1-3% (depends on CPU) and increases memory requirements
            to 3GB (3 pages) per NUMA node.
          schema:
            type: boolean
            default: false
            show_if: [["use_config_file", "=", false]]
        - variable: use_msr_mod
          label: Use MSR Mod
          description: |
            Enabling this may increase the hashrate by 10-30%, but will grant XMRig privileged
            access to the host.
          schema:
            type: boolean
            default: false
            show_if: [["use_config_file", "=", false]]
        - variable: use_proxy
          label: Use SOCKS5 Proxy
          schema:
            type: boolean
            default: false
            show_if: [["use_config_file", "=", false]]
        - variable: use_arti_app_proxy
          label: Use Arti App Proxy
          description: |
            If you have the Arti app installed, enable this to use it as a proxy.
          schema:
            type: boolean
            default: false
            show_if: [["use_proxy", "=", true], ["use_config_file", "=", false]]
        - variable: arti_app_proxy_port
          label: Arti App Proxy Port
          schema:
            type: int
            min: 1
            max: 65535
            default: 9150
            required: true
            show_if:
              [
                ["use_proxy", "=", true],
                ["use_arti_app_proxy", "=", true],
                ["use_config_file", "=", false],
              ]
        - variable: proxy_host
          label: Proxy Host
          schema:
            type: string
            required: true
            show_if:
              [
                ["use_proxy", "=", true],
                ["use_arti_app_proxy", "=", false],
                ["use_config_file", "=", false],
              ]
        - variable: proxy_port
          label: Proxy Port
          schema:
            type: int
            min: 1
            max: 65535
            required: true
            show_if:
              [
                ["use_proxy", "=", true],
                ["use_arti_app_proxy", "=", false],
                ["use_config_file", "=", false],
              ]
        - variable: donate_percentage
          label: Donate Percentage
          description: The percentage of your hashrate to donate to the XMRig developers.
          schema:
            type: int
            min: 1
            max: 100
            default: 1
            required: true
        - variable: use_config_file
          label: Use Config File
          description: |
            Enabling this will use the config file and will ignore any options set here.</br>
            Use this if you wish to have a more advanced configuration.</br>
            You can find the config file in the config storage.</br>
            Reference: https://github.com/xmrig/xmrig/blob/master/src/config.json
          schema:
            type: boolean
            default: false
        - variable: additional_args
          label: Additional Args
          description: |
            Additional XMRig arguments can be provided here.
            If you are unsure, leave this blank.</br>
            Reference: https://xmrig.com/docs/miner/command-line-options
          schema:
            type: list
            items:
              - variable: arg
                label: Arg
                schema:
                  type: dict
                  attrs:
                    - variable: flag
                      label: Flag
                      schema:
                        type: string
                        default: ""
                        required: true
                    - variable: value
                      label: Value
                      schema:
                        type: string
                        default: ""
  - variable: storage
    label: ""
    group: Storage Configuration
    schema:
      type: dict
      attrs:
        - variable: xmrig_config
          label: XMRig Config Storage
          description: The "Use Config File" option must be enabled for the config file to be used.
          schema:
            type: dict
            attrs:
              - variable: type
                label: Type
                description: |
                  ixVolume: Is dataset created automatically by the system.</br>
                  Host Path: Is a path that already exists on the system.
                schema:
                  type: string
                  required: true
                  default: "ix_volume"
                  enum:
                    - value: "host_path"
                      description: Host Path (Path that already exists on the system)
                    - value: "ix_volume"
                      description: ixVolume (Dataset created automatically by the system)
              - variable: ix_volume_config
                label: ixVolume Configuration
                description: The configuration for the ixVolume dataset.
                schema:
                  type: dict
                  show_if: [["type", "=", "ix_volume"]]
                  $ref:
                    - "normalize/ix_volume"
                  attrs:
                    - variable: acl_enable
                      label: Enable ACL
                      description: Enable ACL for the storage.
                      schema:
                        type: boolean
                        default: false
                    - variable: dataset_name
                      label: Dataset Name
                      description: The name of the dataset to use for storage.
                      schema:
                        type: string
                        required: true
                        hidden: true
                        default: "xmrig_config"
                    - variable: acl_entries
                      label: ACL Configuration
                      schema:
                        type: dict
                        show_if: [["acl_enable", "=", true]]
                        attrs: []
              - variable: host_path_config
                label: Host Path Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "host_path"]]
                  attrs:
                    - variable: acl_enable
                      label: Enable ACL
                      description: Enable ACL for the storage.
                      schema:
                        type: boolean
                        default: false
                    - variable: acl
                      label: ACL Configuration
                      schema:
                        type: dict
                        show_if: [["acl_enable", "=", true]]
                        attrs: []
                        $ref:
                          - "normalize/acl"
                    - variable: path
                      label: Host Path
                      description: The host path to use for storage.
                      schema:
                        type: hostpath
                        show_if: [["acl_enable", "=", false]]
                        required: true
        - variable: additional_storage
          label: Additional Storage
          schema:
            type: list
            default: []
            items:
              - variable: storageEntry
                label: Storage Entry
                schema:
                  type: dict
                  attrs:
                    - variable: type
                      label: Type
                      description: |
                        ixVolume: Is dataset created automatically by the system.</br>
                        Host Path: Is a path that already exists on the system.</br>
                        SMB Share: Is a SMB share that is mounted to as a volume.</br>
                        NFS Share: Is a NFS share that is mounted to as a volume.
                      schema:
                        type: string
                        required: true
                        default: "ix_volume"
                        enum:
                          - value: "host_path"
                            description: Host Path (Path that already exists on the system)
                          - value: "ix_volume"
                            description: ixVolume (Dataset created automatically by the system)
                          - value: "cifs"
                            description: SMB/CIFS Share (Mounts a volume to a SMB share)
                          - value: "nfs"
                            description: NFS Share (Mounts a volume to a NFS share)
                    - variable: read_only
                      label: Read Only
                      description: Mount the volume as read only.
                      schema:
                        type: boolean
                        default: false
                    - variable: mount_path
                      label: Mount Path
                      description: The path inside the container to mount the storage.
                      schema:
                        type: path
                        required: true
                    - variable: host_path_config
                      label: Host Path Configuration
                      schema:
                        type: dict
                        show_if: [["type", "=", "host_path"]]
                        attrs:
                          - variable: acl_enable
                            label: Enable ACL
                            description: Enable ACL for the storage.
                            schema:
                              type: boolean
                              default: false
                          - variable: acl
                            label: ACL Configuration
                            schema:
                              type: dict
                              show_if: [["acl_enable", "=", true]]
                              attrs: []
                              $ref:
                                - "normalize/acl"
                          - variable: path
                            label: Host Path
                            description: The host path to use for storage.
                            schema:
                              type: hostpath
                              show_if: [["acl_enable", "=", false]]
                              required: true
                    - variable: ix_volume_config
                      label: ixVolume Configuration
                      description: The configuration for the ixVolume dataset.
                      schema:
                        type: dict
                        show_if: [["type", "=", "ix_volume"]]
                        $ref:
                          - "normalize/ix_volume"
                        attrs:
                          - variable: acl_enable
                            label: Enable ACL
                            description: Enable ACL for the storage.
                            schema:
                              type: boolean
                              default: false
                          - variable: dataset_name
                            label: Dataset Name
                            description: The name of the dataset to use for storage.
                            schema:
                              type: string
                              required: true
                              default: "storage_entry"
                          - variable: acl_entries
                            label: ACL Configuration
                            schema:
                              type: dict
                              show_if: [["acl_enable", "=", true]]
                              attrs: []
                              $ref:
                                - "normalize/acl"
                    - variable: cifs_config
                      label: SMB Configuration
                      description: The configuration for the SMB dataset.
                      schema:
                        type: dict
                        show_if: [["type", "=", "cifs"]]
                        attrs:
                          - variable: server
                            label: Server
                            description: The server to mount the SMB share.
                            schema:
                              type: string
                              required: true
                          - variable: path
                            label: Path
                            description: The path to mount the SMB share.
                            schema:
                              type: string
                              required: true
                          - variable: username
                            label: Username
                            description: The username to use for the SMB share.
                            schema:
                              type: string
                              required: true
                          - variable: password
                            label: Password
                            description: The password to use for the SMB share.
                            schema:
                              type: string
                              required: true
                              private: true
                          - variable: domain
                            label: Domain
                            description: The domain to use for the SMB share.
                            schema:
                              type: string
                    - variable: nfs_config
                      label: NFS Configuration
                      description: The configuration for the NFS dataset.
                      schema:
                        type: dict
                        show_if: [["type", "=", "nfs"]]
                        attrs:
                          - variable: server
                            label: Server
                            description: The server to mount the NFS share.
                            schema:
                              type: string
                              required: true
                          - variable: path
                            label: Path
                            description: The path to mount the NFS share.
                            schema:
                              type: string
                              required: true

  - variable: labels
    label: ""
    group: Labels Configuration
    schema:
      type: list
      default: []
      items:
        - variable: label
          label: Label
          schema:
            type: dict
            attrs:
              - variable: key
                label: Key
                schema:
                  type: string
                  required: true
              - variable: value
                label: Value
                schema:
                  type: string
                  required: true
              - variable: containers
                label: Containers
                description: Containers where the label should be applied
                schema:
                  type: list
                  items:
                    - variable: container
                      label: Container
                      schema:
                        type: string
                        required: true
                        enum:
                          - value: xmrig
                            description: xmrig

  - variable: resources
    label: ""
    group: Resources Configuration
    schema:
      type: dict
      attrs:
        - variable: limits
          label: Limits
          schema:
            type: dict
            attrs:
              - variable: cpus
                label: CPUs
                description: CPUs limit for XMRig.
                schema:
                  type: int
                  default: 2
                  required: true
              - variable: memory
                label: Memory (in MB)
                description: Memory limit for XMRig.
                schema:
                  type: int
                  default: 4096
                  required: true
