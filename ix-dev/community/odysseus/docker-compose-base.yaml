docker-compose-base.yaml
```yaml
services:
  chromadb:
    environment:
      - ANONYMIZED_TELEMETRY=FALSE
    image: docker.io/chromadb/chroma:latest
    ports:
      - '8100:8000'
    restart: unless-stopped
    volumes:
      - /mnt/Main/Odysseus/chromadb:/chroma/chroma
  ntfy:
    command: serve
    environment:
      - NTFY_BASE_URL=http://ntfy:80
    image: docker.io/binwiederhier/ntfy
    ports:
      - '8091:80'
    restart: unless-stopped
    volumes:
      - /mnt/Main/Odysseus/ntfy:/var/cache/ntfy
  odysseus:
    depends_on:
      chromadb:
        condition: service_started
    environment:
      - SEARXNG_INSTANCE=https://search.qbsoon.pl
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
      - APP_BIND=0.0.0.0
      - APP_PORT=7000
      - AUTHENTIK_ENABLE=true
      - AUTHENTIK_AUTO_CREATE_USERS=true
      - AUTHENTIK_ID=4LD3ebjejVAbomT4XU88FJeUifQh3ARMRKlpdxkK
      - >-
        AUTHENTIK_SECRET=OImrRaFcyZ2KnU6LHPRCbr2Yk7n6Cn2Ptb6hTRRZJOShgqxKBv5jKtbX3IczmVVJWqz9pQviYFjH8D1nLWwMskPs2THLcayJiDxeYuoZg1fpmmQIibmphPjfJLZsm6Kj
      - AUTHENTIK_ISSUER=https://auth.qbsoon.pl/application/o/odysseus/
      - AUTHENTIK_SCOPE=openid email profile
      - AUTHENTIK_REQUIRE_EMAIL_VERIFIED=false
      - AUTHENTIK_REDIRECT_URI=https://chat.qbsoon.pl/api/auth/oidc/callback
      - SECURE_COOKIES=true
    image: odysseus:latest-auth
    ports:
      - '7000:7000'
    restart: unless-stopped
    volumes:
      - /mnt/Main/Odysseus/data:/app/data
      - /mnt/Main/Odysseus/logs:/app/logs
      - /mnt/Main/Odysseus/ssh:/app/.ssh
      - /mnt/Main/Odysseus/huggingface:/app/.cache/huggingface
      - /mnt/Main/Odysseus/local:/app/.local
