groups:
  - name: Odysseus Configuration
    description: Configure Odysseus
  - name: SearXNG Configuration
    description: Configure SearXNG
  - name: Chromadb Configuration
    description: Configure Chromadb
  - name: Ntfy Configuration
    description: Configure Ntfy
  - name: Network Configuration
    description: Configure Network for Odysseus
  - name: Storage Configuration
    description: Configure Storage for Odysseus
  - name: Labels Configuration
    description: Configure Labels for Odysseus
  - name: Resources Configuration
    description: Configure Resources for Odysseus

questions:
  - variable: TZ
    group: Odysseus Configuration
    label: Timezone
    schema:
      type: string
      default: Etc/UTC
      required: true
      $ref:
        - definitions/timezone

  - variable: odysseus
    label: ""
    group: Odysseus Configuration
    schema:
      type: dict
      attrs:
        - variable: image_selector
          label: Docker Image
          description: |
            Select which Docker image to use.</br>
            - Regular: Standard Odysseus image.</br>
            - Development: Odysseus image from dev branch with latest features and fixes (may be unstable).</br>
            - With Authentik: Odysseus image with added Authentik support.
          schema:
            type: string
            default: "image"
            required: true
            enum:
              - value: "image"
                description: Regular (qbsoon/odysseus-pewds:v1.0.0_6)
              - value: "image-dev"
                description: Development (qbsoon/odysseus-pewds:v1.0.0_6-dev)
              - value: "image-auth"
                description: With Authentik (qbsoon/odysseus-pewds:v1.0.0_6-auth)
        - variable: searxng_instance
          label: SearXNG Instance
          description: |
            The SearXNG instance URL to use for web search.</br>
            If using the local SearXNG container, this will be set automatically to http://searxng:8080.
          schema:
            type: string
            default: ""
            required: false
        - variable: use_local_searxng
          label: Use Local SearXNG
          description: Enable to use a local SearXNG container instead of an external instance.
          schema:
            type: boolean
            default: true
            required: true
        - variable: secure_cookies
          label: Secure Cookies
          description: Enable secure cookies (HTTPS only).
          schema:
            type: boolean
            default: true
            required: true
        - variable: llm_host
          label: LLM Host
          description: Primary LLM host for model inference.
          schema:
            type: string
            default: "localhost"
            required: false
        - variable: llm_hosts
          label: Additional LLM Hosts
          description: Comma-separated list of additional LLM hosts for model discovery.
          schema:
            type: string
            default: ""
            required: false
        - variable: ollama_base_url
          label: Ollama Base URL
          description: Optional Ollama base URL (e.g., http://host.docker.internal:11434/v1).
          schema:
            type: string
            default: ""
            required: false
        - variable: lm_studio_url
          label: LM Studio URL
          description: Optional LM Studio URL (e.g., http://host.docker.internal:1234).
          schema:
            type: string
            default: ""
            required: false
        - variable: openai_api_key
          label: OpenAI API Key
          description: OpenAI API key (only needed if using OpenAI models).
          schema:
            type: string
            default: ""
            required: false
            private: true
        - variable: research_llm_endpoint
          label: Research LLM Endpoint
          description: Research service LLM endpoint URL.
          schema:
            type: string
            default: ""
            required: false
        - variable: llm_ca_bundle
          label: LLM CA Bundle
          description: Path to extra CA bundle for LLM providers with custom TLS certificates.
          schema:
            type: string
            default: ""
            required: false
        - variable: searxng_secret
          label: SearXNG Secret
          description: Optional SearXNG cookie/CSRF secret (auto-generated if blank).
          schema:
            type: string
            default: ""
            required: false
            private: true
        - variable: database_url
          label: Database URL
          description: SQLite database URL.
          schema:
            type: string
            default: "sqlite:///./data/app.db"
            required: false
        - variable: auth_enabled
          label: Auth Enabled
          description: Enable authentication.
          schema:
            type: boolean
            default: true
            required: false
        - variable: app_bind
          label: App Bind Address
          description: Host bind address for the Odysseus web UI.
          schema:
            type: string
            default: "0.0.0.0"
            required: false
        - variable: localhost_bypass
          label: Localhost Bypass
          description: Development-only auth bypass for loopback requests.
          schema:
            type: boolean
            default: false
            required: false
        - variable: odysseus_admin_user
          label: Admin Username
          description: Admin username for first-time setup.
          schema:
            type: string
            default: "admin"
            required: false
        - variable: odysseus_admin_password
          label: Admin Password
          description: Admin password for first-time setup (leave blank to set manually).
          schema:
            type: string
            default: ""
            required: false
            private: true
        - variable: allowed_origins
          label: Allowed Origins
          description: CORS allowed origins (comma-separated).
          schema:
            type: string
            default: "http://localhost,http://127.0.0.1"
            required: false
        - variable: chromadb_bind
          label: ChromaDB Bind Address
          description: Host bind address for ChromaDB.
          schema:
            type: string
            default: "127.0.0.1"
            required: false
        - variable: embedding_url
          label: Embedding URL
          description: Embedding API endpoint (OpenAI-compatible /v1/embeddings).
          schema:
            type: string
            default: ""
            required: false
        - variable: embedding_model
          label: Embedding Model
          description: Embedding model name.
          schema:
            type: string
            default: ""
            required: false
        - variable: embedding_api_key
          label: Embedding API Key
          description: Embedding API key (if required).
          schema:
            type: string
            default: ""
            required: false
            private: true
        - variable: fastembed_model
          label: FastEmbed Model
          description: Local fallback embedding model (ONNX).
          schema:
            type: string
            default: "sentence-transformers/all-MiniLM-L6-v2"
            required: false
        - variable: fastembed_cache_path
          label: FastEmbed Cache Path
          description: Cache path for FastEmbed models.
          schema:
            type: string
            default: ""
            required: false
        - variable: cleanup_interval_hours
          label: Cleanup Interval
          description: Cleanup interval in hours.
          schema:
            type: int
            default: 24
            required: false
        - variable: odysseus_inprocess_pollers
          label: In-Process Pollers
          description: Enable in-process email pollers (set to 0 if using external cron).
          schema:
            type: boolean
            default: true
            required: false
        - variable: odysseus_inprocess_tasks
          label: In-Process Tasks
          description: Enable in-process scheduled-task runner (set to 0 if using external driver).
          schema:
            type: boolean
            default: true
            required: false
        - variable: odysseus_script_host
          label: Script Host
          description: Host used by the built-in run_script scheduled-task action.
          schema:
            type: string
            default: "localhost"
            required: false
        - variable: hf_token
          label: Hugging Face Token
          description: Hugging Face API token.
          schema:
            type: string
            default: ""
            required: false
            private: true
        - variable: data_brave_api_key
          label: Brave API Key
          description: Brave Search API key.
          schema:
            type: string
            default: ""
            required: false
            private: true
        - variable: google_api_key
          label: Google API Key
          description: Google API key for search.
          schema:
            type: string
            default: ""
            required: false
            private: true
        - variable: google_pse_cx
          label: Google PSE CX
          description: Google Programmable Search Engine CX.
          schema:
            type: string
            default: ""
            required: false
        - variable: tavily_api_key
          label: Tavily API Key
          description: Tavily API key for search.
          schema:
            type: string
            default: ""
            required: false
            private: true
        - variable: serper_api_key
          label: Serper API Key
          description: Serper API key for search.
          schema:
            type: string
            default: ""
            required: false
            private: true
        - variable: authentik
          label: Authentik Configuration
          description: Configure Authentik authentication (only available with image-auth).
          schema:
            type: dict
            show_if: [["image_selector", "=", "image-auth"]]
            attrs:
              - variable: enable
                label: Enable Authentik
                description: Enable Authentik authentication.
                schema:
                  type: boolean
                  default: true
                  required: false
              - variable: auto_create_users
                label: Auto Create Users
                description: Automatically create users from Authentik.
                schema:
                  type: boolean
                  default: true
                  required: false
              - variable: id
                label: Authentik ID
                description: Authentik application ID.
                schema:
                  type: string
                  default: ""
                  required: false
                  private: true
              - variable: secret
                label: Authentik Secret
                description: Authentik application secret.
                schema:
                  type: string
                  default: ""
                  required: false
                  private: true
              - variable: issuer
                label: Authentik Issuer
                description: Authentik issuer URL.
                schema:
                  type: string
                  default: ""
                  required: false
              - variable: scope
                label: Authentik Scope
                description: Authentik OAuth scope.
                schema:
                  type: string
                  default: "openid email profile"
                  required: false
              - variable: require_email_verified
                label: Require Email Verified
                description: Require email verification for users.
                schema:
                  type: boolean
                  default: false
                  required: false
              - variable: redirect_uri
                label: Redirect URI
                description: Authentik redirect URI.
                schema:
                  type: string
                  default: ""
                  required: false
        - variable: additional_envs
          label: Additional Environment Variables
          schema:
            type: list
            default: []
            items:
              - variable: env
                label: Environment Variable
                schema:
                  type: dict
                  attrs:
                    - variable: name
                      label: Name
                      schema:
                        type: string
                        required: true
                    - variable: value
                      label: Value
                      schema:
                        type: string

  - variable: chromadb
    label: ""
    group: Chromadb Configuration
    schema:
      type: dict
      attrs:
        - variable: image
          label: Image
          description: Docker image for Chromadb.
          schema:
            type: string
            default: "docker.io/chromadb/chroma:latest"
            required: true
        - variable: anonymized_telemetry
          label: Anonymized Telemetry
          description: Enable anonymized telemetry.
          schema:
            type: boolean
            default: false
            required: true

  - variable: ntfy
    label: ""
    group: Ntfy Configuration
    schema:
      type: dict
      attrs:
        - variable: image
          label: Image
          description: Docker image for Ntfy.
          schema:
            type: string
            default: "docker.io/binwiederhier/ntfy"
            required: true

  - variable: network
    label: ""
    group: Network Configuration
    schema:
      type: dict
      attrs:
        - variable: web_port
          label: WebUI Port
          schema:
            type: dict
            attrs:
              - variable: bind_mode
                label: Port Bind Mode
                description: |
                  The port bind mode.</br>
                  - Publish: The port will be published on the host for external access.</br>
                  - Expose: The port will be exposed for inter-container communication.</br>
                  - None: The port will not be exposed or published.</br>
                  Note: If the Dockerfile defines an EXPOSE directive,
                  the port will still be exposed for inter-container communication regardless of this setting.
                schema:
                  type: string
                  default: "published"
                  enum:
                    - value: "published"
                      description: Publish port on the host for external access
                    - value: "exposed"
                      description: Expose port for inter-container communication
                    - value: ""
                      description: None
              - variable: port_number
                label: Port Number
                schema:
                  type: int
                  default: 7000
                  min: 1
                  max: 65535
                  required: true
              - variable: host_ips
                label: Host IPs
                description: IPs on the host to bind this port
                schema:
                  type: list
                  show_if: [["bind_mode", "=", "published"]]
                  default: []
                  items:
                    - variable: host_ip
                      label: Host IP
                      schema:
                        type: string
                        required: true
                        $ref:
                          - definitions/node_bind_ip
        - variable: ntfy_port
          label: Ntfy Port
          schema:
            type: dict
            attrs:
              - variable: bind_mode
                label: Port Bind Mode
                schema:
                  type: string
                  default: "published"
                  enum:
                    - value: "published"
                      description: Publish port on the host for external access
                    - value: "exposed"
                      description: Expose port for inter-container communication
                    - value: ""
                      description: None
              - variable: port_number
                label: Port Number
                schema:
                  type: int
                  default: 8091
                  min: 1
                  max: 65535
                  required: true
              - variable: host_ips
                label: Host IPs
                description: IPs on the host to bind this port
                schema:
                  type: list
                  show_if: [["bind_mode", "=", "published"]]
                  default: []
                  items:
                    - variable: host_ip
                      label: Host IP
                      schema:
                        type: string
                        required: true
                        $ref:
                          - definitions/node_bind_ip
        - variable: networks
          label: Networks
          description: The docker networks to join
          schema:
            type: list
            show_if: [["host_network", "=", false]]
            default: []
            items:
              - variable: network
                label: Network
                schema:
                  type: dict
                  attrs:
                    - variable: name
                      label: Name
                      description: |
                        The name of the network to join.</br>
                        The network must already exist.
                      schema:
                        type: string
                        default: ""
                        required: true
                    - variable: containers
                      label: Containers
                      description: The containers to add to this network.
                      schema:
                        type: list
                        items:
                          - variable: container
                            label: Container
                            schema:
                              type: dict
                              attrs:
                                - variable: name
                                  label: Container Name
                                  schema:
                                    type: string
                                    required: true
                                    enum:
                                      - value: odysseus
                                        description: odysseus
                                      - value: chromadb
                                        description: chromadb
                                      - value: ntfy
                                        description: ntfy
                                      - value: searxng
                                        description: searxng
                                - variable: config
                                  label: Container Network Configuration
                                  schema:
                                    type: dict
                                    attrs:
                                      - variable: aliases
                                        label: Aliases (Optional)
                                        description: The network aliases to use for this container on this network.
                                        schema:
                                          type: list
                                          default: []
                                          items:
                                            - variable: alias
                                              label: Alias
                                              schema:
                                                type: string
                                      - variable: interface_name
                                        label: Interface Name (Optional)
                                        description: The network interface name to use for this network
                                        schema:
                                          type: string
                                      - variable: mac_address
                                        label: MAC Address (Optional)
                                        description: The MAC address to use for this network interface.
                                        schema:
                                          type: string
                                      - variable: ipv4_address
                                        label: IPv4 Address (Optional)
                                        description: The IPv4 address to use for this network interface.
                                        schema:
                                          type: string
                                      - variable: ipv6_address
                                        label: IPv6 Address (Optional)
                                        description: The IPv6 address to use for this network interface.
                                        schema:
                                          type: string
                                      - variable: gw_priority
                                        label: Gateway Priority (Optional)
                                        description: Indicates the priority of the gateway for this network interface.
                                        schema:
                                          type: int
                                          "null": true
                                      - variable: priority
                                        label: Priority (Optional)
                                        description: Indicates in which order Compose connects the service's containers to its networks.
                                        schema:
                                          type: int
                                          "null": true
        - variable: host_network
          label: Host Network
          description: |
            Bind to the host network. It's recommended to keep this disabled.
          schema:
            type: boolean
            default: false
        - variable: certificate_id
          label: Certificate
          description: The certificate to use for Odysseus.
          schema:
            type: int
            "null": true
            $ref:
              - "definitions/certificate"

  - variable: storage
    label: ""
    group: Storage Configuration
    schema:
      type: dict
      attrs:
        - variable: data
          label: Odysseus Data Storage
          schema:
            type: dict
            attrs:
              - variable: type
                label: Type
                description: |
                  ixVolume: Is dataset created automatically by the system.</br>
                  Host Path: Is a path that already exists on the system.
                schema:
                  type: string
                  required: true
                  default: "ix_volume"
                  enum:
                    - value: "host_path"
                      description: Host Path (Path that already exists on the system)
                    - value: "ix_volume"
                      description: ixVolume (Dataset created automatically by the system)
              - variable: ix_volume_config
                label: ixVolume Configuration
                description: The configuration for the ixVolume dataset.
                schema:
                  type: dict
                  show_if: [["type", "=", "ix_volume"]]
                  $ref:
                    - "normalize/ix_volume"
                  attrs:
                    - variable: acl_enable
                      label: Enable ACL
                      description: Enable ACL for the storage.
                      schema:
                        type: boolean
                        default: false
                    - variable: dataset_name
                      label: Dataset Name
                      description: The name of the dataset to use for storage.
                      schema:
                        type: string
                        required: true
                        hidden: true
                        default: "data"
                    - variable: acl_entries
                      label: ACL Configuration
                      schema:
                        type: dict
                        show_if: [["acl_enable", "=", true]]
                        attrs: []
              - variable: host_path_config
                label: Host Path Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "host_path"]]
                  attrs:
                    - variable: acl_enable
                      label: Enable ACL
                      description: Enable ACL for the storage.
                      schema:
                        type: boolean
                        default: false
                    - variable: acl
                      label: ACL Configuration
                      schema:
                        type: dict
                        show_if: [["acl_enable", "=", true]]
                        attrs: []
                        $ref:
                          - "normalize/acl"
                    - variable: path
                      label: Host Path
                      description: The host path to use for storage.
                      schema:
