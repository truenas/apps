resources:
  limits:
    cpus: 4.0
    memory: 8192

TZ: Etc/UTC

odysseus:
  image_selector: image
  secure_cookies: false
  additional_envs: []

chromadb:
  anonymized_telemetry: false

network:
  web_port:
    bind_mode: published
    port_number: 7000
  host_network: false

ix_volumes:
  data: /opt/tests/mnt/odysseus/data
  logs: /opt/tests/mnt/odysseus/logs
  ssh: /opt/tests/mnt/odysseus/ssh
  huggingface: /opt/tests/mnt/odysseus/huggingface
  local: /opt/tests/mnt/odysseus/local
  chromadb: /opt/tests/mnt/odysseus/chromadb

storage:
  data:
    type: ix_volume
    ix_volume_config:
      dataset_name: data
      create_host_path: true
  logs:
    type: ix_volume
    ix_volume_config:
      dataset_name: logs
      create_host_path: true
  ssh:
    type: ix_volume
    ix_volume_config:
      dataset_name: ssh
      create_host_path: true
  huggingface:
    type: ix_volume
    ix_volume_config:
      dataset_name: huggingface
      create_host_path: true
  local:
    type: ix_volume
    ix_volume_config:
      dataset_name: local
      create_host_path: true
  chromadb:
    type: ix_volume
    ix_volume_config:
      dataset_name: chromadb
      create_host_path: true
  additional_storage: []
