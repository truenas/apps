resources:
  limits:
    cpus: 2.0
    memory: 4096

TZ: Etc/UTC

odysseus:
  allowed_origins: []
  hf_token: ""
  additional_envs: []

run_as:
  user: 568
  group: 568

network:
  web_port:
    bind_mode: published
    port_number: 8080

ix_volumes:
  data: /opt/tests/mnt/odysseus/data
  logs: /opt/tests/mnt/odysseus/logs
  ssh: /opt/tests/mnt/odysseus/ssh
  huggingface: /opt/tests/mnt/odysseus/huggingface
  local: /opt/tests/mnt/odysseus/local
  chromadb_data: /opt/tests/mnt/odysseus/chromadb

storage:
  data:
    type: ix_volume
    ix_volume_config:
      dataset_name: data
      create_host_path: true
  logs:
    type: ix_volume
    ix_volume_config:
      dataset_name: logs
      create_host_path: true
  ssh:
    type: ix_volume
    ix_volume_config:
      dataset_name: ssh
      create_host_path: true
  huggingface:
    type: ix_volume
    ix_volume_config:
      dataset_name: huggingface
      create_host_path: true
  local:
    type: ix_volume
    ix_volume_config:
      dataset_name: local
      create_host_path: true
  chromadb_data:
    type: ix_volume
    ix_volume_config:
      dataset_name: chromadb_data
      create_host_path: true
  additional_storage: []
