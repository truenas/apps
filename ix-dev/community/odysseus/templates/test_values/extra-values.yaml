resources:
  limits:
    cpus: 4.0
    memory: 8192

TZ: Etc/UTC

odysseus:
  image_selector: image-dev
  searxng_instance: http://your-searxng-server:8080
  app_bind: 0.0.0.0
  allowed_origins: http://localhost,http://127.0.0.1,http://192.168.1.100
  hf_token: hf_testtoken123

chromadb:
  anonymized_telemetry: true
  bind_address: 0.0.0.0

network:
  web_port:
    bind_mode: published
    port_number: 8000
  host_network: false

ix_volumes:
  data: /opt/tests/mnt/odysseus/data
  logs: /opt/tests/mnt/odysseus/logs
  ssh: /opt/tests/mnt/odysseus/ssh
  huggingface: /opt/tests/mnt/odysseus/huggingface
  local: /opt/tests/mnt/odysseus/local
  chromadb: /opt/tests/mnt/odysseus/chromadb

storage:
  data:
    type: ix_volume
    ix_volume_config:
      dataset_name: data
      create_host_path: true
  logs:
    type: ix_volume
    ix_volume_config:
      dataset_name: logs
      create_host_path: true
  ssh:
    type: ix_volume
    ix_volume_config:
      dataset_name: ssh
      create_host_path: true
  huggingface:
    type: ix_volume
    ix_volume_config:
      dataset_name: huggingface
      create_host_path: true
  local:
    type: ix_volume
    ix_volume_config:
      dataset_name: local
      create_host_path: true
  chromadb:
    type: ix_volume
    ix_volume_config:
      dataset_name: chromadb
      create_host_path: true
  additional_storage: []
