resources:
  limits:
    cpus: 4.0
    memory: 8192

TZ: Etc/UTC

odysseus:
  image_selector: image-dev
  searxng_instance: http://searxng:8080
  use_local_searxng: true
  secure_cookies: true
  llm_host: http://localhost:11434
  llm_hosts: http://host1:11434,http://host2:11434
  ollama_base_url: http://host.docker.internal:11434/v1
  lm_studio_url: http://host.docker.internal:1234
  openai_api_key: sk-test123456
  research_llm_endpoint: http://localhost:8000/v1
  llm_ca_bundle: /app/data/ca-bundle.crt
  searxng_secret: test-secret-key
  database_url: sqlite:///./data/app.db
  auth_enabled: true
  app_bind: 0.0.0.0
  localhost_bypass: false
  odysseus_admin_user: testadmin
  odysseus_admin_password: testpassword123
  allowed_origins: http://localhost,http://127.0.0.1,http://192.168.1.100
  chromadb_bind: 0.0.0.0
  embedding_url: http://localhost:8000/v1/embeddings
  embedding_model: sentence-transformers/all-MiniLM-L6-v2
  embedding_api_key: embed-key-123
  fastembed_model: sentence-transformers/all-MiniLM-L6-v2
  fastembed_cache_path: /app/.cache/huggingface
  cleanup_interval_hours: 12
  odysseus_inprocess_pollers: true
  odysseus_inprocess_tasks: true
  odysseus_script_host: localhost
  hf_token: hf_testtoken123
  data_brave_api_key: brave-api-key-123
  google_api_key: google-api-key-123
  google_pse_cx: google-cx-123
  tavily_api_key: tavily-api-key-123
  serper_api_key: serper-api-key-123

chromadb:
  anonymized_telemetry: true

network:
  web_port:
    bind_mode: published
    port_number: 8000
  ntfy_port:
    bind_mode: published
    port_number: 9091
  host_network: false

ix_volumes:
  data: /opt/tests/mnt/odysseus/data
  logs: /opt/tests/mnt/odysseus/logs
  ssh: /opt/tests/mnt/odysseus/ssh
  huggingface: /opt/tests/mnt/odysseus/huggingface
  local: /opt/tests/mnt/odysseus/local
  chromadb: /opt/tests/mnt/odysseus/chromadb
  ntfy: /opt/tests/mnt/odysseus/ntfy
  searxng: /opt/tests/mnt/odysseus/searxng

storage:
  data:
    type: ix_volume
    ix_volume_config:
      dataset_name: data
      create_host_path: true
  logs:
    type: ix_volume
    ix_volume_config:
      dataset_name: logs
      create_host_path: true
  ssh:
    type: ix_volume
    ix_volume_config:
      dataset_name: ssh
      create_host_path: true
  huggingface:
    type: ix_volume
    ix_volume_config:
      dataset_name: huggingface
      create_host_path: true
  local:
    type: ix_volume
    ix_volume_config:
      dataset_name: local
      create_host_path: true
  chromadb:
    type: ix_volume
    ix_volume_config:
      dataset_name: chromadb
      create_host_path: true
  ntfy:
    type: ix_volume
    ix_volume_config:
      dataset_name: ntfy
      create_host_path: true
  searxng:
    type: ix_volume
    ix_volume_config:
      dataset_name: searxng
      create_host_path: true
  additional_storage: []
