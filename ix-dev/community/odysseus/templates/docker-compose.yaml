{% set tpl = ix_lib.base.render.Render(values) %}

{% set odysseus_net = tpl.networks.create_internal("odysseus-net") %}

{% set perm_container = tpl.deps.perms(values.consts.perms_container_name) %}
{% set perms_config = {"uid": values.run_as.user, "gid": values.run_as.group, "mode": "check"} %}

{% set chromadb_config = {"volume": values.storage.chromadb_data} %}
{% set chromadb = tpl.deps.chromadb(values.consts.chromadb_container_name, "chromadb_image", chromadb_config, perm_container) %}
{% do chromadb.container.add_network(odysseus_net) %}

{% set odysseus = tpl.add_container(values.consts.odysseus_container_name, "image") %}
{% do odysseus.add_network(odysseus_net) %}
{% do odysseus.add_caps(["CHOWN", "DAC_OVERRIDE", "FOWNER", "SETGID", "SETUID"]) %}
{% do odysseus.set_command(["uvicorn", "app:app", "--host", "0.0.0.0", "--port", values.network.web_port.port_number]) %}
{% do odysseus.depends.add_dependency("chromadb", "service_healthy") %}
{% do odysseus.healthcheck.set_test("curl", {"port": values.network.web_port.port_number, "path": "/api/auth/status"}) %}

{% do odysseus.environment.add_env("APP_BIND", "0.0.0.0") %}
{% do odysseus.environment.add_env("APP_PORT", values.network.web_port.port_number) %}
{% do odysseus.environment.add_env("CHROMADB_HOST", values.consts.chromadb_container_name) %}
{% do odysseus.environment.add_env("CHROMADB_PORT", chromadb.get_port()) %}

{% do odysseus.environment.add_env("ALLOWED_ORIGINS", values.odysseus.allowed_origins|join(",")) %}
{% do odysseus.environment.add_env("HF_TOKEN", values.odysseus.hf_token) %}
{% do odysseus.environment.add_user_envs(values.odysseus.additional_envs) %}

{% do odysseus.add_port(values.network.web_port) %}

{% do odysseus.add_storage("/app/data", values.storage.data) %}
{% do perm_container.add_or_skip_action("data", values.storage.data, perms_config) %}

{% do odysseus.add_storage("/app/logs", values.storage.logs) %}
{% do perm_container.add_or_skip_action("logs", values.storage.logs, perms_config) %}

{% do odysseus.add_storage("/app/.ssh", values.storage.ssh) %}
{% do perm_container.add_or_skip_action("ssh", values.storage.ssh, perms_config) %}

{% do odysseus.add_storage("/app/.cache/huggingface", values.storage.huggingface) %}
{% do perm_container.add_or_skip_action("huggingface", values.storage.huggingface, perms_config) %}

{% do odysseus.add_storage("/app/.local", values.storage.local) %}
{% do perm_container.add_or_skip_action("local", values.storage.local, perms_config) %}

{% for store in values.storage.additional_storage %}
  {% do odysseus.add_storage(store.mount_path, store) %}
  {% do perm_container.add_or_skip_action(store.mount_path, store, perms_config) %}
{% endfor %}

{% if perm_container.has_actions() %}
  {% do perm_container.activate() %}
  {% do odysseus.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
  {% do chromadb.container.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
{% endif %}

{% do tpl.portals.add(values.network.web_port) %}
{% do tpl.notes.set_body(values.consts.notes_body) %}

{{ tpl.render() | tojson }}
