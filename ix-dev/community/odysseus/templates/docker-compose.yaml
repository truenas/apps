{% set tpl = ix_lib.base.render.Render(values) %}

{% set perm_container = tpl.deps.perms(values.consts.perms_container_name) %}
{% set perms_config = {"uid": values.consts.run_as_user, "gid": values.consts.run_as_group, "mode": "check"} %}

{# Odysseus Container #}
{% set selected_image = values.odysseus.image_selector %}
{% set odysseus = tpl.add_container("odysseus", selected_image) %}
{% do odysseus.set_user(values.consts.run_as_user, values.consts.run_as_group) %}
{% do odysseus.add_caps(["SYS_ADMIN"]) %}
{% do odysseus.healthcheck.set_test("curl", {"port": values.network.web_port.port_number, "path": "/", "scheme": "http"}) %}

{% do odysseus.environment.add_env("SEARXNG_INSTANCE", values.odysseus.searxng_instance) %}
{% do odysseus.environment.add_env("SEARXNG_SECRET", values.odysseus.searxng_secret) %}
{% do odysseus.environment.add_env("CHROMADB_HOST", "chromadb") %}
{% do odysseus.environment.add_env("CHROMADB_PORT", 8000) %}
{% do odysseus.environment.add_env("CHROMADB_BIND", values.odysseus.chromadb_bind) %}
{% do odysseus.environment.add_env("APP_BIND", values.odysseus.app_bind) %}
{% do odysseus.environment.add_env("APP_PORT", values.network.web_port.port_number) %}
{% do odysseus.environment.add_env("LLM_HOST", values.odysseus.llm_host) %}
{% do odysseus.environment.add_env("LLM_HOSTS", values.odysseus.llm_hosts) %}
{% do odysseus.environment.add_env("OLLAMA_BASE_URL", values.odysseus.ollama_base_url) %}
{% do odysseus.environment.add_env("LM_STUDIO_URL", values.odysseus.lm_studio_url) %}
{% do odysseus.environment.add_env("OPENAI_API_KEY", values.odysseus.openai_api_key) %}
{% do odysseus.environment.add_env("RESEARCH_LLM_ENDPOINT", values.odysseus.research_llm_endpoint) %}
{% do odysseus.environment.add_env("LLM_CA_BUNDLE", values.odysseus.llm_ca_bundle) %}
{% do odysseus.environment.add_env("DATABASE_URL", values.odysseus.database_url) %}
{% do odysseus.environment.add_env("AUTH_ENABLED", values.odysseus.auth_enabled | string) %}
{% do odysseus.environment.add_env("LOCALHOST_BYPASS", values.odysseus.localhost_bypass | string) %}
{% do odysseus.environment.add_env("ODYSSEUS_ADMIN_USER", values.odysseus.odysseus_admin_user) %}
{% do odysseus.environment.add_env("ODYSSEUS_ADMIN_PASSWORD", values.odysseus.odysseus_admin_password) %}
{% do odysseus.environment.add_env("ALLOWED_ORIGINS", values.odysseus.allowed_origins) %}
{% do odysseus.environment.add_env("EMBEDDING_URL", values.odysseus.embedding_url) %}
{% do odysseus.environment.add_env("EMBEDDING_MODEL", values.odysseus.embedding_model) %}
{% do odysseus.environment.add_env("EMBEDDING_API_KEY", values.odysseus.embedding_api_key) %}
{% do odysseus.environment.add_env("FASTEMBED_MODEL", values.odysseus.fastembed_model) %}
{% do odysseus.environment.add_env("FASTEMBED_CACHE_PATH", values.odysseus.fastembed_cache_path) %}
{% do odysseus.environment.add_env("CLEANUP_INTERVAL_HOURS", values.odysseus.cleanup_interval_hours) %}
{% do odysseus.environment.add_env("ODYSSEUS_INPROCESS_POLLERS", "1" if values.odysseus.odysseus_inprocess_pollers else "0") %}
{% do odysseus.environment.add_env("ODYSSEUS_INPROCESS_TASKS", "1" if values.odysseus.odysseus_inprocess_tasks else "0") %}
{% do odysseus.environment.add_env("ODYSSEUS_SCRIPT_HOST", values.odysseus.odysseus_script_host) %}
{% do odysseus.environment.add_env("HF_TOKEN", values.odysseus.hf_token) %}
{% do odysseus.environment.add_env("HUGGING_FACE_HUB_TOKEN", values.odysseus.hf_token) %}
{% do odysseus.environment.add_env("DATA_BRAVE_API_KEY", values.odysseus.data_brave_api_key) %}
{% do odysseus.environment.add_env("GOOGLE_API_KEY", values.odysseus.google_api_key) %}
{% do odysseus.environment.add_env("GOOGLE_PSE_CX", values.odysseus.google_pse_cx) %}
{% do odysseus.environment.add_env("TAVILY_API_KEY", values.odysseus.tavily_api_key) %}
{% do odysseus.environment.add_env("SERPER_API_KEY", values.odysseus.serper_api_key) %}
{% if values.odysseus.authentik is defined %}
{% do odysseus.environment.add_env("AUTHENTIK_ENABLE", values.odysseus.authentik.enable | string) %}
{% do odysseus.environment.add_env("AUTHENTIK_AUTO_CREATE_USERS", values.odysseus.authentik.auto_create_users | string) %}
{% do odysseus.environment.add_env("AUTHENTIK_ID", values.odysseus.authentik.id) %}
{% do odysseus.environment.add_env("AUTHENTIK_SECRET", values.odysseus.authentik.secret) %}
{% do odysseus.environment.add_env("AUTHENTIK_ISSUER", values.odysseus.authentik.issuer) %}
{% do odysseus.environment.add_env("AUTHENTIK_SCOPE", values.odysseus.authentik.scope) %}
{% do odysseus.environment.add_env("AUTHENTIK_REQUIRE_EMAIL_VERIFIED", values.odysseus.authentik.require_email_verified | string) %}
{% do odysseus.environment.add_env("AUTHENTIK_REDIRECT_URI", values.odysseus.authentik.redirect_uri) %}
{% endif %}
{% do odysseus.environment.add_env("SECURE_COOKIES", values.odysseus.secure_cookies | string) %}
{% do odysseus.environment.add_user_envs(values.odysseus.additional_envs) %}

{% do odysseus.add_port(values.network.web_port) %}

{% do odysseus.add_storage(values.consts.data_path, values.storage.data) %}
{% do perm_container.add_or_skip_action("data", values.storage.data, perms_config) %}
{% do odysseus.add_storage(values.consts.logs_path, values.storage.logs) %}
{% do perm_container.add_or_skip_action("logs", values.storage.logs, perms_config) %}
{% do odysseus.add_storage(values.consts.ssh_path, values.storage.ssh) %}
{% do perm_container.add_or_skip_action("ssh", values.storage.ssh, perms_config) %}
{% do odysseus.add_storage(values.consts.huggingface_path, values.storage.huggingface) %}
{% do perm_container.add_or_skip_action("huggingface", values.storage.huggingface, perms_config) %}
{% do odysseus.add_storage(values.consts.local_path, values.storage.local) %}
{% do perm_container.add_or_skip_action("local", values.storage.local, perms_config) %}

{% for store in values.storage.additional_storage %}
  {% do odysseus.add_storage(store.mount_path, store) %}
  {% do perm_container.add_or_skip_action(store.mount_path, store, perms_config) %}
{% endfor %}

{# Chromadb Container #}
{% set chromadb = tpl.add_container("chromadb", "chromadb_image") %}
{% do chromadb.set_user(values.consts.run_as_user, values.consts.run_as_group) %}
{% do chromadb.healthcheck.set_test("http", {"port": 8000, "path": "/api/v1/heartbeat", "scheme": "http"}) %}
{% do chromadb.environment.add_env("ANONYMIZED_TELEMETRY", values.chromadb.anonymized_telemetry | string) %}
{% do chromadb.add_storage(values.consts.chromadb_path, values.storage.chromadb) %}
{% do perm_container.add_or_skip_action("chromadb", values.storage.chromadb, perms_config) %}

{% do odysseus.depends.add_dependency("chromadb", "service_started") %}

{% if perm_container.has_actions() %}
  {% do perm_container.activate() %}
  {% do odysseus.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
  {% do chromadb.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
{% endif %}

{% do tpl.portals.add(values.network.web_port, {"scheme": "http"}) %}

{{ tpl.render() | tojson }}
