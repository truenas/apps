{% set tpl = ix_lib.base.render.Render(values) %}

{% set c1 = tpl.add_container(values.consts.nas_doctor_container_name, "image") %}
{% set perm_container = tpl.deps.perms(values.consts.perms_container_name) %}
{% set perms_config = {"uid": 0, "gid": 0, "mode": "check"} %}

{# NAS Doctor requires root for smartctl access #}
{% do c1.set_user(0, 0) %}
{% do c1.add_caps(["SYS_RAWIO"]) %}

{# PID=host is required for Top Processes to see all host processes
   and match them to Docker containers via cgroup inspection #}
{% do c1.set_pid_mode("host") %}

{% do c1.healthcheck.set_test("curl", {"port": values.network.web_port.port_number, "path": "/api/v1/health"}) %}

{# Environment variables #}
{% do c1.environment.add_env("NAS_DOCTOR_LISTEN", ":" ~ values.network.web_port.port_number) %}
{% do c1.environment.add_env("NAS_DOCTOR_INTERVAL", values.nas_doctor.scan_interval) %}
{% if values.nas_doctor.timezone %}
  {% do c1.environment.add_env("TZ", values.nas_doctor.timezone) %}
{% endif %}
{% do c1.environment.add_user_envs(values.nas_doctor.additional_envs) %}

{# Port mapping #}
{% do c1.add_port(values.network.web_port) %}

{# Docker socket for container monitoring #}
{% if values.nas_doctor.mount_docker_socket %}
  {% do c1.add_docker_socket() %}
{% endif %}

{# Storage: data directory #}
{% do c1.add_storage("/data", values.storage.data) %}
{% do perm_container.add_or_skip_action("data", values.storage.data, perms_config) %}

{# Storage: host log access #}
{% if values.nas_doctor.mount_host_logs %}
  {% do c1.add_storage("/host/log", {"type": "host_path", "host_path_config": {"path": "/var/log"}, "read_only": true}) %}
{% endif %}

{# Storage: host mnt access (for disk space monitoring) #}
{% if values.nas_doctor.mount_host_mnt %}
  {% do c1.add_storage("/host/mnt", {"type": "host_path", "host_path_config": {"path": "/mnt"}, "read_only": true}) %}
{% endif %}

{# Storage: /dev for SMART device access and GPU device nodes #}
{% if values.nas_doctor.mount_dev %}
  {% do c1.add_storage("/dev", {"type": "host_path", "host_path_config": {"path": "/dev"}, "read_only": true}) %}
{% endif %}

{# Storage: /sys for GPU telemetry and drive mapping #}
{% if values.nas_doctor.mount_sys %}
  {% do c1.add_storage("/sys", {"type": "host_path", "host_path_config": {"path": "/sys"}, "read_only": true}) %}
{% endif %}

{# Additional storage mounts #}
{% for store in values.storage.additional_storage %}
  {% do c1.add_storage(store.mount_path, store) %}
  {% do perm_container.add_or_skip_action(store.mount_path, store, perms_config) %}
{% endfor %}

{% if perm_container.has_actions() %}
  {% do perm_container.activate() %}
  {% do c1.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
{% endif %}

{# Portal for web UI #}
{% do tpl.portals.add(values.network.web_port) %}

{{ tpl.render() | tojson }}
