{% set tpl = ix_lib.base.render.Render(values) %}

{% set c1 = tpl.add_container(values.consts.clonarr_container_name, "image") %}
{% do c1.add_caps(["CHOWN", "SETGID", "SETUID"]) %}
{% do c1.healthcheck.set_test("wget", {"port": values.network.web_port.port_number, "path": "/api/health"}) %}

{% do c1.environment.add_env("URL_BASE", "/") %}
{% do c1.environment.add_env("PORT", values.network.web_port.port_number) %}
{% do c1.environment.add_env("CONFIG_DIR", values.consts.config_path) %}
{% do c1.environment.add_env("DATA_DIR", "%s/data"|format(values.consts.config_path)) %}
{% do c1.environment.add_user_envs(values.clonarr.additional_envs) %}

{% do c1.add_port(values.network.web_port) %}

{% do c1.add_storage(values.consts.config_path, values.storage.config) %}

{% for store in values.storage.additional_storage %}
  {% do c1.add_storage(store.mount_path, store) %}
{% endfor %}

{% do tpl.portals.add(values.network.web_port) %}

{{ tpl.render() | tojson }}
