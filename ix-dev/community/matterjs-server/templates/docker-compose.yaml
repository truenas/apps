{% set tpl = ix_lib.base.render.Render(values) %}

{% set c1 = tpl.add_container(values.consts.matterjs_container_name, "image") %}
{% set perm_container = tpl.deps.perms(values.consts.perms_container_name) %}
{% set perms_config = {"uid": values.run_as.user, "gid": values.run_as.group, "mode": "check"} %}

{% do c1.set_user(values.run_as.user, values.run_as.group) %}
{% do c1.add_caps(["NET_RAW"]) %}

{% do c1.healthcheck.set_test("curl", {"port": values.network.web_port.port_number, "path": "/health"}) %}

{% do c1.environment.add_env("STORAGE_PATH", values.consts.data_path) %}
{% do c1.environment.add_env("PORT", values.network.web_port.port_number) %}
{% do c1.environment.add_env("LOG_LEVEL", values.matterjs.log_level) %}

{% if values.matterjs.listen_address %}
  {% do c1.environment.add_env("LISTEN_ADDRESS", values.matterjs.listen_address) %}
{% endif %}

{% if values.matterjs.primary_interface %}
  {% do c1.environment.add_env("PRIMARY_INTERFACE", values.matterjs.primary_interface) %}
{% endif %}

{% if values.matterjs.log_file %}
  {% do c1.environment.add_env("LOG_FILE", values.matterjs.log_file) %}
{% endif %}

{% do c1.environment.add_env("PRODUCTION_MODE", values.matterjs.production_mode) %}
{% do c1.environment.add_env("DISABLE_DASHBOARD", values.matterjs.disable_dashboard) %}
{% do c1.environment.add_env("ENABLE_TEST_NET_DCL", values.matterjs.dcl.enable_test_net_dcl) %}
{% do c1.environment.add_env("DISABLE_DCL_SEED", values.matterjs.dcl.disable_dcl_seed) %}
{% do c1.environment.add_env("DISABLE_OTA", values.matterjs.ota.disable_ota) %}

{% if values.matterjs.ota.enable_provider %}
  {% do c1.environment.add_env("OTA_PROVIDER_DIR", values.consts.ota_path) %}
{% endif %}

{% if values.matterjs.ble.bluetooth_adapter %}
  {% do c1.environment.add_env("BLUETOOTH_ADAPTER", values.matterjs.ble.bluetooth_adapter) %}
{% endif %}

{% if values.matterjs.ble.ble_proxy %}
  {% do c1.environment.add_env("BLE_PROXY", true) %}
{% endif %}

{% if values.matterjs.vendor_id %}
  {% do c1.environment.add_env("VENDOR_ID", values.matterjs.vendor_id) %}
{% endif %}

{% if values.matterjs.fabric_id %}
  {% do c1.environment.add_env("FABRIC_ID", values.matterjs.fabric_id) %}
{% endif %}

{% do c1.environment.add_user_envs(values.matterjs.additional_envs) %}

{% do c1.add_port(values.network.web_port) %}
{% for port in values.network.additional_ports %}
  {% do c1.add_port(port) %}
{% endfor %}

{% do c1.add_storage(values.consts.data_path, values.storage.data) %}
{% do perm_container.add_or_skip_action("data", values.storage.data, perms_config) %}

{% if values.matterjs.ota.enable_provider %}
  {% do c1.add_storage(values.consts.ota_path, values.storage.ota) %}
  {% do perm_container.add_or_skip_action("ota", values.storage.ota, perms_config) %}
{% endif %}

{% for store in values.storage.additional_storage %}
  {% do c1.add_storage(store.mount_path, store) %}
  {% do perm_container.add_or_skip_action(store.mount_path, store, perms_config) %}
{% endfor %}

{% if perm_container.has_actions() %}
  {% do perm_container.activate() %}
  {% do c1.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
{% endif %}

{% do tpl.portals.add(values.network.web_port) %}
{% do tpl.notes.set_body(values.consts.notes_body) %}

{{ tpl.render() | tojson }}
