groups:
  - name: Matter.js Server Configuration
    description: Configure Matter.js Server
  - name: User and Group Configuration
    description: Configure User and Group for Matter.js Server
  - name: Network Configuration
    description: Configure Network for Matter.js Server
  - name: Storage Configuration
    description: Configure Storage for Matter.js Server
  - name: Labels Configuration
    description: Configure Labels for Matter.js Server
  - name: Resources Configuration
    description: Configure Resources for Matter.js Server

questions:
  - variable: TZ
    group: Matter.js Server Configuration
    label: Timezone
    schema:
      type: string
      default: Etc/UTC
      required: true
      $ref:
        - definitions/timezone

  - variable: matterjs
    label: ""
    group: Matter.js Server Configuration
    schema:
      type: dict
      attrs:
        - variable: log_level
          label: Log Level
          description: Server logging verbosity.
          schema:
            type: string
            default: info
            required: true
            enum:
              - value: critical
                description: critical
              - value: error
                description: error
              - value: warning
                description: warning
              - value: info
                description: info
              - value: debug
                description: debug
              - value: verbose
                description: verbose
        - variable: log_file
          label: Log File Path (Optional)
          description: |
            Full path inside the container to write logs to (must include the filename).</br>
            Example: `/data/logs/matter-server.log`</br>
            Logs are rotated daily, up to seven days of history are kept.
          schema:
            type: string
            default: ""
        - variable: primary_interface
          label: Primary Network Interface (Optional)
          description: |
            Primary network interface for mDNS and Matter communication.</br>
            Recommended on TrueNAS to avoid Matter.js binding to every NIC and conflicting with the host Avahi daemon.</br>
            Example: `eno1`, `enp1s0`. Leave empty to auto-detect.
          schema:
            type: string
            default: ""
        - variable: listen_address
          label: WebSocket Listen Address (Optional)
          description: |
            IP address to bind the WebSocket dashboard server to.</br>
            Leave empty to bind to all interfaces.</br>
            Note: an interface name (e.g. `eth0`) will bind correctly but breaks the built-in health check — use an explicit IP.
          schema:
            type: string
            default: ""
        - variable: production_mode
          label: Production Mode (Reverse Proxy)
          description: |
            Force the dashboard into production mode. Enable when running behind a reverse proxy.
          schema:
            type: boolean
            default: false
        - variable: disable_dashboard
          label: Disable Web Dashboard
          description: Disable the built-in web dashboard. WebSocket API remains available.
          schema:
            type: boolean
            default: false
        - variable: vendor_id
          label: Vendor ID (Advanced)
          description: |
            Vendor ID for the Matter fabric. Leave empty to use the upstream default (`0xfff1`, test vendor).</br>
            Only change this if you understand Matter fabric implications.
          schema:
            type: string
            default: ""
        - variable: fabric_id
          label: Fabric ID (Advanced)
          description: Fabric ID for the Matter fabric. Leave empty to use the upstream default (`1`).
          schema:
            type: string
            default: ""
        - variable: dcl
          label: Distributed Compliance Ledger (DCL)
          schema:
            type: dict
            attrs:
              - variable: enable_test_net_dcl
                label: Enable Test-Net DCL
                description: |
                  Enable test-net DCL certificates and OTA updates in addition to the production DCL.</br>
                  Required to commission test/developer devices.
                schema:
                  type: boolean
                  default: false
              - variable: disable_dcl_seed
                label: Disable Bundled DCL Seed
                description: |
                  Disable the bundled offline DCL seed and use only the network DCL.</br>
                  Leave disabled (default) unless you know you need this.
                schema:
                  type: boolean
                  default: false
        - variable: ota
          label: OTA Updates
          schema:
            type: dict
            attrs:
              - variable: disable_ota
                label: Disable OTA Updates
                description: Disable Over-The-Air firmware update functionality.
                schema:
                  type: boolean
                  default: false
              - variable: enable_provider
                label: Enable Custom OTA Provider Directory
                description: |
                  Mount a storage volume at the OTA provider directory and configure `OTA_PROVIDER_DIR`.</br>
                  Use this if you want to host your own firmware images for Matter devices.
                schema:
                  type: boolean
                  default: false
        - variable: ble
          label: Bluetooth (BLE) Commissioning
          schema:
            type: dict
            attrs:
              - variable: ble_proxy
                label: Enable BLE Proxy Endpoint (Recommended for TrueNAS)
                description: |
                  Expose the `/ble` WebSocket endpoint so a remote BLE proxy client can dial in and provide BLE for commissioning.</br>
                  **Recommended path on TrueNAS:** enable this, run Home Assistant somewhere on your network (TrueNAS app, separate box, HA OS), and use one or more **ESPHome Bluetooth Proxy** ESP32 devices. Home Assistant aggregates the ESPHome proxies and bridges them to this `/ble` endpoint automatically when the Matter integration is configured against this server.</br>
                  Does not require running as root.</br>
                  Mutually exclusive with the host adapter below — if both are set, BLE proxy wins.
                schema:
                  type: boolean
                  default: false
              - variable: bluetooth_adapter
                label: Host Bluetooth Adapter (Advanced)
                description: |
                  Host HCI adapter ID for BLE commissioning via a Bluetooth adapter physically attached to the TrueNAS host (e.g. `0` for `hci0`).</br>
                  **TrueNAS SCALE does not ship Bluetooth drivers or stack by default** — the host adapter is unlikely to be visible inside the container. Prefer **Enable BLE Proxy Endpoint** above with an ESPHome BT proxy.</br>
                  **Requires running the container as root** (set User/Group to `0` in the User and Group section).</br>
                  Leave empty to disable host BLE.
                schema:
                  type: string
                  default: ""
        - variable: additional_envs
          label: Additional Environment Variables
          description: |
            Additional environment variables, e.g. advanced `MATTER_*` settings.</br>
            See the upstream docs for the full list.
          schema:
            type: list
            default: []
            items:
              - variable: env
                label: Environment Variable
                schema:
                  type: dict
                  attrs:
                    - variable: name
                      label: Name
                      schema:
                        type: string
                        required: true
                    - variable: value
                      label: Value
                      schema:
                        type: string

  - variable: run_as
    label: ""
    group: User and Group Configuration
    schema:
      type: dict
      attrs:
        - variable: user
          label: User ID
          description: |
            The user ID that Matter.js Server runs as and that owns the data files.</br>
            Default `568` (TrueNAS `apps` user). Set to `0` (root) if you need host BLE commissioning.
          schema:
            type: int
            min: 0
            default: 568
            required: true
        - variable: group
          label: Group ID
          description: |
            The group ID that Matter.js Server runs as and that owns the data files.</br>
            Default `568` (TrueNAS `apps` group). Set to `0` (root) if you need host BLE commissioning.
          schema:
            type: int
            min: 0
            default: 568
            required: true

  - variable: network
    label: ""
    group: Network Configuration
    schema:
      type: dict
      attrs:
        - variable: host_network
          label: Host Network
          description: |
            Bind to the host network. Matter.js needs mDNS on UDP `5353` for device and Thread Border Router discovery, and host networking is the simplest way to get it.</br>
            </br>
            **REQUIRED FIRST: fix the TrueNAS Avahi conflict.** TrueNAS's `avahi-daemon` owns UDP `5353` exclusively (`disallow-other-stacks=yes`) and will block Matter.js from starting with `Cannot bind 0.0.0.0:5353`. SSH to the host once and run:</br>
            `sudo sed -i 's/disallow-other-stacks=yes/disallow-other-stacks=no/' /etc/avahi/avahi-daemon.conf && sudo systemctl restart avahi-daemon.service`</br>
            </br>
            To persist across TrueNAS upgrades, add the same as a Post-Init script under *System Settings → Advanced → Init/Shutdown Scripts*. This does **not** disable Avahi — it just removes Avahi's exclusive lock so Matter.js can also bind to `5353` via `SO_REUSEPORT`. TrueNAS's own mDNS keeps working.</br>
            </br>
            **Alternative — no host changes:** disable this toggle and attach the container to a pre-created **macvlan** network in the *Networks* section below. The container gets its own LAN IP and its own port `5353`, so there's no conflict with the host's Avahi at all. See *Networks* below for the `docker network create` command.</br>
            </br>
            Plain bridge networking (this toggle off, no macvlan) will break Matter device discovery — don't.
          schema:
            type: boolean
            default: true
        - variable: web_port
          label: WebSocket / Dashboard Port
          description: |
            Port that the dashboard and WebSocket API listen on. With host networking enabled, this is the port published directly on the host.
          schema:
            type: dict
            attrs:
              - variable: bind_mode
                label: Port Bind Mode
                description: |
                  The port bind mode.</br>
                  - Publish: The port will be published on the host for external access.</br>
                  - Expose: The port will be exposed for inter-container communication.</br>
                  - None: The port will not be exposed or published.</br>
                  Ignored when host networking is enabled.
                schema:
                  type: string
                  default: "published"
                  enum:
                    - value: "published"
                      description: Publish port on the host for external access
                    - value: "exposed"
                      description: Expose port for inter-container communication
                    - value: ""
                      description: None
              - variable: port_number
                label: Port Number
                schema:
                  type: int
                  default: 5580
                  min: 1
                  max: 65535
                  required: true
              - variable: host_ips
                label: Host IPs
                description: IPs on the host to bind this port
                schema:
                  type: list
                  show_if: [["bind_mode", "=", "published"]]
                  default: []
                  items:
                    - variable: host_ip
                      label: Host IP
                      schema:
                        type: string
                        required: true
                        $ref:
                          - definitions/node_bind_ip
        - variable: additional_ports
          label: Additional Ports
          schema:
            type: list
            show_if: [["host_network", "=", false]]
            default: []
            items:
              - variable: port
                label: Port
                schema:
                  type: dict
                  attrs:
                    - variable: bind_mode
                      label: Port Bind Mode
                      description: |
                        The port bind mode.</br>
                        - Publish: The port will be published on the host for external access.</br>
                        - Expose: The port will be exposed for inter-container communication.</br>
                      schema:
                        type: string
                        default: "published"
                        enum:
                          - value: "published"
                            description: Publish port on the host for external access
                          - value: "exposed"
                            description: Expose port for inter-container communication
                    - variable: port_number
                      label: Port Number
                      schema:
                        type: int
                        min: 1
                        max: 65535
                        required: true
                    - variable: container_port
                      label: Container Port
                      schema:
                        type: int
                        min: 1
                        max: 65535
                        required: true
                    - variable: protocol
                      label: Protocol
                      schema:
                        type: string
                        required: true
                        default: "tcp"
                        enum:
                          - value: "tcp"
                            description: TCP
                          - value: "udp"
                            description: UDP
                    - variable: host_ips
                      label: Host IPs
                      description: IPs on the host to bind this port
                      schema:
                        type: list
                        show_if: [["bind_mode", "=", "published"]]
                        default: []
                        items:
                          - variable: host_ip
                            label: Host IP
                            schema:
                              type: string
                              required: true
                              $ref:
                                - definitions/node_bind_ip
        - variable: networks
          label: Networks
          description: |
            Pre-existing docker networks for this container to join. The network must already exist on the TrueNAS host (create it via SSH with `docker network create ...`).</br>
            **Primary use case: macvlan.** A macvlan network gives the container its own LAN IP and its own UDP port 5353, sidestepping the host `avahi-daemon` conflict without modifying TrueNAS. Example pre-create command on the TrueNAS shell (replace `eno1`, subnet, and gateway with your values, and add `--ipv6 --subnet=... --gateway=...` if you want Thread Matter devices to work):</br>
            `docker network create -d macvlan -o parent=eno1 --subnet=192.168.1.0/24 --gateway=192.168.1.1 matter_lan`</br>
            Then add the network here with name `matter_lan`, container `matterjs-server`, and an IPv4 address outside your DHCP range (e.g. `192.168.1.200`).</br>
            Note: the TrueNAS host itself cannot reach a macvlan container by default. If Home Assistant runs as a separate TrueNAS app on the same box, it won't see the matter.js server unless you also add a "shim" macvlan interface on the host.
          schema:
            type: list
            show_if: [["host_network", "=", false]]
            default: []
            items:
              - variable: network
                label: Network
                schema:
                  type: dict
                  attrs:
                    - variable: name
                      label: Name
                      description: |
                        The name of the network to join.</br>
                        The network must already exist.
                      schema:
                        type: string
                        default: ""
                        required: true
                    - variable: containers
                      label: Containers
                      description: The containers to add to this network.
                      schema:
                        type: list
                        items:
                          - variable: container
                            label: Container
                            schema:
                              type: dict
                              attrs:
                                - variable: name
                                  label: Container Name
                                  schema:
                                    type: string
                                    required: true
                                    enum:
                                      - value: matterjs-server
                                        description: matterjs-server
                                - variable: config
                                  label: Container Network Configuration
                                  schema:
                                    type: dict
                                    attrs:
                                      - variable: aliases
                                        label: Aliases (Optional)
                                        description: The network aliases to use for this container on this network.
                                        schema:
                                          type: list
                                          default: []
                                          items:
                                            - variable: alias
                                              label: Alias
                                              schema:
                                                type: string
                                      - variable: interface_name
                                        label: Interface Name (Optional)
                                        description: The network interface name to use for this network
                                        schema:
                                          type: string
                                      - variable: mac_address
                                        label: MAC Address (Optional)
                                        description: The MAC address to use for this network interface.
                                        schema:
                                          type: string
                                      - variable: ipv4_address
                                        label: IPv4 Address (Optional)
                                        description: The IPv4 address to use for this network interface.
                                        schema:
                                          type: string
                                      - variable: ipv6_address
                                        label: IPv6 Address (Optional)
                                        description: The IPv6 address to use for this network interface.
                                        schema:
                                          type: string
                                      - variable: gw_priority
                                        label: Gateway Priority (Optional)
                                        description: Indicates the priority of the gateway for this network interface.
                                        schema:
                                          type: int
                                          "null": true
                                      - variable: priority
                                        label: Priority (Optional)
                                        description: Indicates in which order Compose connects the service's containers to its networks.
                                        schema:
                                          type: int
                                          "null": true

  - variable: storage
    label: ""
    group: Storage Configuration
    schema:
      type: dict
      attrs:
        - variable: data
          label: Matter.js Data Storage
          description: |
            Persistent storage for Matter fabric data, certificates, and dashboard state.
          schema:
            type: dict
            attrs:
              - variable: type
                label: Type
                description: |
                  ixVolume: Is dataset created automatically by the system.</br>
                  Host Path: Is a path that already exists on the system.
                schema:
                  type: string
                  required: true
                  default: "ix_volume"
                  enum:
                    - value: "host_path"
                      description: Host Path (Path that already exists on the system)
                    - value: "ix_volume"
                      description: ixVolume (Dataset created automatically by the system)
              - variable: ix_volume_config
                label: ixVolume Configuration
                description: The configuration for the ixVolume dataset.
                schema:
                  type: dict
                  show_if: [["type", "=", "ix_volume"]]
                  $ref:
                    - "normalize/ix_volume"
                  attrs:
                    - variable: acl_enable
                      label: Enable ACL
                      description: Enable ACL for the storage.
                      schema:
                        type: boolean
                        default: false
                    - variable: dataset_name
                      label: Dataset Name
                      description: The name of the dataset to use for storage.
                      schema:
                        type: string
                        required: true
                        hidden: true
                        default: "data"
                    - variable: acl_entries
                      label: ACL Configuration
                      schema:
                        type: dict
                        show_if: [["acl_enable", "=", true]]
                        attrs: []
              - variable: host_path_config
                label: Host Path Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "host_path"]]
                  attrs:
                    - variable: acl_enable
                      label: Enable ACL
                      description: Enable ACL for the storage.
                      schema:
                        type: boolean
                        default: false
                    - variable: acl
                      label: ACL Configuration
                      schema:
                        type: dict
                        show_if: [["acl_enable", "=", true]]
                        attrs: []
                        $ref:
                          - "normalize/acl"
                    - variable: path
                      label: Host Path
                      description: The host path to use for storage.
                      schema:
                        type: hostpath
                        show_if: [["acl_enable", "=", false]]
                        required: true
        - variable: ota
          label: OTA Provider Storage
          description: |
            Storage mounted at `/ota` for custom OTA firmware files.</br>
            Only used when "Enable Custom OTA Provider Directory" is enabled in the Matter.js Server settings.
          schema:
            type: dict
            attrs:
              - variable: type
                label: Type
                schema:
                  type: string
                  required: true
                  default: "ix_volume"
                  enum:
                    - value: "host_path"
                      description: Host Path (Path that already exists on the system)
                    - value: "ix_volume"
                      description: ixVolume (Dataset created automatically by the system)
              - variable: ix_volume_config
                label: ixVolume Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "ix_volume"]]
                  $ref:
                    - "normalize/ix_volume"
                  attrs:
                    - variable: acl_enable
                      label: Enable ACL
                      schema:
                        type: boolean
                        default: false
                    - variable: dataset_name
                      label: Dataset Name
                      schema:
                        type: string
                        required: true
                        hidden: true
                        default: "ota"
                    - variable: acl_entries
                      label: ACL Configuration
                      schema:
                        type: dict
                        show_if: [["acl_enable", "=", true]]
                        attrs: []
              - variable: host_path_config
                label: Host Path Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "host_path"]]
                  attrs:
                    - variable: acl_enable
                      label: Enable ACL
                      schema:
                        type: boolean
                        default: false
                    - variable: acl
                      label: ACL Configuration
                      schema:
                        type: dict
                        show_if: [["acl_enable", "=", true]]
                        attrs: []
                        $ref:
                          - "normalize/acl"
                    - variable: path
                      label: Host Path
                      schema:
                        type: hostpath
                        show_if: [["acl_enable", "=", false]]
                        required: true
        - variable: additional_storage
          label: Additional Storage
          schema:
            type: list
            default: []
            items:
              - variable: storageEntry
                label: Storage Entry
                schema:
                  type: dict
                  attrs:
                    - variable: type
                      label: Type
                      description: |
                        ixVolume: Is dataset created automatically by the system.</br>
                        Host Path: Is a path that already exists on the system.</br>
                        SMB Share: Is a SMB share that is mounted to as a volume.</br>
                        NFS Share: Is a NFS share that is mounted to as a volume.
                      schema:
                        type: string
                        required: true
                        default: "ix_volume"
                        enum:
                          - value: "host_path"
                            description: Host Path (Path that already exists on the system)
                          - value: "ix_volume"
                            description: ixVolume (Dataset created automatically by the system)
                          - value: "cifs"
                            description: SMB/CIFS Share (Mounts a volume to a SMB share)
                          - value: "nfs"
                            description: NFS Share (Mounts a volume to a NFS share)
                    - variable: read_only
                      label: Read Only
                      description: Mount the volume as read only.
                      schema:
                        type: boolean
                        default: false
                    - variable: mount_path
                      label: Mount Path
                      description: The path inside the container to mount the storage.
                      schema:
                        type: path
                        required: true
                    - variable: host_path_config
                      label: Host Path Configuration
                      schema:
                        type: dict
                        show_if: [["type", "=", "host_path"]]
                        attrs:
                          - variable: acl_enable
                            label: Enable ACL
                            description: Enable ACL for the storage.
                            schema:
                              type: boolean
                              default: false
                          - variable: acl
                            label: ACL Configuration
                            schema:
                              type: dict
                              show_if: [["acl_enable", "=", true]]
                              attrs: []
                              $ref:
                                - "normalize/acl"
                          - variable: path
                            label: Host Path
                            description: The host path to use for storage.
                            schema:
                              type: hostpath
                              show_if: [["acl_enable", "=", false]]
                              required: true
                    - variable: ix_volume_config
                      label: ixVolume Configuration
                      description: The configuration for the ixVolume dataset.
                      schema:
                        type: dict
                        show_if: [["type", "=", "ix_volume"]]
                        $ref:
                          - "normalize/ix_volume"
                        attrs:
                          - variable: acl_enable
                            label: Enable ACL
                            description: Enable ACL for the storage.
                            schema:
                              type: boolean
                              default: false
                          - variable: dataset_name
                            label: Dataset Name
                            description: The name of the dataset to use for storage.
                            schema:
                              type: string
                              required: true
                              default: "storage_entry"
                          - variable: acl_entries
                            label: ACL Configuration
                            schema:
                              type: dict
                              show_if: [["acl_enable", "=", true]]
                              attrs: []
                              $ref:
                                - "normalize/acl"
                    - variable: cifs_config
                      label: SMB Configuration
                      description: The configuration for the SMB dataset.
                      schema:
                        type: dict
                        show_if: [["type", "=", "cifs"]]
                        attrs:
                          - variable: server
                            label: Server
                            description: The server to mount the SMB share.
                            schema:
                              type: string
                              required: true
                          - variable: path
                            label: Path
                            description: The path to mount the SMB share.
                            schema:
                              type: string
                              required: true
                          - variable: username
                            label: Username
                            description: The username to use for the SMB share.
                            schema:
                              type: string
                              required: true
                          - variable: password
                            label: Password
                            description: The password to use for the SMB share.
                            schema:
                              type: string
                              required: true
                              private: true
                          - variable: domain
                            label: Domain
                            description: The domain to use for the SMB share.
                            schema:
                              type: string
                    - variable: nfs_config
                      label: NFS Configuration
                      description: The configuration for the NFS dataset.
                      schema:
                        type: dict
                        show_if: [["type", "=", "nfs"]]
                        attrs:
                          - variable: server
                            label: Server
                            description: The server to mount the NFS share.
                            schema:
                              type: string
                              required: true
                          - variable: path
                            label: Path
                            description: The path to mount the NFS share.
                            schema:
                              type: string
                              required: true

  - variable: labels
    label: ""
    group: Labels Configuration
    schema:
      type: list
      default: []
      items:
        - variable: label
          label: Label
          schema:
            type: dict
            attrs:
              - variable: key
                label: Key
                schema:
                  type: string
                  required: true
              - variable: value
                label: Value
                schema:
                  type: string
                  required: true
              - variable: containers
                label: Containers
                description: Containers where the label should be applied
                schema:
                  type: list
                  items:
                    - variable: container
                      label: Container
                      schema:
                        type: string
                        required: true
                        enum:
                          - value: matterjs-server
                            description: matterjs-server

  - variable: resources
    label: ""
    group: Resources Configuration
    schema:
      type: dict
      attrs:
        - variable: limits
          label: Limits
          schema:
            type: dict
            attrs:
              - variable: cpus
                label: CPUs
                description: CPUs limit for Matter.js Server.
                schema:
                  type: int
                  default: 2
                  required: true
              - variable: memory
                label: Memory (in MB)
                description: Memory limit for Matter.js Server.
                schema:
                  type: int
                  default: 1024
                  required: true
