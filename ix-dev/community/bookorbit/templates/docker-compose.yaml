{% set tpl = ix_lib.base.render.Render(values) %}

{% set bo_net = tpl.networks.create_internal("bookorbit-net") %}

{% set c1 = tpl.add_container(values.consts.bookorbit_container_name, "image") %}
{% set perm_container = tpl.deps.perms(values.consts.perms_container_name) %}
{% set perms_config = {"uid": values.run_as.user, "gid": values.run_as.group, "mode": "check"} %}

{% set pg_config = {
  "user": values.consts.db_user,
  "password": values.bookorbit.db_password,
  "database": values.consts.db_name,
  "volume": values.storage.postgres_data,
} %}
{% set postgres = tpl.deps.postgres(values.consts.postgres_container_name, values.bookorbit.postgres_image_selector, pg_config, perm_container) %}

{% do c1.add_network(bo_net) %}
{% do postgres.container.add_network(bo_net) %}

{% do c1.set_user(values.run_as.user, values.run_as.group) %}
{% do c1.set_init(true) %}
{% do c1.depends.add_dependency(values.consts.postgres_container_name, "service_healthy") %}
{% do c1.healthcheck.set_test("node", {"port": values.network.web_port.port_number, "path": "/api/v1/health"}) %}

{% do c1.environment.add_env("PORT", values.network.web_port.port_number) %}
{% do c1.environment.add_env("DATABASE_URL", postgres.get_url("postgres")) %}
{% do c1.environment.add_env("JWT_SECRET", values.bookorbit.jwt_secret) %}
{% do c1.environment.add_env("SETUP_BOOTSTRAP_TOKEN", values.bookorbit.bootstrap_token) %}
{% do c1.environment.add_env("APP_DATA_PATH", values.consts.data_path) %}
{% do c1.environment.add_env("BOOK_DOCK_PATH", values.consts.book_drop_path) %}

{% do c1.environment.add_user_envs(values.bookorbit.additional_envs) %}

{% do c1.add_port(values.network.web_port) %}

{% do c1.add_storage("/tmp", {"type": "tmpfs", "tmpfs_config": {"size": 20}}) %}

{% do c1.add_storage(values.consts.data_path, values.storage.data) %}
{% do perm_container.add_or_skip_action("data", values.storage.data, perms_config) %}

{% do c1.add_storage("/books", values.storage.books) %}
{% do perm_container.add_or_skip_action("books", values.storage.books, perms_config) %}

{% do c1.add_storage(values.consts.book_drop_path, values.storage.book_drop) %}
{% do perm_container.add_or_skip_action("book-drop", values.storage.book_drop, perms_config) %}

{% for store in values.storage.additional_storage %}
  {% do c1.add_storage(store.mount_path, store) %}
  {% do perm_container.add_or_skip_action(store.mount_path, store, perms_config) %}
{% endfor %}

{% if perm_container.has_actions() %}
  {% do perm_container.activate() %}
  {% do c1.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
  {% do postgres.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
{% endif %}

{% do tpl.portals.add(values.network.web_port) %}

{{ tpl.render() | tojson }}
