{% set tpl = ix_lib.base.render.Render(values) %}

{% set rr_net = tpl.networks.create_internal("reactive-resume-net") %}

{% set c1 = tpl.add_container(values.consts.reactive_resume_container_name, "image") %}
{% set c2 = tpl.add_container(values.consts.chromedp_container_name, "chromedp_image") %}
{% set perm_container = tpl.deps.perms(values.consts.perms_container_name) %}

{% set pg_config = {
  "user": values.consts.db_user,
  "password": values.reactive_resume.db_password,
  "database": values.consts.db_name,
  "volume": values.storage.postgres_data,
} %}
{% set postgres = tpl.deps.postgres(
  values.consts.postgres_container_name,
  values.reactive_resume.postgres_image_selector,
  pg_config, perm_container
) %}

{% do c1.add_network(rr_net) %}
{% do c2.add_network(rr_net) %}
{% do postgres.container.add_network(rr_net) %}

{% do c1.set_user(values.run_as.user, values.run_as.group) %}
{% do c2.set_user(values.run_as.user, values.run_as.group) %}
{% do c1.depends.add_dependency(values.consts.postgres_container_name, "service_healthy") %}
{% do c1.depends.add_dependency(values.consts.chromedp_container_name, "service_healthy") %}
{% do c1.healthcheck.set_test("curl", {"port": values.network.web_port.port_number, "path": "/api/health"}) %}
{% do c2.healthcheck.disable() %}

{% do c1.environment.add_env("PORT", values.network.web_port.port_number) %}
{% do c1.environment.add_env("APP_URL", values.reactive_resume.base_url) %}
{% do c1.environment.add_env("PRINTER_APP_URL", "http://%s:%d" | format(values.consts.reactive_resume_container_name, values.network.web_port.port_number)) %}
{% do c1.environment.add_env("PRINTER_ENDPOINT", "http://%s:%d" | format(values.consts.chromedp_container_name, values.consts.chromedp_port)) %}
{% do c1.environment.add_env("AUTH_SECRET", values.reactive_resume.secret_key) %}
{% do c1.environment.add_env("DATABASE_URL", postgres.get_url("postgres")) %}

{% do c1.environment.add_user_envs(values.reactive_resume.additional_envs) %}

{% set perms_config = {"uid": values.run_as.user, "gid": values.run_as.group, "mode": "check"} %}
{% do c1.add_storage("/app/data", values.storage.data) %}
{% do perm_container.add_or_skip_action("data", values.storage.data, perms_config) %}
{% for store in values.storage.additional_storage %}
  {% do c1.add_storage(store.mount_path, store) %}
  {% do perm_container.add_or_skip_action(store.mount_path, store, perms_config) %}
{% endfor %}

{% do c1.add_port(values.network.web_port) %}

{% if perm_container.has_actions() %}
  {% do perm_container.activate() %}
  {% do c1.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
  {% do postgres.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
{% endif %}

{% do tpl.portals.add(values.network.web_port, {"scheme": "http"}) %}

{{ tpl.render() | tojson }}
