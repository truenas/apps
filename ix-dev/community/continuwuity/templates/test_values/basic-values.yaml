continuwuity:
  server_name: example.com
  max_request_size: 20000000
  allow_registration: true
  registration_token: your_token
  allow_federation: false
  trusted_servers: []
  check_for_updates: true
  bind_to_adress: 0.0.0.0
  additional_envs: []

network:
  web_port:
    bind_mode: published
    port_number: 8080
  host_network: false

run_as:
  user: 568
  group: 568

ix_volumes:
  db_data: /opt/tests/mnt/continuwuity/db_data

storage:
  db_data:
    type: ix_volume
    ix_volume_config:
      dataset_name: db_data
      create_host_path: true
  additional_storage: []
