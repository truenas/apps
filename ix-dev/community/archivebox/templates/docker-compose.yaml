{% set tpl = ix_lib.base.render.Render(values) %}

{% set archivebox_net = tpl.networks.create_internal("archivebox-net") %}

{% set c = tpl.add_container(values.consts.archivebox_container_name, "image") %}
{% do c.add_network(archivebox_net) %}
{% set perm_container = tpl.deps.perms(values.consts.perms_container_name) %}

{# Health check on the web UI port #}
{% do c.healthcheck.set_test("curl", {"port": values.network.web_port.port_number, "path": "/"}) %}

{# Core environment variables #}
{% do c.environment.add_env("ALLOWED_HOSTS", "*") %}
{% do c.environment.add_env("PUBLIC_INDEX", values.archivebox.public_index) %}
{% do c.environment.add_env("PUBLIC_SNAPSHOTS", values.archivebox.public_snapshots) %}
{% do c.environment.add_env("PUBLIC_ADD_VIEW", values.archivebox.public_add_view) %}

{# CSRF trusted origins - required for login/API to work from non-localhost #}
{% if values.archivebox.csrf_trusted_origins %}
  {% do c.environment.add_env("CSRF_TRUSTED_ORIGINS", values.archivebox.csrf_trusted_origins) %}
{% else %}
  {% do c.environment.add_env("CSRF_TRUSTED_ORIGINS", "http://localhost:%d"|format(values.network.web_port.port_number)) %}
{% endif %}

{# Archiving behavior #}
{% do c.environment.add_env("TIMEOUT", values.archivebox.timeout) %}
{% do c.environment.add_env("CHECK_SSL_VALIDITY", values.archivebox.check_ssl_validity) %}
{% do c.environment.add_env("SAVE_ARCHIVE_DOT_ORG", values.archivebox.save_archive_dot_org) %}

{# Admin credentials (only used on first run) #}
{% do c.environment.add_env("ADMIN_USERNAME", values.archivebox.admin_username) %}
{% do c.environment.add_env("ADMIN_PASSWORD", values.archivebox.admin_password) %}

{# Sonic search backend configuration #}
{% if values.archivebox.search_backend_enabled %}
  {% set sonic = tpl.add_container(values.consts.sonic_container_name, "sonic_image") %}
  {% do sonic.set_user(568, 568) %}
  {% do sonic.add_network(archivebox_net) %}
  {% do sonic.healthcheck.set_test("netcat", {"port": 1491}) %}
  {% do sonic.environment.add_env("SEARCH_BACKEND_PASSWORD", values.archivebox.search_backend_password) %}
  {% do sonic.add_storage("/var/lib/sonic/store", values.storage.sonic_data) %}

  {% do c.depends.add_dependency(values.consts.sonic_container_name, "service_healthy") %}
  {% do c.environment.add_env("SEARCH_BACKEND_ENGINE", "sonic") %}
  {% do c.environment.add_env("SEARCH_BACKEND_HOST_NAME", values.consts.sonic_container_name) %}
  {% do c.environment.add_env("SEARCH_BACKEND_PASSWORD", values.archivebox.search_backend_password) %}

  {% do perm_container.add_or_skip_action("sonic_data", values.storage.sonic_data, {"uid": 568, "gid": 568, "mode": "check"}) %}
{% endif %}

{# Additional user-defined environment variables #}
{% do c.environment.add_user_envs(values.archivebox.additional_envs) %}

{# Port mapping #}
{% do c.add_port(values.network.web_port) %}

{# Storage: main data directory #}
{% do c.add_storage("/data", values.storage.data) %}

{# Additional storage mounts #}
{% for store in values.storage.additional_storage %}
  {% do c.add_storage(store.mount_path, store) %}
{% endfor %}

{# Permissions container #}
{% if perm_container.has_actions() %}
  {% do perm_container.activate() %}
  {% if values.archivebox.search_backend_enabled %}
    {% do sonic.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
  {% endif %}
{% endif %}

{# Portal for TrueNAS UI #}
{% do tpl.portals.add(values.network.web_port) %}

{{ tpl.render() | tojson }}
