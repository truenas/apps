{% set tpl = ix_lib.base.render.Render(values) %}

{% set archivebox_net = tpl.networks.create_internal("archivebox-net") %}

{% set perm_container = tpl.deps.perms(values.consts.perms_container_name) %}
{% set perms_config = {"uid": values.run_as.user, "gid": values.run_as.group, "mode": "check"}%}

{% set archivebox = tpl.add_container(values.consts.archivebox_container_name, "image") %}
{% do archivebox.add_network(archivebox_net) %}

{% set scheduler = tpl.add_container(values.consts.scheduler_container_name, "image") %}
{% do scheduler.add_network(archivebox_net) %}

{% set sonic = tpl.add_container(values.consts.sonic_container_name, "sonic_image") %}
{% do sonic.add_network(archivebox_net) %}

{% set sonic_password = tpl.funcs.secure_string(32) %}
{% set containers = [archivebox, scheduler] %}
{% for c in containers %}
  {% do c.add_caps(["CHOWN", "SETGID", "SETUID", "FOWNER", "DAC_OVERRIDE"]) %}
  {% do c.depends.add_dependency(values.consts.sonic_container_name, "service_healthy") %}

  {% do c.environment.add_env("DATA_DIR", values.archivebox.timeout) %}
  {% do c.environment.add_env("TIMEOUT", values.archivebox.timeout) %}
  {% do c.environment.add_env("SAVE_ARCHIVE_DOT_ORG", values.archivebox.save_archive_dot_org) %}
  {% do c.environment.add_env("SEARCH_BACKEND_ENGINE", "sonic") %}
  {% do c.environment.add_env("SEARCH_BACKEND_PORT", values.consts.internal_sonic_port) %}
  {% do c.environment.add_env("SEARCH_BACKEND_HOST_NAME", values.consts.sonic_container_name) %}
  {% do c.environment.add_env("SEARCH_BACKEND_PASSWORD", sonic_password) %}
  {% do c.environment.add_user_envs(values.archivebox.additional_envs) %}

  {% do c.add_storage(values.consts.data_path, values.storage.data) %}
{% endfor %}


{% do archivebox.set_command(["server", "--init", "0.0.0.0:%d"|format(values.network.web_port.port_number)]) %}
{% do archivebox.healthcheck.set_test("curl", {"port": values.network.web_port.port_number, "path": "/health/"}) %}
{% do archivebox.environment.add_env("PUBLIC_INDEX", values.archivebox.public_index) %}
{% do archivebox.environment.add_env("PUBLIC_SNAPSHOTS", values.archivebox.public_snapshots) %}
{% do archivebox.environment.add_env("PUBLIC_ADD_VIEW", values.archivebox.public_add_view) %}
{% do archivebox.environment.add_env("ADMIN_USERNAME", values.archivebox.admin_username) %}
{% do archivebox.environment.add_env("ADMIN_PASSWORD", values.archivebox.admin_password) %}

{% do archivebox.add_port(values.network.web_port) %}

{% do scheduler.set_command(["schedule", "--foreground", "--update", "--every=day"]) %}
{% do scheduler.healthcheck.set_test("pgrep", {"process": "archivebox schedule --foreground"}) %}
{% do scheduler.depends.add_dependency(values.consts.archivebox_container_name, "service_healthy") %}

{% do sonic.set_user(values.run_as.user, values.run_as.group) %}
{# 05D3 == 1491 in hex (sonic port) #}
{% do sonic.healthcheck.set_custom_test(["CMD", "bash", "-c", "grep -q '00000000:05D3' /proc/net/tcp"]) %}
{% do sonic.environment.add_env("SEARCH_BACKEND_PASSWORD", sonic_password) %}

{% do sonic.add_storage("/var/lib/sonic/store", values.storage.sonic_data) %}
{% do perm_container.add_or_skip_action("sonic_data", values.storage.sonic_data, perms_config) %}

{% for store in values.storage.additional_storage %}
  {% do archivebox.add_storage(store.mount_path, store) %}
  {% do scheduler.add_storage(store.mount_path, store) %}
  {% do perm_container.add_or_skip_action(store.mount_path, store, perms_config) %}
{% endfor %}

{% if perm_container.has_actions() %}
  {% do perm_container.activate() %}
  {% do archivebox.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
  {% do scheduler.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
  {% do sonic.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
{% endif %}

{% do tpl.portals.add(values.network.web_port) %}

{{ tpl.render() | tojson }}
