{% set tpl = ix_lib.base.render.Render(values) %}
{% set public_url = tpl.funcs.url_to_dict(values.archivebox.public_url, True) %}
{% set allowed_host = public_url.host %}
{% set sonic_password = "archivebox" %}
{% set user_env = namespace(
  allowed_hosts=false,
  csrf_trusted_origins=false,
  check_ssl_validity=false
) %}
{% if public_url.port %}
  {% set allowed_host = "%s:%d"|format(public_url.host, public_url.port) %}
{% endif %}
{% set csrf_trusted_origin = "%s://%s"|format(public_url.scheme, allowed_host) %}
{% for item in values.archivebox.additional_envs %}
  {% if item.name == "ALLOWED_HOSTS" %}
    {% set user_env.allowed_hosts = true %}
  {% elif item.name == "CSRF_TRUSTED_ORIGINS" %}
    {% set user_env.csrf_trusted_origins = true %}
  {% elif item.name == "CHECK_SSL_VALIDITY" %}
    {% set user_env.check_ssl_validity = true %}
  {% endif %}
{% endfor %}

{% macro add_archivebox_shared_env(container) %}
  {# Archiving behavior shared by the web and scheduler containers #}
  {% do container.environment.add_env("TIMEOUT", values.archivebox.timeout) %}
  {% if not user_env.check_ssl_validity %}
    {% do container.environment.add_env("CHECK_SSL_VALIDITY", false) %}
  {% endif %}
  {% do container.environment.add_env("SAVE_ARCHIVE_DOT_ORG", values.archivebox.save_archive_dot_org) %}
  {% if values.archivebox.user_agent %}
    {% do container.environment.add_env("USER_AGENT", values.archivebox.user_agent) %}
  {% endif %}
  {% if values.archivebox.cookies_file %}
    {% do container.environment.add_env("COOKIES_FILE", values.archivebox.cookies_file) %}
  {% endif %}
  {% if values.archivebox.chrome_user_data_dir %}
    {% do container.environment.add_env("CHROME_USER_DATA_DIR", values.archivebox.chrome_user_data_dir) %}
  {% endif %}

  {# Additional user-defined environment variables #}
  {% do container.environment.add_user_envs(values.archivebox.additional_envs) %}
{% endmacro %}

{% macro add_archivebox_web_env(container) %}
  {# Core environment variables #}
  {% if not user_env.allowed_hosts %}
    {% do container.environment.add_env("ALLOWED_HOSTS", allowed_host) %}
  {% endif %}
  {% do container.environment.add_env("PUBLIC_INDEX", values.archivebox.public_index) %}
  {% do container.environment.add_env("PUBLIC_SNAPSHOTS", values.archivebox.public_snapshots) %}
  {% do container.environment.add_env("PUBLIC_ADD_VIEW", values.archivebox.public_add_view) %}
  {% if not user_env.csrf_trusted_origins %}
    {% do container.environment.add_env("CSRF_TRUSTED_ORIGINS", csrf_trusted_origin) %}
  {% endif %}

  {# Admin credentials (only used on first run) #}
  {% do container.environment.add_env("ADMIN_USERNAME", values.archivebox.admin_username) %}
  {% do container.environment.add_env("ADMIN_PASSWORD", values.archivebox.admin_password) %}
{% endmacro %}

{% set archivebox_net = tpl.networks.create_internal("archivebox-net") %}

{% set archivebox = tpl.add_container(values.consts.archivebox_container_name, "image") %}
{% do archivebox.add_network(archivebox_net) %}
{% set scheduler = tpl.add_container(values.consts.scheduler_container_name, "image") %}
{% do scheduler.add_network(archivebox_net) %}
{% do scheduler.set_command(["schedule", "--foreground", "--update", "--every=day"]) %}
{% set perm_container = tpl.deps.perms(values.consts.perms_container_name) %}

{# Health checks #}
{% do archivebox.healthcheck.set_test("curl", {
  "port": values.consts.internal_web_port,
  "path": "/health/",
  "host": "127.0.0.1",
  "headers": [["Host", allowed_host]]
}) %}
{% do scheduler.healthcheck.set_test("pgrep", {"process": "archivebox schedule --foreground"}) %}

{% do add_archivebox_shared_env(archivebox) %}
{% do add_archivebox_web_env(archivebox) %}
{% do add_archivebox_shared_env(scheduler) %}

{# Sonic search backend configuration #}
{% set sonic = tpl.add_container(values.consts.sonic_container_name, "sonic_image") %}
{% do sonic.set_user(568, 568) %}
{% do sonic.add_network(archivebox_net) %}
{% do sonic.healthcheck.set_test("netcat", {"port": 1491}) %}
{% do sonic.environment.add_env("SEARCH_BACKEND_PASSWORD", sonic_password) %}
{% do sonic.add_storage("/var/lib/sonic/store", values.storage.sonic_data) %}

{% do archivebox.depends.add_dependency(values.consts.sonic_container_name, "service_healthy") %}
{% do scheduler.depends.add_dependency(values.consts.sonic_container_name, "service_healthy") %}
{% do archivebox.environment.add_env("SEARCH_BACKEND_ENGINE", "sonic") %}
{% do archivebox.environment.add_env("SEARCH_BACKEND_HOST_NAME", values.consts.sonic_container_name) %}
{% do archivebox.environment.add_env("SEARCH_BACKEND_PASSWORD", sonic_password) %}
{% do scheduler.environment.add_env("SEARCH_BACKEND_ENGINE", "sonic") %}
{% do scheduler.environment.add_env("SEARCH_BACKEND_HOST_NAME", values.consts.sonic_container_name) %}
{% do scheduler.environment.add_env("SEARCH_BACKEND_PASSWORD", sonic_password) %}

{% do perm_container.add_or_skip_action("sonic_data", values.storage.sonic_data, {"uid": 568, "gid": 568, "mode": "check"}) %}

{# Port mapping #}
{% do archivebox.add_port(values.network.web_port, {"container_port": values.consts.internal_web_port}) %}

{# Storage: main data directory #}
{% do archivebox.add_storage("/data", values.storage.data) %}
{% do scheduler.add_storage("/data", values.storage.data) %}

{# Additional storage mounts #}
{% for store in values.storage.additional_storage %}
  {% do archivebox.add_storage(store.mount_path, store) %}
  {% do scheduler.add_storage(store.mount_path, store) %}
{% endfor %}

{# Permissions container #}
{% if perm_container.has_actions() %}
  {% do perm_container.activate() %}
  {% do archivebox.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
  {% do scheduler.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
  {% do sonic.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
{% endif %}

{# Portal for TrueNAS UI #}
{% do tpl.portals.add(values.network.web_port) %}

{{ tpl.render() | tojson }}
