resources:
  limits:
    cpus: 2.0
    memory: 4096

TZ: Etc/UTC

archivebox:
  admin_username: admin
  admin_password: testpassword123
  public_index: true
  public_snapshots: true
  public_add_view: false
  search_backend_enabled: true
  search_backend_password: SonicTestPassword
  additional_envs: []

network:
  web_port:
    bind_mode: published
    port_number: 8080

ix_volumes:
  data: /opt/tests/mnt/archivebox/data
  sonic_data: /opt/tests/mnt/archivebox/sonic-data

storage:
  data:
    type: ix_volume
    ix_volume_config:
      dataset_name: data
      create_host_path: true
  sonic_data:
    type: ix_volume
    ix_volume_config:
      dataset_name: sonic_data
      create_host_path: true
  additional_storage: []
