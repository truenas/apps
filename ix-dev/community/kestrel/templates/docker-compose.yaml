{% set tpl = ix_lib.base.render.Render(values) %}

{% set c1 = tpl.add_container(values.consts.kestrel_container_name, "image") %}
{% do c1.set_user(values.run_as.user, values.run_as.group) %}

{% do c1.environment.add_env("KESTREL_PORT", values.network.web_port.port_number) %}
{% do c1.environment.add_env("KESTREL_DB_PATH", "/data/kestrel.db") %}
{% do c1.environment.add_env("TZ", values.TZ) %}

{% for env in values.kestrel.additional_envs %}
  {% do c1.environment.add_env(env.name, env.value) %}
{% endfor %}

{% do c1.add_port(values.network.web_port) %}
{% do c1.add_storage("/data", values.storage.data) %}

{% for store in values.storage.additional_storage %}
  {% do c1.add_storage(store.mount_path, store) %}
{% endfor %}

{% set perms = tpl.deps.perms(values.consts.perms_container_name) %}
{% set perms_config = {"uid": values.run_as.user, "gid": values.run_as.group, "mode": "check"} %}
{% do perms.add_or_skip_action("data", values.storage.data, perms_config) %}

{# Add Playwright scraper sidecar if enabled #}
{% if values.extractor.mode == "playwright" %}
  {% do c1.environment.add_env("KESTREL_EXTRACTOR_MODE", "playwright") %}
  {% do c1.environment.add_env("KESTREL_SCRAPER_URL", "http://" + values.consts.scraper_container_name + ":8001") %}

  {% set c2 = tpl.add_container(values.consts.scraper_container_name, "playwright_image") %}
  {% do c2.set_user(values.run_as.user, values.run_as.group) %}
  {% do c2.environment.add_env("PORT", "8001") %}
  {% do c2.healthcheck.set_test("curl", {"port": 8001, "path": "/health"}) %}
  {% do c1.depends.add_dependency(values.consts.scraper_container_name, "service_healthy") %}
{% elif values.extractor.mode == "external" %}
  {% do c1.environment.add_env("KESTREL_EXTRACTOR_MODE", "external") %}
  {% do c1.environment.add_env("KESTREL_SCRAPER_URL", values.extractor.scraper_url) %}
{% endif %}

{% if perms.has_actions() %}
  {% do perms.activate() %}
  {% do c1.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
{% endif %}

{% do tpl.notes.set_body("kestrel is a purchase planner that extracts prices from e-commerce URLs and calendarizes purchases based on your paydays and budget.") %}
{% do tpl.portals.add(values.network.web_port, {"name": "Web UI", "scheme": "http"}) %}

{{ tpl.render() | tojson }}
