resources:
  limits:
    cpus: 2.0
    memory: 1024

TZ: Etc/UTC

kestrel:
  budget_mode: per_payday
  budget_amount: 500
  purchase_mode: as_many_as_possible
  sort_criteria: price_asc
  currency: USD
  additional_envs: []

extractor:
  mode: http
  scraper_url: ""

run_as:
  user: 568
  group: 568

network:
  host_network: false
  certificate_id: null
  web_port:
    bind_mode: published
    port_number: 31012

ix_volumes:
  data: /opt/tests/mnt/kestrel/data

storage:
  data:
    type: ix_volume
    ix_volume_config:
      dataset_name: data
      create_host_path: true
  additional_storage:
    - type: anonymous
      mount_path: /scratchpad
      volume_config:
        nocopy: true
