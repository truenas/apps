resources:
  limits:
    cpus: 2.0
    memory: 1024

TZ: Etc/UTC

kestrel:
  budget_mode: per_payday
  budget_amount: 500
  purchase_mode: as_many_as_possible
  sort_criteria: price_asc
  currency: USD

extractor:
  mode: http
  scraper_url: ""

network:
  web_port:
    bind_mode: published
    port_number: 8000

run_as:
  user: 568
  group: 568

ix_volumes:
  data: /opt/tests/mnt/kestrel/data

storage:
  data:
    type: ix_volume
    ix_volume_config:
      dataset_name: data
      create_host_path: true
  additional_storage: []
