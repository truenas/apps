resources:
  limits:
    cpus: 2.0
    memory: 4096

gptwol:
  additional_envs: []

network:
  host_network: false
  web_port:
    bind_mode: published
    port_number: 8080

run_as:
  user: 568
  group: 568

ix_volumes:
  db: /opt/tests/mnt/gptwol/db
  cron: /opt/tests/mnt/gptwol/cron

storage:
  db:
    type: ix_volume
    ix_volume_config:
      dataset_name: db
      create_host_path: true
  cron:
    type: ix_volume
    ix_volume_config:
      dataset_name: cron
      create_host_path: true
  additional_storage: []
