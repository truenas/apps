groups:
  - name: Glance Configuration
    description: Configure Glance Settings
  - name: User and Group Configuration
    description: Configure User and Group for Glance
  - name: Network Configuration
    description: Configure Network for Glance
  - name: Storage Configuration
    description: Configure Storage for Glance
  - name: Labels Configuration
    description: Configure Labels for Glance
  - name: Resources Configuration
    description: Configure Resources for Glance

questions:
  - variable: glance
    label: ""
    group: Glance Configuration
    schema:
      type: dict
      attrs:
        - variable: enable_docker_socket
          label: Enable Docker Socket
          description: |
            Mount the Docker socket into the container.
            Required for the Docker containers widget.
            Warning: This gives Glance read access to your Docker daemon.
          schema:
            type: boolean
            default: false
        - variable: additional_envs
          label: Additional Environment Variables
          description: Configure additional environment variables for Glance.
          schema:
            type: list
            default: []
            items:
              - variable: env
                label: Environment Variable
                schema:
                  type: dict
                  attrs:
                    - variable: name
                      label: Name
                      schema:
                        type: string
                        required: true
                    - variable: value
                      label: Value
                      schema:
                        type: string
                        required: true

  - variable: run_as
    label: ""
    group: User and Group Configuration
    schema:
      type: dict
      attrs:
        - variable: user
          label: User ID
          description: The user ID that Glance will run as.
          schema:
            type: int
            min: 2
            default: 568
            required: true
        - variable: group
          label: Group ID
          description: The group ID that Glance will run as.
          schema:
            type: int
            min: 2
            default: 568
            required: true

  - variable: network
    label: ""
    group: Network Configuration
    schema:
      type: dict
      attrs:
        - variable: web_port
          label: Web Port
          description: The port for the Glance web interface.
          schema:
            type: dict
            attrs:
              - variable: bind_mode
                label: Port Bind Mode
                description: The bind mode for the port.
                schema:
                  type: string
                  default: published
                  enum:
                    - value: published
                      description: Publish port on the host for external access
                    - value: exposed
                      description: Expose port for inter-container communication
                    - value: ""
                      description: None
              - variable: port_number
                label: Port Number
                description: The port number to bind on the host.
                schema:
                  type: int
                  default: 8080
                  min: 1
                  max: 65535
                  required: true
              - variable: host_ips
                label: Host IPs
                description: The host IPs to bind the port on.
                schema:
                  type: list
                  default: []
                  items:
                    - variable: host_ip
                      label: Host IP
                      schema:
                        type: string
                        valid_chars: '^(0\.0\.0\.0|[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3})$'
        - variable: host_network
          label: Host Network
          description: Enable host network for Glance.
          schema:
            type: boolean
            default: false

  - variable: storage
    label: ""
    group: Storage Configuration
    schema:
      type: dict
      attrs:
        - variable: config
          label: Glance Config Storage
          description: Stores Glance configuration files.
          schema:
            type: dict
            attrs:
              - variable: type
                label: Type
                description: Type of storage for Glance config.
                schema:
                  type: string
                  default: ix_volume
                  enum:
                    - value: host_path
                      description: Host Path (Path that already exists on the system)
                    - value: ix_volume
                      description: ixVolume (Temporary Deprecated) - Deprecated, use Host Path instead
              - variable: ix_volume_config
                label: ixVolume Configuration
                description: Configuration for the ixVolume.
                schema:
                  type: dict
                  show_if: [["type", "=", "ix_volume"]]
                  $ref:
                    - "normalize/ixVolume"
                  attrs:
                    - variable: acl_enable
                      label: Enable ACL
                      description: Enable ACL for the ixVolume.
                      schema:
                        type: boolean
                        default: false
                    - variable: dataset_name
                      label: Dataset Name
                      description: The name of the dataset for Glance config.
                      schema:
                        type: string
                        required: true
                        immutable: true
                        default: glance_config
              - variable: host_path_config
                label: Host Path Configuration
                description: Configuration for the host path.
                schema:
                  type: dict
                  show_if: [["type", "=", "host_path"]]
                  attrs:
                    - variable: acl_enable
                      label: Enable ACL
                      description: Enable ACL for the host path.
                      schema:
                        type: boolean
                        default: false
                    - variable: path
                      label: Host Path
                      description: The host path for Glance config.
                      schema:
                        type: hostpath
                        required: true
        - variable: assets
          label: Glance Assets Storage
          description: Stores Glance custom assets (images, icons, etc).
          schema:
            type: dict
            attrs:
              - variable: type
                label: Type
                description: Type of storage for Glance assets.
                schema:
                  type: string
                  default: ix_volume
                  enum:
                    - value: host_path
                      description: Host Path (Path that already exists on the system)
                    - value: ix_volume
                      description: ixVolume (Temporary Deprecated) - Deprecated, use Host Path instead
              - variable: ix_volume_config
                label: ixVolume Configuration
                description: Configuration for the ixVolume.
                schema:
                  type: dict
                  show_if: [["type", "=", "ix_volume"]]
                  $ref:
                    - "normalize/ixVolume"
                  attrs:
                    - variable: acl_enable
                      label: Enable ACL
                      description: Enable ACL for the ixVolume.
                      schema:
                        type: boolean
                        default: false
                    - variable: dataset_name
                      label: Dataset Name
                      description: The name of the dataset for Glance assets.
                      schema:
                        type: string
                        required: true
                        immutable: true
                        default: glance_assets
              - variable: host_path_config
                label: Host Path Configuration
                description: Configuration for the host path.
                schema:
                  type: dict
                  show_if: [["type", "=", "host_path"]]
                  attrs:
                    - variable: acl_enable
                      label: Enable ACL
                      description: Enable ACL for the host path.
                      schema:
                        type: boolean
                        default: false
                    - variable: path
                      label: Host Path
                      description: The host path for Glance assets.
                      schema:
                        type: hostpath
                        required: true
        - variable: additional_storage
          label: Additional Storage
          description: Additional storage for Glance.
          schema:
            type: list
            default: []
            items:
              - variable: storageEntry
                label: Storage Entry
                schema:
                  type: dict
                  attrs:
                    - variable: type
                      label: Type
                      schema:
                        type: string
                        default: host_path
                        enum:
                          - value: host_path
                            description: Host Path (Path that already exists on the system)
                          - value: ix_volume
                            description: ixVolume (Temporary Deprecated) - Deprecated, use Host Path instead
                          - value: tmpfs
                            description: Temporary Filesystem (tmpfs)
                    - variable: mount_path
                      label: Mount Path
                      description: Path inside the container to mount the storage.
                      schema:
                        type: path
                        required: true
                    - variable: host_path_config
                      label: Host Path Configuration
                      schema:
                        type: dict
                        show_if: [["type", "=", "host_path"]]
                        attrs:
                          - variable: acl_enable
                            label: Enable ACL
                            schema:
                              type: boolean
                              default: false
                          - variable: path
                            label: Host Path
                            schema:
                              type: hostpath
                              required: true
                    - variable: ix_volume_config
                      label: ixVolume Configuration
                      schema:
                        type: dict
                        show_if: [["type", "=", "ix_volume"]]
                        $ref:
                          - "normalize/ixVolume"
                        attrs:
                          - variable: acl_enable
                            label: Enable ACL
                            schema:
                              type: boolean
                              default: false
                          - variable: dataset_name
                            label: Dataset Name
                            schema:
                              type: string
                              required: true
                    - variable: tmpfs_config
                      label: Temporary Filesystem Configuration
                      schema:
                        type: dict
                        show_if: [["type", "=", "tmpfs"]]
                        attrs:
                          - variable: size
                            label: Size (in MB)
                            schema:
                              type: int
                              default: 500
                              min: 100

  - variable: labels
    label: ""
    group: Labels Configuration
    schema:
      type: list
      default: []
      items:
        - variable: label
          label: Label
          schema:
            type: dict
            attrs:
              - variable: key
                label: Key
                schema:
                  type: string
                  required: true
              - variable: value
                label: Value
                schema:
                  type: string
                  required: true

  - variable: resources
    label: ""
    group: Resources Configuration
    schema:
      type: dict
      attrs:
        - variable: limits
          label: Limits
          schema:
            type: dict
            attrs:
              - variable: cpus
                label: CPUs
                description: CPUs limit for Glance.
                schema:
                  type: int
                  default: 2
                  min: 1
                  max: 128
              - variable: memory
                label: Memory (in MB)
                description: Memory limit for Glance in MB.
                schema:
                  type: int
                  default: 512
                  min: 128
