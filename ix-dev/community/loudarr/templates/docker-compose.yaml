{% set tpl = ix_lib.base.render.Render(values) %}

{% set c1 = tpl.add_container(values.consts.loudarr_container_name, "image") %}
{% do c1.set_user(0, 0) %}
{% do c1.healthcheck.set_test("curl", {"port": 5000, "path": "/"}) %}
{% do c1.environment.add_env("TZ", values.TZ) %}
{% do c1.environment.add_env("DATABASE_PATH", "/data/loudarr.db") %}
{% do c1.environment.add_env("PYTHONUNBUFFERED", "1") %}
{% do c1.environment.add_user_envs(values.loudarr.additional_envs) %}

{% do c1.add_port(values.network.web_port) %}
{% do c1.add_storage("/data", values.storage.data) %}

{% do tpl.portals.add(values.network.web_port) %}

{{ tpl.render() | tojson }}
