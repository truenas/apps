images:
  image:
    repository: traefik
    tag: v3.6.9
  container_utils_image:
    repository: ixsystems/container-utils
    tag: 1.0.2

consts:
  traefik_container_name: traefik
  perms_container_name: permissions
  config_dir_path: /file-configs
  acme_base_path: /etc/traefik
  ping_port: 55555

  reserved_flags:
    - ping
    - ping.entrypoint
    - entrypoints.ping.address
    - providers.docker
    - providers.file.watch
    - providers.file.directory
    - api.basepath
    - api.insecure
    - api.dashboard
    - entrypoints.traefik.address
