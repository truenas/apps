images:
  image:
    repository: caddy
    tag: 2.11.2
  container_utils_image:
    repository: ixsystems/container-utils
    tag: 1.0.2

consts:
  caddy_container_name: caddy
  perms_container_name: permissions
  data_path: /data
  config_path: /config
  caddyfile_dir: /etc/caddy
  seed_caddyfile_path: /seed/Caddyfile
  entrypoint_path: /entrypoint.sh
  entrypoint: |
    #!/bin/sh
    set -e
    [ -s /etc/caddy/Caddyfile ] || cp /seed/Caddyfile /etc/caddy/Caddyfile
    exec caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
  internal_admin_port: 2019
  default_caddyfile: |
    # Default Caddyfile. Replace this file with your own configuration.
    # See https://caddyserver.com/docs/caddyfile for syntax.

    :80 {
    	respond "Caddy is running on TrueNAS. Edit /etc/caddy/Caddyfile to configure your sites."
    }
  notes_body: |
    ## Caddyfile

    Caddy reads its configuration from `/etc/caddy/Caddyfile`, backed by the
    storage you mounted at that path. If no Caddyfile exists in the mounted
    directory at startup, a default one is written; replace it with your own
    to configure your sites.

    A minimal Caddyfile:

    ```
    :80 {
    	respond "Hello from Caddy on TrueNAS"
    }
    ```

    A reverse proxy with automatic HTTPS:

    ```
    example.com {
    	reverse_proxy 192.168.1.10:8080
    }
    ```

    After editing, restart the app to apply changes. See the
    [Caddyfile docs](https://caddyserver.com/docs/caddyfile) for the full syntax.
