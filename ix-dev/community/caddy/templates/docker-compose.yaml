{% set tpl = ix_lib.base.render.Render(values) %}

{% set c1 = tpl.add_container(values.consts.caddy_container_name, "image") %}
{% set perm_container = tpl.deps.perms(values.consts.perms_container_name) %}
{% set perms_config = {"uid": values.run_as.user, "gid": values.run_as.group, "mode": "check"} %}

{% do c1.set_user(values.run_as.user, values.run_as.group) %}
{% do c1.add_caps(["NET_BIND_SERVICE"]) %}

{% do c1.configs.add("default_caddyfile", values.consts.default_caddyfile, values.consts.seed_caddyfile_path, "0444") %}
{% do c1.configs.add("entrypoint.sh", values.consts.entrypoint, values.consts.entrypoint_path, "0755") %}
{% do c1.set_entrypoint([values.consts.entrypoint_path]) %}

{% do c1.healthcheck.set_test("wget", {"port": values.consts.internal_admin_port, "path": "/config/"}) %}

{% do c1.environment.add_user_envs(values.caddy.additional_envs) %}

{% if not values.network.host_network %}
  {% do c1.add_port(values.network.http_port, {"container_port": 80}) %}
  {% do c1.add_port(values.network.https_port, {"container_port": 443}) %}

  {% for port in values.network.additional_ports %}
    {% do c1.add_port(port) %}
  {% endfor %}
{% endif %}

{% do c1.add_storage(values.consts.caddyfile_dir, values.storage.caddyfile) %}
{% do perm_container.add_or_skip_action("caddyfile", values.storage.caddyfile, perms_config) %}

{% do c1.add_storage(values.consts.data_path, values.storage.data) %}
{% do perm_container.add_or_skip_action("data", values.storage.data, perms_config) %}

{% do c1.add_storage(values.consts.config_path, values.storage.config) %}
{% do perm_container.add_or_skip_action("config", values.storage.config, perms_config) %}

{% for store in values.storage.additional_storage %}
  {% do c1.add_storage(store.mount_path, store) %}
  {% do perm_container.add_or_skip_action(store.mount_path, store, perms_config) %}
{% endfor %}

{% if perm_container.has_actions() %}
  {% do perm_container.activate() %}
  {% do c1.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
{% endif %}

{% do tpl.portals.add(values.network.http_port) %}
{% do tpl.notes.set_body(values.consts.notes_body) %}

{{ tpl.render() | tojson }}
