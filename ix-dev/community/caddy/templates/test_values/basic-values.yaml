resources:
  limits:
    cpus: 2.0
    memory: 4096

caddy:
  additional_envs: []

network:
  host_network: false
  http_port:
    bind_mode: published
    port_number: 80
  https_port:
    bind_mode: published
    port_number: 443
  admin_port:
    bind_mode: ""
    port_number: 2019

run_as:
  user: 568
  group: 568

ix_volumes:
  config: /opt/tests/mnt/caddy/config
  data: /opt/tests/mnt/caddy/data

storage:
  config:
    type: ix_volume
    ix_volume_config:
      dataset_name: config
      create_host_path: true
  data:
    type: ix_volume
    ix_volume_config:
      dataset_name: data
      create_host_path: true
  additional_storage: []
