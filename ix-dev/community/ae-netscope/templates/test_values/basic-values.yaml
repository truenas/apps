TZ: Etc/UTC

run_as:
  user: 568
  group: 568

ae_netscope:
  postgres_image_selector: postgres_18_image
  db_password: test-db-password
  redis_password: test-redis-password
  session_secret: test-session-secret-change-me-32-bytes-minimum
  app_url: http://127.0.0.1:30080
  https_mode: false
  advanced_settings: false
  additional_envs: []

network:
  web_port:
    bind_mode: published
    port_number: 30080
    host_ips: []
  networks: []

ix_volumes:
  postgres_data: /opt/tests/mnt/ae-netscope/postgres_data

storage:
  postgres_data:
    type: ix_volume
    ix_volume_config:
      dataset_name: postgres_data
      create_host_path: true
  additional_storage: []

labels: []

resources:
  limits:
    cpus: 2
    memory: 2048
