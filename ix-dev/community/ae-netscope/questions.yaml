groups:
  - name: Application Configuration
    description: Configure AE NetScope
  - name: Network Configuration
    description: Configure network settings for AE NetScope
  - name: Storage Configuration
    description: Configure storage for AE NetScope
  - name: Advanced Configuration
    description: Optional advanced AE NetScope settings
  - name: Resources Configuration
    description: Configure resource limits for AE NetScope

questions:
  - variable: TZ
    group: Application Configuration
    label: Timezone
    schema:
      type: string
      default: Etc/UTC
      required: true
      $ref:
        - definitions/timezone

  - variable: ae_netscope
    label: ""
    group: Application Configuration
    schema:
      type: dict
      attrs:
        - variable: postgres_image_selector
          label: Postgres Image (CAUTION)
          description: |
            If you are changing this after the postgres directory has been initialized,</br>
            STOP! and make sure you have a backup of your data.</br>
            Changing this will trigger an one way database upgrade.</br>
            You can only select newer versions of postgres.</br>
            Selecting an older version will refuse to start.</br>
            If something goes wrong, you will have to restore from backup.
          schema:
            type: string
            default: postgres_18_image
            required: true
            enum:
              - value: postgres_18_image
                description: Postgres 18
        - variable: db_password
          label: Database Password
          description: Password for the internal PostgreSQL database used by AE NetScope.
          schema:
            type: string
            default: ""
            required: true
            private: true
        - variable: redis_password
          label: Redis Password
          description: Password for the internal Redis service used by AE NetScope.
          schema:
            type: string
            default: ""
            required: true
            private: true
        - variable: session_secret
          label: Session Secret
          description: Random secret used to sign browser sessions. Use at least 32 random characters and do not change it after install unless all sessions should be invalidated.
          schema:
            type: string
            min_length: 32
            default: ""
            required: true
            private: true
        - variable: app_url
          label: Public App URL
          description: |
            Public base URL used to access AE NetScope.</br>
            Examples:</br>
            https://netscope.example.com</br>
            http://192.168.1.50:30080
          schema:
            type: uri
            default: ""
            required: true
        - variable: https_mode
          label: HTTPS Mode
          description: Enable only when AE NetScope is accessed through HTTPS, usually behind a reverse proxy.
          schema:
            type: boolean
            default: false
        - variable: additional_envs
          label: Additional Environment Variables
          schema:
            type: list
            default: []
            items:
              - variable: env
                label: Environment Variable
                schema:
                  type: dict
                  attrs:
                    - variable: name
                      label: Name
                      schema:
                        type: string
                        required: true
                    - variable: value
                      label: Value
                      schema:
                        type: string

  - variable: network
    label: ""
    group: Network Configuration
    schema:
      type: dict
      attrs:
        - variable: web_port
          label: WebUI Port
          schema:
            type: dict
            attrs:
              - variable: bind_mode
                label: Port Bind Mode
                description: |
                  The port bind mode.</br>
                  - Publish: The port will be published on the host for external access.</br>
                  - Expose: The port will be exposed for inter-container communication.</br>
                  - None: The port will not be exposed or published.
                schema:
                  type: string
                  default: published
                  enum:
                    - value: published
                      description: Publish port on the host for external access
                    - value: exposed
                      description: Expose port for inter-container communication
                    - value: ""
                      description: None
              - variable: port_number
                label: Port Number
                schema:
                  type: int
                  show_if: [["bind_mode", "=", "published"]]
                  default: 30080
                  min: 1
                  max: 65535
                  required: true
              - variable: host_ips
                label: Host IPs
                description: IPs on the host to bind this port.
                schema:
                  type: list
                  show_if: [["bind_mode", "=", "published"]]
                  default: []
                  items:
                    - variable: host_ip
                      label: Host IP
                      schema:
                        type: string
                        required: true
                        $ref:
                          - definitions/node_bind_ip
        - variable: networks
          label: Networks
          description: The Docker networks to join.
          schema:
            type: list
            default: []
            items:
              - variable: network
                label: Network
                schema:
                  type: dict
                  attrs:
                    - variable: name
                      label: Name
                      schema:
                        type: string
                        default: ""
                        required: true
                    - variable: containers
                      label: Containers
                      schema:
                        type: list
                        items:
                          - variable: container
                            label: Container
                            schema:
                              type: dict
                              attrs:
                                - variable: name
                                  label: Container Name
                                  schema:
                                    type: string
                                    required: true
                                    enum:
                                      - value: ae-netscope
                                        description: ae-netscope
                                      - value: postgres
                                        description: postgres
                                      - value: redis
                                        description: redis
                                - variable: config
                                  label: Container Network Configuration
                                  schema:
                                    type: dict
                                    attrs:
                                      - variable: aliases
                                        label: Aliases
                                        schema:
                                          type: list
                                          default: []
                                          items:
                                            - variable: alias
                                              label: Alias
                                              schema:
                                                type: string

  - variable: storage
    label: ""
    group: Storage Configuration
    schema:
      type: dict
      attrs:
        - variable: postgres_data
          label: PostgreSQL Data Storage
          description: The path to store AE NetScope PostgreSQL data.
          schema:
            type: dict
            attrs:
              - variable: type
                label: Type
                description: |
                  ixVolume: Is dataset created automatically by the system.</br>
                  Host Path: Is a path that already exists on the system.
                schema:
                  type: string
                  required: true
                  default: ix_volume
                  enum:
                    - value: host_path
                      description: Host Path (Path that already exists on the system)
                    - value: ix_volume
                      description: ixVolume (Dataset created automatically by the system)
              - variable: ix_volume_config
                label: ixVolume Configuration
                description: The configuration for the ixVolume dataset.
                schema:
                  type: dict
                  show_if: [["type", "=", "ix_volume"]]
                  $ref:
                    - normalize/ix_volume
                  attrs:
                    - variable: acl_enable
                      label: Enable ACL
                      description: Enable ACL for the storage.
                      schema:
                        type: boolean
                        default: false
                    - variable: dataset_name
                      label: Dataset Name
                      description: The name of the dataset to use for storage.
                      schema:
                        type: string
                        required: true
                        hidden: true
                        default: postgres_data
                    - variable: acl_entries
                      label: ACL Configuration
                      schema:
                        type: dict
                        show_if: [["acl_enable", "=", true]]
                        attrs: []
              - variable: host_path_config
                label: Host Path Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "host_path"]]
                  attrs:
                    - variable: acl_enable
                      label: Enable ACL
                      description: Enable ACL for the storage.
                      schema:
                        type: boolean
                        default: false
                    - variable: acl
                      label: ACL Configuration
                      schema:
                        type: dict
                        show_if: [["acl_enable", "=", true]]
                        attrs: []
                        $ref:
                          - normalize/acl
                    - variable: path
                      label: Host Path
                      description: The host path to use for storage.
                      schema:
                        type: hostpath
                        show_if: [["acl_enable", "=", false]]
                        required: true
                    - variable: auto_permissions
                      label: Automatic Permissions
                      description: |
                        Automatically set permissions for the host path.
                        Enabling this, will check the top level directory,</br>
                        If it finds incorrect permissions, it will `chown` the
                        host path to the user and group required for the
                        postgres container.
                      schema:
                        type: boolean
                        default: false
                        show_if: [["acl_enable", "=", false]]
        - variable: additional_storage
          label: Additional Storage
          schema:
            type: list
            default: []
            items:
              - variable: storageEntry
                label: Storage Entry
                schema:
                  type: dict
                  attrs:
                    - variable: type
                      label: Type
                      description: |
                        ixVolume: Is dataset created automatically by the system.</br>
                        Host Path: Is a path that already exists on the system.
                      schema:
                        type: string
                        required: true
                        default: ix_volume
                        enum:
                          - value: host_path
                            description: Host Path (Path that already exists on the system)
                          - value: ix_volume
                            description: ixVolume (Dataset created automatically by the system)
                    - variable: read_only
                      label: Read Only
                      description: Mount the volume as read only.
                      schema:
                        type: boolean
                        default: false
                    - variable: mount_path
                      label: Mount Path
                      description: The path inside the container to mount the storage.
                      schema:
                        type: path
                        required: true

  - variable: labels
    label: Additional Labels
    group: Advanced Configuration
    schema:
      type: list
      default: []
      items:
        - variable: label
          label: Label
          schema:
            type: dict
            attrs:
              - variable: key
                label: Key
                schema:
                  type: string
                  required: true
              - variable: value
                label: Value
                schema:
                  type: string
                  required: true
              - variable: containers
                label: Containers
                schema:
                  type: list
                  items:
                    - variable: container
                      label: Container
                      schema:
                        type: string
                        required: true
                        enum:
                          - value: ae-netscope
                            description: ae-netscope
                          - value: postgres
                            description: postgres
                          - value: redis
                            description: redis

  - variable: resources
    label: ""
    group: Resources Configuration
    schema:
      type: dict
      attrs:
        - variable: limits
          label: Limits
          schema:
            type: dict
            attrs:
              - variable: cpus
                label: CPUs
                schema:
                  type: int
                  default: 2
                  required: true
              - variable: memory
                label: Memory (in MB)
                schema:
                  type: int
                  default: 2048
                  required: true
