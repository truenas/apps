groups:
  - name: AE NetScope Configuration
    description: Configure AE NetScope
  - name: Network Configuration
    description: Configure network settings for AE NetScope
  - name: Storage Configuration
    description: Configure storage for AE NetScope
  - name: Labels Configuration
    description: Configure labels for AE NetScope containers
  - name: Resources Configuration
    description: Configure resource limits for AE NetScope

questions:
  - variable: TZ
    group: AE NetScope Configuration
    label: Timezone
    schema:
      type: string
      default: Etc/UTC
      required: true
      $ref:
        - definitions/timezone

  - variable: ae_netscope
    label: ""
    group: AE NetScope Configuration
    schema:
      type: dict
      attrs:
        - variable: postgres_image_selector
          label: Postgres Image (CAUTION)
          description: |
            If you are changing this after the PostgreSQL directory has been initialized,</br>
            make sure you have a backup of your data.</br>
            Changing this can trigger a one way database upgrade.</br>
            Selecting an older PostgreSQL version can prevent the app from starting.
          schema:
            type: string
            default: postgres_18_image
            required: true
            enum:
              - value: postgres_18_image
                description: Postgres 18
        - variable: db_password
          label: Database Password
          description: Password for the AE NetScope PostgreSQL database user.
          schema:
            type: string
            default: ""
            required: true
            private: true
        - variable: redis_password
          label: Redis Password
          description: Password for the internal AE NetScope Redis service.
          schema:
            type: string
            default: ""
            required: true
            private: true
        - variable: session_secret
          label: Session Secret
          description: Random secret used to sign AE NetScope sessions. Use at least 32 random characters.
          schema:
            type: string
            min_length: 32
            default: ""
            required: true
            private: true
        - variable: app_url
          label: App URL
          description: |
            Public base URL for AE NetScope.</br>
            Examples:</br>
            https://netscope.example.com</br>
            http://192.168.1.50:30080
          schema:
            type: uri
            default: ""
        - variable: session_cookie_secure
          label: Secure Session Cookie
          description: Enable this when AE NetScope is served over HTTPS.
          schema:
            type: boolean
            default: false
        - variable: security_hsts_enabled
          label: Enable HSTS
          description: Enable only when AE NetScope is served over HTTPS.
          schema:
            type: boolean
            default: false
        - variable: redis_rate_limit_fail_open
          label: Allow Requests If Redis Rate Limit Fails
          description: If enabled, rate-limited endpoints remain available when Redis is temporarily unavailable.
          schema:
            type: boolean
            default: false
        - variable: max_import_json_bytes
          label: Max Import JSON Size
          schema:
            type: int
            default: 2000000
            min: 1
            max: 20000000
            required: true
        - variable: session_ttl_seconds
          label: Session TTL Seconds
          schema:
            type: int
            default: 28800
            min: 300
            max: 2592000
            required: true
        - variable: auth_rate_limit_per_minute
          label: Auth Rate Limit Per Minute
          schema:
            type: int
            default: 5
            min: 1
            max: 120
            required: true
        - variable: auth_failed_login_limit
          label: Failed Login Lockout Limit
          schema:
            type: int
            default: 10
            min: 1
            max: 100
            required: true
        - variable: auth_lockout_minutes
          label: Failed Login Lockout Minutes
          schema:
            type: int
            default: 15
            min: 1
            max: 1440
            required: true
        - variable: additional_envs
          label: Additional Environment Variables
          schema:
            type: list
            default: []
            items:
              - variable: env
                label: Environment Variable
                schema:
                  type: dict
                  attrs:
                    - variable: name
                      label: Name
                      schema:
                        type: string
                        required: true
                    - variable: value
                      label: Value
                      schema:
                        type: string

  - variable: network
    label: ""
    group: Network Configuration
    schema:
      type: dict
      attrs:
        - variable: web_port
          label: WebUI Port
          schema:
            type: dict
            attrs:
              - variable: bind_mode
                label: Port Bind Mode
                description: |
                  The port bind mode.</br>
                  - Publish: The port will be published on the host for external access.</br>
                  - Expose: The port will be exposed for inter-container communication.</br>
                  - None: The port will not be exposed or published.
                schema:
                  type: string
                  default: published
                  enum:
                    - value: published
                      description: Publish port on the host for external access
                    - value: exposed
                      description: Expose port for inter-container communication
                    - value: ""
                      description: None
              - variable: port_number
                label: Port Number
                schema:
                  type: int
                  show_if: [["bind_mode", "=", "published"]]
                  default: 30080
                  min: 1
                  max: 65535
                  required: true
              - variable: host_ips
                label: Host IPs
                description: IPs on the host to bind this port.
                schema:
                  type: list
                  show_if: [["bind_mode", "=", "published"]]
                  default: []
                  items:
                    - variable: host_ip
                      label: Host IP
                      schema:
                        type: string
                        required: true
                        $ref:
                          - definitions/node_bind_ip
        - variable: networks
          label: Networks
          description: The Docker networks to join.
          schema:
            type: list
            default: []
            items:
              - variable: network
                label: Network
                schema:
                  type: dict
                  attrs:
                    - variable: name
                      label: Name
                      schema:
                        type: string
                        default: ""
                        required: true
                    - variable: containers
                      label: Containers
                      schema:
                        type: list
                        items:
                          - variable: container
                            label: Container
                            schema:
                              type: dict
                              attrs:
                                - variable: name
                                  label: Container Name
                                  schema:
                                    type: string
                                    required: true
                                    enum:
                                      - value: ae-netscope
                                        description: ae-netscope
                                      - value: postgres
                                        description: postgres
                                      - value: redis
                                        description: redis
                                - variable: config
                                  label: Container Network Configuration
                                  schema:
                                    type: dict
                                    attrs:
                                      - variable: aliases
                                        label: Aliases
                                        schema:
                                          type: list
                                          default: []
                                          items:
                                            - variable: alias
                                              label: Alias
                                              schema:
                                                type: string

  - variable: storage
    label: ""
    group: Storage Configuration
    schema:
      type: dict
      attrs:
        - variable: postgres_data
          label: PostgreSQL Data Storage
          description: The path to store AE NetScope PostgreSQL data.
          schema:
            type: dict
            attrs:
              - variable: type
                label: Type
                schema:
                  type: string
                  required: true
                  default: ix_volume
                  enum:
                    - value: host_path
                      description: Host Path
                    - value: ix_volume
                      description: ixVolume
              - variable: ix_volume_config
                label: ixVolume Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "ix_volume"]]
                  $ref:
                    - normalize/ix_volume
                  attrs:
                    - variable: acl_enable
                      label: Enable ACL
                      schema:
                        type: boolean
                        default: false
                    - variable: dataset_name
                      label: Dataset Name
                      schema:
                        type: string
                        required: true
                        hidden: true
                        default: postgres_data
                    - variable: acl_entries
                      label: ACL Configuration
                      schema:
                        type: dict
                        show_if: [["acl_enable", "=", true]]
                        attrs: []
              - variable: host_path_config
                label: Host Path Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "host_path"]]
                  attrs:
                    - variable: acl_enable
                      label: Enable ACL
                      schema:
                        type: boolean
                        default: false
                    - variable: acl
                      label: ACL Configuration
                      schema:
                        type: dict
                        show_if: [["acl_enable", "=", true]]
                        attrs: []
                        $ref:
                          - normalize/acl
                    - variable: path
                      label: Host Path
                      schema:
                        type: hostpath
                        show_if: [["acl_enable", "=", false]]
                        required: true
                    - variable: auto_permissions
                      label: Automatic Permissions
                      schema:
                        type: boolean
                        default: false
                        show_if: [["acl_enable", "=", false]]
        - variable: additional_storage
          label: Additional Storage
          schema:
            type: list
            default: []
            items:
              - variable: storageEntry
                label: Storage Entry
                schema:
                  type: dict
                  attrs:
                    - variable: type
                      label: Type
                      schema:
                        type: string
                        required: true
                        default: ix_volume
                        enum:
                          - value: host_path
                            description: Host Path
                          - value: ix_volume
                            description: ixVolume
                    - variable: read_only
                      label: Read Only
                      schema:
                        type: boolean
                        default: false
                    - variable: mount_path
                      label: Mount Path
                      schema:
                        type: path
                        required: true

  - variable: labels
    label: ""
    group: Labels Configuration
    schema:
      type: list
      default: []
      items:
        - variable: label
          label: Label
          schema:
            type: dict
            attrs:
              - variable: key
                label: Key
                schema:
                  type: string
                  required: true
              - variable: value
                label: Value
                schema:
                  type: string
                  required: true
              - variable: containers
                label: Containers
                schema:
                  type: list
                  items:
                    - variable: container
                      label: Container
                      schema:
                        type: string
                        required: true
                        enum:
                          - value: ae-netscope
                            description: ae-netscope
                          - value: postgres
                            description: postgres
                          - value: redis
                            description: redis

  - variable: resources
    label: ""
    group: Resources Configuration
    schema:
      type: dict
      attrs:
        - variable: limits
          label: Limits
          schema:
            type: dict
            attrs:
              - variable: cpus
                label: CPUs
                schema:
                  type: int
                  default: 2
                  required: true
              - variable: memory
                label: Memory (in MB)
                schema:
                  type: int
                  default: 2048
                  required: true
