groups:
  - name: Ratelog Configuration
    description: Configure Ratelog Settings
  - name: Network Configuration
    description: Network Configuration
  - name: Storage Configuration
    description: Storage Configuration
  - name: Labels Configuration
    description: Labels Configuration
  - name: Resources Configuration
    description: Resources Configuration

questions:
  - variable: ratelog
    label: ""
    group: Ratelog Configuration
    schema:
      type: dict
      attrs:
        - variable: tmdb_api_key
          label: TMDB API Key
          description: API key de TheMovieDB para buscar películas y series
          schema:
            type: string
            required: true
            private: true
        - variable: db_password
          label: Database Password
          description: Password for the Ratelog database
          schema:
            type: string
            required: true
            private: true
            default: "ratelog_secure-pass"

  - variable: network
    label: ""
    group: Network Configuration
    schema:
      type: dict
      attrs:
        - variable: web_port
          label: Web Port
          schema:
            type: dict
            attrs:
              - variable: port
                label: Port Number
                schema:
                  type: int
                  default: 8080
                  min: 1024
                  max: 65535
                  required: true

  - variable: storage
    label: ""
    group: Storage Configuration
    schema:
      type: dict
      attrs:
        - variable: postgres_data
          label: PostgreSQL Data
          description: Almacena los datos de la base de datos
          schema:
            type: dict
            attrs:
              - variable: type
                label: Type
                schema:
                  type: string
                  default: "ix_volume"
                  enum:
                    - value: "ix_volume"
                      description: "TrueNAS Dataset"
                    - value: "host_path"
                      description: "Host Path"
              - variable: ix_volume_config
                label: Dataset Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "ix_volume"]]
                  attrs:
                    - variable: dataset_name
                      label: Dataset Name
                      schema:
                        type: string
                        default: "ratelog_postgres_data"
              - variable: host_path_config
                label: Host Path Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "host_path"]]
                  attrs:
                    - variable: path
                      label: Host Path
                      schema:
                        type: hostpath
                        required: true

  - variable: labels
    label: ""
    group: Labels Configuration
    schema:
      type: dict
      attrs: []

  - variable: resources
    label: ""
    group: Resources Configuration
    schema:
      type: dict
      attrs:
        - variable: limits
          label: Resource Limits
          schema:
            type: dict
            attrs:
              - variable: cpus
                label: CPU Limit
                schema:
                  type: float
                  default: 2.0
              - variable: memory
                label: Memory Limit (MB)
                schema:
                  type: int
                  default: 4096