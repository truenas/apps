resources:
  limits:
    cpus: 2.0
    memory: 4096

gotosocial:
  host: test.local
  trusted_proxies: "127.0.0.1/32"
  letsencrypt_enabled: false
  letsencrypt_email: ""

run_as:
  user: 568
  group: 568

network:
  web_port:
    bind_mode: published
    port_number: 30080

ix_volumes:
  test_gts_data: /opt/tests/mnt/gotosocial/data

storage:
  data:
    type: ix_volume
    ix_volume_config:
      dataset_name: test_gts_data
      create_host_path: true
