groups:
  - name: "GoToSocial Configuration"
    description: "Configure GoToSocial Settings"
  - name: "User and Group Configuration"
    description: "Configure User and Group Settings"
  - name: "Network"
    description: "Network Configuration"
  - name: "Storage"
    description: "Storage Configuration"

questions:
  - variable: gotosocial
    label: "GoToSocial Settings"
    group: "GoToSocial Configuration"
    schema:
      type: dict
      attrs:
        - variable: host
          label: "Host Name"
          description: "Domain name for this instance (e.g. fedi.atri.dad)"
          schema:
            type: string
            required: true
            default: "localhost"
        - variable: trusted_proxies
          label: "Trusted Proxies"
          description: "Comma-separated list of trusted proxies"
          schema:
            type: string
            default: "127.0.0.1/32"
        - variable: initial_admin_email
          label: "Initial Admin Email"
          description: "Email address for the initial admin user. Leave blank to not create an initial admin."
          schema:
            type: string
            default: ""
        - variable: initial_admin_password
          label: "Initial Admin Password"
          description: "Password for the initial admin user."
          schema:
            type: string
            private: true
            default: ""
            show_if: [["initial_admin_email", "!=", ""]]

  - variable: run_as
    label: ""
    group: "User and Group Configuration"
    schema:
      type: dict
      attrs:
        - variable: user
          label: User ID
          description: The user id that GoToSocial files will be owned by.
          schema:
            type: int
            min: 568
            default: 568
            required: true
        - variable: group
          label: Group ID
          description: The group id that GoToSocial files will be owned by.
          schema:
            type: int
            min: 568
            default: 568
            required: true

  - variable: network
    label: "Network Settings"
    group: "Network"
    schema:
      type: dict
      attrs:
        - variable: web_port
          label: "Web Port"
          description: "Port for the web interface"
          schema:
            type: dict
            attrs:
              - variable: port_number
                label: "Port Number"
                schema:
                  type: int
                  default: 8181
                  min: 1024
                  max: 65535
                  required: true

  - variable: storage
    label: "Storage Settings"
    group: "Storage"
    schema:
      type: dict
      attrs:
        - variable: data
          label: "GoToSocial Data Storage"
          description: "Stores application data and sqlite database"
          schema:
            type: dict
            attrs:
              - variable: type
                label: "Type"
                schema:
                  type: string
                  default: "ix_volume"
                  enum:
                    - value: "host_path"
                      description: "Host Path"
                    - value: "ix_volume"
                      description: "TrueNAS Dataset"
              - variable: ix_volume_config
                label: "Dataset Configuration"
                schema:
                  type: dict
                  show_if: [["type", "=", "ix_volume"]]
                  $ref:
                    - "normalize/ix_volume"
                  attrs:
                    - variable: dataset_name
                      label: Dataset Name
                      schema:
                        type: string
                        required: true
                        hidden: true
                        default: "data"
                    - variable: acl_enable
                      label: "Enable ACL"
                      schema:
                        type: boolean
                        default: false
                    - variable: acl_entries
                      label: ACL Configuration
                      schema:
                        type: dict
                        show_if: [["acl_enable", "=", true]]
                        attrs: []
              - variable: host_path_config
                label: "Host Path Configuration"
                schema:
                  type: dict
                  show_if: [["type", "=", "host_path"]]
                  attrs:
                    - variable: acl_enable
                      label: Enable ACL
                      description: Enable ACL for the storage.
                      schema:
                        type: boolean
                        default: false
                    - variable: acl
                      label: ACL Configuration
                      schema:
                        type: dict
                        show_if: [["acl_enable", "=", true]]
                        attrs: []
                        $ref:
                          - "normalize/acl"
                    - variable: path
                      label: "Host Path"
                      schema:
                        type: hostpath
                        show_if: [["acl_enable", "=", false]]
                        required: true
