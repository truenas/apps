TZ: Etc/UTC

fodaris:
  server_name: fodaris-test
  retention_days: 30
  mount_docker_socket: false
  additional_envs: []

network:
  web_port:
    bind_mode: published
    port_number: 8443
  agent_ingest_port:
    bind_mode: published
    port_number: 24443
  otel_ingest_port:
    bind_mode: published
    port_number: 24444

ix_volumes:
  config: /opt/tests/mnt/config
  data: /opt/tests/mnt/data
  backups: /opt/tests/mnt/backups

storage:
  config:
    type: ix_volume
    ix_volume_config:
      dataset_name: config
      create_host_path: true
  data:
    type: ix_volume
    ix_volume_config:
      dataset_name: data
      create_host_path: true
  backups:
    type: ix_volume
    ix_volume_config:
      dataset_name: backups
      create_host_path: true
  additional_storage: []

labels: []

resources:
  limits:
    cpus: 2
    memory: 2048
