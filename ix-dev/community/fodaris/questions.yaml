groups:
  - name: Fodaris Configuration
    description: Configure Fodaris core settings
  - name: Network Configuration
    description: Configure network ports for Fodaris
  - name: Storage Configuration
    description: Configure persistent storage for Fodaris
  - name: Labels Configuration
    description: Configure Docker labels
  - name: Resources Configuration
    description: Configure CPU and memory limits

questions:
  # ────────────────────────────────────────────────────────────────────────
  # Timezone (standard TrueNAS pattern)
  # ────────────────────────────────────────────────────────────────────────
  - variable: TZ
    label: Timezone
    group: Fodaris Configuration
    schema:
      type: string
      default: Etc/UTC
      $ref:
        - definitions/timezone

  # ────────────────────────────────────────────────────────────────────────
  # Fodaris application settings
  # ────────────────────────────────────────────────────────────────────────
  - variable: fodaris
    label: ""
    group: Fodaris Configuration
    schema:
      type: dict
      attrs:
        - variable: server_name
          label: Server display name
          description: Name shown in the Fodaris dashboard for this instance. Defaults to the container hostname.
          schema:
            type: string
            default: fodaris

        - variable: retention_days
          label: Metric retention (days)
          description: Number of days of monitoring data to retain before pruning.
          schema:
            type: int
            default: 30
            min: 7
            max: 730

        - variable: mount_docker_socket
          label: Mount Docker socket (read-only)
          description: |
            Mount /var/run/docker.sock read-only so Fodaris can monitor Docker containers running on this host.
            Leave off if you only want to monitor remote endpoints via the Fodaris agent.
          schema:
            type: boolean
            default: true

        - variable: additional_envs
          label: Additional Environment Variables
          description: Extra environment variables passed to the Fodaris container.
          schema:
            type: list
            default: []
            items:
              - variable: env
                label: Environment Variable
                schema:
                  type: dict
                  attrs:
                    - variable: name
                      label: Name
                      schema:
                        type: string
                        required: true
                    - variable: value
                      label: Value
                      schema:
                        type: string
                        required: true

  # ────────────────────────────────────────────────────────────────────────
  # Network ports
  # Fodaris exposes three ports:
  #   8443  - Web UI and management API (browser-facing)
  #   24443 - Agent ingest (agents push metrics here)
  #   24444 - OpenTelemetry ingest (OTLP/HTTP)
  # ────────────────────────────────────────────────────────────────────────
  - variable: network
    label: ""
    group: Network Configuration
    schema:
      type: dict
      attrs:
        - variable: web_port
          label: Web UI Port
          description: Port for the Fodaris web UI and management API.
          schema:
            type: dict
            attrs:
              - variable: bind_mode
                label: Port Bind Mode
                schema:
                  type: string
                  default: "published"
                  enum:
                    - value: "published"
                      description: Publish on the host for external access
                    - value: "exposed"
                      description: Expose for inter-container communication only
                    - value: ""
                      description: None
              - variable: port_number
                label: Port Number
                schema:
                  type: int
                  default: 8443
                  min: 1024
                  max: 65535
                  required: true
              - variable: host_ips
                label: Host IPs
                description: Host IPs to bind the port to. Empty binds all.
                schema:
                  type: list
                  default: []
                  items:
                    - variable: host_ip
                      label: Host IP
                      schema:
                        type: string
                        required: true
                        $ref:
                          - definitions/node_bind_ip

        - variable: agent_ingest_port
          label: Agent Ingest Port
          description: Port for Fodaris agents to push metrics to.
          schema:
            type: dict
            attrs:
              - variable: bind_mode
                label: Port Bind Mode
                schema:
                  type: string
                  default: "published"
                  enum:
                    - value: "published"
                      description: Publish on the host for agent access
                    - value: "exposed"
                      description: Expose for inter-container communication only
                    - value: ""
                      description: None
              - variable: port_number
                label: Port Number
                schema:
                  type: int
                  default: 24443
                  min: 1024
                  max: 65535
                  required: true

        - variable: otel_ingest_port
          label: OpenTelemetry Ingest Port
          description: Port for OpenTelemetry OTLP/HTTP ingestion. Optional - leave the default if unsure.
          schema:
            type: dict
            attrs:
              - variable: bind_mode
                label: Port Bind Mode
                schema:
                  type: string
                  default: "published"
                  enum:
                    - value: "published"
                      description: Publish on the host
                    - value: "exposed"
                      description: Expose for inter-container communication only
                    - value: ""
                      description: None
              - variable: port_number
                label: Port Number
                schema:
                  type: int
                  default: 24444
                  min: 1024
                  max: 65535
                  required: true

  # ────────────────────────────────────────────────────────────────────────
  # Persistent storage
  # Three volumes:
  #   config  - server config and settings
  #   data    - PostgreSQL DB, encryption key and monitoring history
  #   backups - backup archives from the built-in scheduler
  # ────────────────────────────────────────────────────────────────────────
  - variable: storage
    label: ""
    group: Storage Configuration
    schema:
      type: dict
      attrs:
        - variable: config
          label: Config Storage
          description: Persistent storage for Fodaris server configuration.
          schema:
            type: dict
            $ref:
              - normalize/ix_volume
            attrs:
              - variable: type
                label: Type
                schema:
                  type: string
                  default: ix_volume
                  required: true
                  enum:
                    - value: host_path
                      description: Host Path (Path that already exists on the system)
                    - value: ix_volume
                      description: ix_volume (Managed by TrueNAS SCALE)
              - variable: ix_volume_config
                label: ixVolume Configuration
                description: The configuration for the ixVolume dataset.
                schema:
                  type: dict
                  show_if: [["type", "=", "ix_volume"]]
                  $ref:
                    - normalize/ix_volume
                  attrs:
                    - variable: acl_enable
                      label: Enable ACL
                      schema:
                        type: boolean
                        default: false
                    - variable: dataset_name
                      label: Dataset Name
                      schema:
                        type: string
                        default: config
                        required: true
                        hidden: true
                    - variable: acl_entries
                      label: ACL Configuration
                      schema:
                        show_if: [["acl_enable", "=", true]]
                        type: dict
                        $ref:
                          - normalize/acl
              - variable: host_path_config
                label: Host Path Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "host_path"]]
                  attrs:
                    - variable: acl_enable
                      label: Enable ACL
                      schema:
                        type: boolean
                        default: false
                    - variable: acl
                      label: ACL Configuration
                      schema:
                        type: dict
                        show_if: [["acl_enable", "=", true]]
                        $ref:
                          - normalize/acl
                    - variable: path
                      label: Host Path
                      schema:
                        type: hostpath
                        show_if: [["acl_enable", "=", false]]
                        required: true

        - variable: data
          label: Data Storage
          description: Persistent storage for the Fodaris PostgreSQL database, encryption key and monitoring history. This is the critical volume - back it up regularly.
          schema:
            type: dict
            $ref:
              - normalize/ix_volume
            attrs:
              - variable: type
                label: Type
                schema:
                  type: string
                  default: ix_volume
                  required: true
                  enum:
                    - value: host_path
                      description: Host Path (Path that already exists on the system)
                    - value: ix_volume
                      description: ix_volume (Managed by TrueNAS SCALE)
              - variable: ix_volume_config
                label: ixVolume Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "ix_volume"]]
                  $ref:
                    - normalize/ix_volume
                  attrs:
                    - variable: acl_enable
                      label: Enable ACL
                      schema:
                        type: boolean
                        default: false
                    - variable: dataset_name
                      label: Dataset Name
                      schema:
                        type: string
                        default: data
                        required: true
                        hidden: true
                    - variable: acl_entries
                      label: ACL Configuration
                      schema:
                        show_if: [["acl_enable", "=", true]]
                        type: dict
                        $ref:
                          - normalize/acl
              - variable: host_path_config
                label: Host Path Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "host_path"]]
                  attrs:
                    - variable: acl_enable
                      label: Enable ACL
                      schema:
                        type: boolean
                        default: false
                    - variable: acl
                      label: ACL Configuration
                      schema:
                        type: dict
                        show_if: [["acl_enable", "=", true]]
                        $ref:
                          - normalize/acl
                    - variable: path
                      label: Host Path
                      schema:
                        type: hostpath
                        show_if: [["acl_enable", "=", false]]
                        required: true

        - variable: backups
          label: Backups Storage
          description: Persistent storage for Fodaris backup archives produced by the built-in backup scheduler.
          schema:
            type: dict
            $ref:
              - normalize/ix_volume
            attrs:
              - variable: type
                label: Type
                schema:
                  type: string
                  default: ix_volume
                  required: true
                  enum:
                    - value: host_path
                      description: Host Path (Path that already exists on the system)
                    - value: ix_volume
                      description: ix_volume (Managed by TrueNAS SCALE)
              - variable: ix_volume_config
                label: ixVolume Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "ix_volume"]]
                  $ref:
                    - normalize/ix_volume
                  attrs:
                    - variable: acl_enable
                      label: Enable ACL
                      schema:
                        type: boolean
                        default: false
                    - variable: dataset_name
                      label: Dataset Name
                      schema:
                        type: string
                        default: backups
                        required: true
                        hidden: true
                    - variable: acl_entries
                      label: ACL Configuration
                      schema:
                        show_if: [["acl_enable", "=", true]]
                        type: dict
                        $ref:
                          - normalize/acl
              - variable: host_path_config
                label: Host Path Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "host_path"]]
                  attrs:
                    - variable: acl_enable
                      label: Enable ACL
                      schema:
                        type: boolean
                        default: false
                    - variable: acl
                      label: ACL Configuration
                      schema:
                        type: dict
                        show_if: [["acl_enable", "=", true]]
                        $ref:
                          - normalize/acl
                    - variable: path
                      label: Host Path
                      schema:
                        type: hostpath
                        show_if: [["acl_enable", "=", false]]
                        required: true

        - variable: additional_storage
          label: Additional Storage
          description: Add extra volumes if needed for your setup.
          schema:
            type: list
            default: []
            items:
              - variable: storage_entry
                label: Storage Entry
                schema:
                  type: dict
                  $ref:
                    - normalize/ix_volume
                  attrs:
                    - variable: type
                      label: Type
                      schema:
                        type: string
                        required: true
                        default: ix_volume
                        enum:
                          - value: host_path
                            description: Host Path (Path that already exists on the system)
                          - value: ix_volume
                            description: ix_volume (Managed by TrueNAS SCALE)
                    - variable: mount_path
                      label: Mount Path
                      description: The path inside the container to mount the storage.
                      schema:
                        type: path
                        required: true
                    - variable: ix_volume_config
                      label: ixVolume Configuration
                      schema:
                        type: dict
                        show_if: [["type", "=", "ix_volume"]]
                        $ref:
                          - normalize/ix_volume
                        attrs:
                          - variable: acl_enable
                            label: Enable ACL
                            schema:
                              type: boolean
                              default: false
                          - variable: dataset_name
                            label: Dataset Name
                            schema:
                              type: string
                              required: true
                              default: storage_entry
                          - variable: acl_entries
                            label: ACL Configuration
                            schema:
                              show_if: [["acl_enable", "=", true]]
                              type: dict
                              $ref:
                                - normalize/acl
                    - variable: host_path_config
                      label: Host Path Configuration
                      schema:
                        type: dict
                        show_if: [["type", "=", "host_path"]]
                        attrs:
                          - variable: acl_enable
                            label: Enable ACL
                            schema:
                              type: boolean
                              default: false
                          - variable: acl
                            label: ACL Configuration
                            schema:
                              type: dict
                              show_if: [["acl_enable", "=", true]]
                              $ref:
                                - normalize/acl
                          - variable: path
                            label: Host Path
                            schema:
                              type: hostpath
                              show_if: [["acl_enable", "=", false]]
                              required: true

  # ────────────────────────────────────────────────────────────────────────
  # Labels
  # ────────────────────────────────────────────────────────────────────────
  - variable: labels
    label: ""
    group: Labels Configuration
    schema:
      type: list
      default: []
      items:
        - variable: label
          label: Label
          schema:
            type: dict
            attrs:
              - variable: key
                label: Key
                schema:
                  type: string
                  required: true
              - variable: value
                label: Value
                schema:
                  type: string
                  required: true
              - variable: containers
                label: Containers
                description: Containers to apply the label to
                schema:
                  type: list
                  items:
                    - variable: container
                      label: Container
                      schema:
                        type: string
                        required: true
                        enum:
                          - value: fodaris
                            description: fodaris

  # ────────────────────────────────────────────────────────────────────────
  # Resources
  # ────────────────────────────────────────────────────────────────────────
  - variable: resources
    label: ""
    group: Resources Configuration
    schema:
      type: dict
      attrs:
        - variable: limits
          label: Limits
          schema:
            type: dict
            attrs:
              - variable: cpus
                label: CPUs
                description: CPU limit for Fodaris.
                schema:
                  type: int
                  default: 2
                  required: true
              - variable: memory
                label: Memory (in MB)
                description: Memory limit for Fodaris in megabytes.
                schema:
                  type: int
                  default: 2048
                  required: true
