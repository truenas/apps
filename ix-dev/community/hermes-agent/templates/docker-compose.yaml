{% set tpl = ix_lib.base.render.Render(values) %}

{% set c1 = tpl.add_container(values.consts.hermes_agent_container_name, "image") %}
{% do c1.set_user(values.run_as.user, values.run_as.group) %}
{% set perm_container = tpl.deps.perms(values.consts.perms_container_name) %}
{% set perms_config = {"uid": values.run_as.user, "gid": values.run_as.group, "mode": "check"} %}
{% do c1.healthcheck.disable() %}

{% do c1.set_command([
  "gateway", "run"
]) %}


{% if values.hermes_agent.enable_dashboard == true %}
  {% do c1.environment.add_env("HERMES_DASHBOARD", "1") %}
{% elif values.hermes_agent.enable_dashboard == false %}
  {% do c1.environment.add_env("HERMES_DASHBOARD", "0") %}
{% endif %}
{% do c1.environment.add_env("HERMES_DASHBOARD_PORT", values.network.dashboard_port.port_number) %}


{% do c1.environment.add_user_envs(values.hermes_agent.additional_envs) %}


{% do c1.add_port(values.network.gateway_port, {"container_port": values.consts.internal_gateway_port}) %}
{% do c1.add_port(values.network.dashboard_port) %}


{% do c1.add_storage(values.consts.data_dir, values.storage.data) %}
{% do perm_container.add_or_skip_action("data", values.storage.data, perms_config) %}

{% for store in values.storage.additional_storage %}
  {% do c1.add_storage(store.mount_path, store) %}
  {% do perm_container.add_or_skip_action(store.mount_path, store, perms_config) %}
{% endfor %}

{% if perm_container.has_actions() %}
  {% do perm_container.activate() %}
  {% do c1.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
{% endif %}


{% do tpl.portals.add(values.network.dashboard_port) %}

{% do c1.add_caps(["CHOWN", "SETUID", "SETGID"]) %}

{{ tpl.render() | tojson }}
