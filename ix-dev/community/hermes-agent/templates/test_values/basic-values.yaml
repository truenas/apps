resources:
  limits:
    cpus: 2.0
    memory: 4096

hermes_agent:
  enable_dashboard: true
  enable_gateway: true
  gateway_key: test-password
  additional_envs: []

run_as:
  user: 568
  group: 568

network:
  gateway_port:
    bind_mode: published
    port_number: 8080
  dashboard_port:
    bind_mode: published
    port_number: 8081

ix_volumes:
  data: /opt/tests/mnt/hermes-agent/config

storage:
  data:
    type: ix_volume
    ix_volume_config:
      dataset_name: data
      create_host_path: true
