resources:
  limits:
    cpus: 2.0
    memory: 4096

hermes_agent:
  enable_dashboard: true
  enable_insecure_dashboard_access: true
  enable_gateway: true
  gateway_key: test-password
  allow_all_users_access: true
  additional_envs: []

network:
  gateway_port:
    bind_mode: published
    port_number: 8080
  dashboard_port:
    bind_mode: published
    port_number: 8081

ix_volumes:
  data: /opt/tests/mnt/hermes-agent/config

storage:
  data:
    type: ix_volume
    ix_volume_config:
      dataset_name: data
      create_host_path: true
