{% set tpl = ix_lib.base.render.Render(values) %}

{% set zabbix_net = tpl.networks.create_internal("zabbix-net") %}

{% set server = tpl.add_container(values.consts.server_container_name, "image") %}
{% set web = tpl.add_container(values.consts.web_container_name, "web_image") %}
{% set web_service = tpl.add_container(values.consts.web_service_container_name, "web_service_image") %}

{% set perm_container = tpl.deps.perms(values.consts.perms_container_name) %}
{% set perms_config = {"uid": values.consts.run_as_user, "gid": values.consts.run_as_group, "mode": "check"} %}

{% set pg_config = {
  "user": values.consts.db_user,
  "password": values.zabbix.db_password,
  "database": values.consts.db_name,
  "volume": values.storage.postgres_data,
} %}
{% set postgres = tpl.deps.postgres(values.consts.postgres_container_name, values.zabbix.postgres_image_selector, pg_config, perm_container) %}
{% do postgres.container.add_network(zabbix_net) %}

{% set containers = [server, web] %}
{% for c in containers + [web_service] %}
  {% do c.add_network(zabbix_net) %}
  {% do c.depends.add_dependency(values.consts.postgres_container_name, "service_healthy") %}
{% endfor %}

{% for c in containers %}
  {% do c.environment.add_env("PHP_TZ", values.TZ) %}
  {% do c.environment.add_env("DB_SERVER_HOST", values.consts.postgres_container_name) %}
  {% do c.environment.add_env("DB_SERVER_PORT", postgres.get_port()) %}
  {% do c.environment.add_env("POSTGRES_USER", values.consts.db_user) %}
  {% do c.environment.add_env("POSTGRES_PASSWORD", values.zabbix.db_password) %}
  {% do c.environment.add_env("POSTGRES_DB", values.consts.db_name) %}

  {% do c.set_user(values.consts.run_as_user, values.consts.run_as_group) %}
{% endfor %}

{% do server.healthcheck.set_test("tcp", {"port": values.network.server_port.port_number}) %}
{% do server.environment.add_env("ZBX_LISTENPORT", values.network.server_port.port_number) %}
{% do server.environment.add_env("ZBX_WEBSERVICEURL", "http://%s:%d/report"|format(values.consts.web_service_container_name, values.consts.internal_web_service_port)) %}
{% do server.add_port(values.network.server_port) %}
{% do server.environment.add_user_envs(values.zabbix.additional_envs | selectattr("container", "equalto", "server") | list) %}

{% do web.healthcheck.set_test("curl", {"port": values.consts.internal_web_port, "path": "/ping"}) %}
{% do web.environment.add_env("ZBX_SERVER_HOST", values.consts.server_container_name) %}
{% do web.environment.add_env("ZBX_SERVER_PORT", values.network.server_port.port_number) %}
{% do web.add_port(values.network.web_port, {"container_port": values.consts.internal_web_port}) %}
{% do web.environment.add_user_envs(values.zabbix.additional_envs | selectattr("container", "equalto", "web") | list) %}

{% do web_service.healthcheck.set_test("tcp", {"port": values.consts.internal_web_service_port}) %}
{% do web_service.environment.add_env("ZBX_ALLOWEDIP", values.consts.server_container_name) %}
{% do web_service.environment.add_env("ZBX_LISTENPORT", values.consts.internal_web_service_port) %}
{% do web_service.environment.add_user_envs(values.zabbix.additional_envs | selectattr("container", "equalto", "web-service") | list) %}

{% for store in values.storage.additional_storage %}
  {% if store.container == "server" %}
    {% do server.add_storage(store.mount_path, store) %}
  {% elif store.container == "web" %}
    {% do web.add_storage(store.mount_path, store) %}
  {% elif store.container == "web-service" %}
    {% do web_service.add_storage(store.mount_path, store) %}
  {% endif %}
  {% do perm_container.add_or_skip_action(store.mount_path, store, perms_config) %}
{% endfor %}

{% if perm_container.has_actions() %}
  {% do perm_container.activate() %}
  {% for c in containers %}
    {% do c.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
  {% endfor %}
  {% do postgres.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
{% endif %}

{% do tpl.portals.add(values.network.web_port) %}

{{ tpl.render() | tojson }}
