resources:
  limits:
    cpus: 2.0
    memory: 4096

TZ: Etc/UTC

zabbix:
  postgres_image_selector: postgres_18_image
  db_password: some-secret-password
  additional_envs: []

network:
  server_port:
    bind_mode: published
    port_number: 8080
  web_service_port:
    bind_mode: published
    port_number: 8081
  web_port:
    bind_mode: published
    port_number: 8082

run_as:
  user: 568
  group: 568

ix_volumes:
  postgres_data: /opt/tests/mnt/vaultwarden/postgres-data

storage:
  postgres_data:
    type: ix_volume
    ix_volume_config:
      dataset_name: postgres_data
      create_host_path: true
  additional_storage: []
