images:
  image:
    repository: qdrant/qdrant
    tag: v1.17.1
  gpu_nvidia_image:
    repository: qdrant/qdrant
    tag: v1.17.1-gpu-nvidia
  gpu_amd_image:
    repository: qdrant/qdrant
    tag: v1.17.1-gpu-amd
  container_utils_image:
    repository: ixsystems/container-utils
    tag: 1.0.2

consts:
  qdrant_container_name: qdrant
  perms_container_name: permissions
  notes_body: |
    ## API Access

    Qdrant REST API is available at the configured HTTP port.
    gRPC API is available at the configured gRPC port.

    If an API key is set, include it in requests using the
    `api-key` header.
