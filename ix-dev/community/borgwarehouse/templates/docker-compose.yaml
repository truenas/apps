{% set tpl = ix_lib.base.render.Render(values) %}

{% set borg_net = tpl.networks.create_internal("borg-net") %}
{% set cronjob_key = tpl.funcs.secure_string(32) %}

{% set c1 = tpl.add_container(values.consts.borgwarehouse_container_name, "image") %}
{% do c1.add_caps(["CHOWN", "FOWNER", "SETGID", "SETUID", "DAC_OVERRIDE"]) %}

{% do c1.add_network(borg_net) %}

{% set cron_config = {
 "tasks": [
    {"schedule": "* * * * *", "command": "curl --request POST --url 'http://%s:3000/api/v1/cron/status' --header \"Authorization: Bearer $CRONJOB_KEY\""|format(values.consts.borgwarehouse_container_name)},
    {"schedule": "* * * * *", "command": "curl --request POST --url 'http://%s:3000/api/v1/cron/storage' --header \"Authorization: Bearer $CRONJOB_KEY\""|format(values.consts.borgwarehouse_container_name)},
  ]
} %}

{% set cron = tpl.deps.cron(values.consts.borgwarehouse_cron_container_name, "cron_image", cron_config) %}
{% do cron.container.add_network(borg_net) %}
{% do cron.container.depends.add_dependency(values.consts.borgwarehouse_container_name, "service_healthy") %}
{% do cron.container.environment.add_env("CRONJOB_KEY", cronjob_key) %}

{% do c1.healthcheck.set_test("curl", {"port": values.consts.internal_web_port, "path": "/api/v1/version"}) %}
{% do c1.environment.add_env("NEXTAUTH_SECRET", values.borg.nextauth_secret) %}
{% do c1.environment.add_env("CRONJOB_KEY", cronjob_key) %}
{% do c1.environment.add_user_envs(values.borg.additional_envs) %}

{% do c1.add_port(values.network.web_port, {"container_port": values.consts.internal_web_port}) %}
{% do c1.add_port(values.network.ssh_port, {"container_port": values.consts.internal_ssh_port}) %}

{% do c1.add_storage("/home/borgwarehouse/app/config", values.storage.config) %}
{% do c1.add_storage("/home/borgwarehouse/.ssh", values.storage.ssh) %}
{% do c1.add_storage("/etc/ssh", values.storage.ssh_host) %}
{% do c1.add_storage("/home/borgwarehouse/repos", values.storage.borg_repository) %}
{% do c1.add_storage("/home/borgwarehouse/logs", values.storage.logs) %}
{% do c1.add_storage("/home/borgwarehouse/tmp", values.storage.tmp) %}

{% for store in values.storage.additional_storage %}
  {% do c1.add_storage(store.mount_path, store) %}
{% endfor %}

{% do tpl.portals.add(values.network.web_port) %}
{% do tpl.notes.set_body(values.consts.notes_body) %}

{{ tpl.render() | tojson }}
