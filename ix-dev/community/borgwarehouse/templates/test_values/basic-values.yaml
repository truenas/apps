resources:
  limits:
    cpus: 2.0
    memory: 4096

borg:
  nextauth_secret: secret
  additional_envs: []

network:
  host_network: false
  web_port:
    bind_mode: published
    port_number: 8080

ix_volumes:
  config: /opt/tests/mnt/borgwarehouse/config
  ssh: /opt/tests/mnt/borgwarehouse/ssh
  ssh_host: /opt/tests/mnt/borgwarehouse/ssh_host
  borg_repository: /opt/tests/mnt/borgwarehouse/borg_repository
  logs: /opt/tests/mnt/borgwarehouse/logs
  tmp: /opt/tests/mnt/borgwarehouse/tmp

storage:
  config:
    type: ix_volume
    ix_volume_config:
      dataset_name: config
      create_host_path: true
  ssh:
    type: ix_volume
    ix_volume_config:
      dataset_name: ssh
      create_host_path: true
  ssh_host:
    type: ix_volume
    ix_volume_config:
      dataset_name: ssh_host
      create_host_path: true
  borg_repository:
    type: ix_volume
    ix_volume_config:
      dataset_name: borg_repository
      create_host_path: true
  logs:
    type: ix_volume
    ix_volume_config:
      dataset_name: logs
      create_host_path: true
  tmp:
    type: ix_volume
    ix_volume_config:
      dataset_name: tmp
      create_host_path: true
  additional_storage: []
