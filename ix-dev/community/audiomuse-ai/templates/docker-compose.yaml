{% set tpl = ix_lib.base.render.Render(values) %}

{% set audiomuse_net = tpl.networks.create_internal("audiomuse-ai-net") %}

{% set perm_container = tpl.deps.perms(values.consts.perms_container_name) %}
{% set perms_config = {"uid": values.run_as.user, "gid": values.run_as.group, "mode": "check"} %}

{% set pg_config = {
  "user": values.consts.db_user,
  "password": values.audiomuse.db_password,
  "database": values.consts.db_name,
  "volume": values.storage.postgres_data,
} %}
{% set postgres = tpl.deps.postgres(values.consts.postgres_container_name, values.audiomuse.postgres_image_selector, pg_config, perm_container) %}
{% do postgres.container.add_network(audiomuse_net) %}

{% set redis_config = {
  "password": values.audiomuse.redis_password,
  "volume": {"type": "temporary", "volume_config": {"volume_name": "redis-data"}},
} %}
{% set redis = tpl.deps.redis(values.consts.redis_container_name, "redis_image", redis_config, perm_container) %}
{% do redis.container.add_network(audiomuse_net) %}

{% set flask = tpl.add_container(values.consts.flask_container_name, values.audiomuse.image_selector) %}
{% do flask.add_network(audiomuse_net) %}
{% do flask.set_user(values.run_as.user, values.run_as.group) %}
{% do flask.add_port(values.network.web_port, {"container_port": values.consts.internal_web_port}) %}
{% do flask.healthcheck.set_test("curl", {"port": values.consts.internal_web_port, "path": "/api/health"}) %}
{% do flask.environment.add_env("SERVICE_TYPE", "flask") %}

{% set worker = tpl.add_container(values.consts.worker_container_name, values.audiomuse.image_selector) %}
{% do worker.add_network(audiomuse_net) %}
{% do worker.healthcheck.disable() %}
{% do worker.set_user(values.run_as.user, values.run_as.group) %}
{% do worker.environment.add_env("USE_GPU_CLUSTERING", values.audiomuse.image_selector == "nvidia_image") %}
{% do worker.environment.add_env("SERVICE_TYPE", "worker") %}

{% set containers = [flask, worker] %}
{% for c in containers %}
  {% do c.depends.add_dependency(values.consts.postgres_container_name, "service_healthy") %}
  {% do c.depends.add_dependency(values.consts.redis_container_name, "service_healthy") %}

  {% do c.environment.add_env("POSTGRES_USER", values.consts.db_user) %}
  {% do c.environment.add_env("POSTGRES_PASSWORD", values.audiomuse.db_password) %}
  {% do c.environment.add_env("POSTGRES_DB", values.consts.db_name) %}
  {% do c.environment.add_env("POSTGRES_HOST", values.consts.postgres_container_name) %}
  {% do c.environment.add_env("POSTGRES_PORT", postgres.get_port()) %}
  {% do c.environment.add_env("REDIS_URL", redis.get_url("redis")) %}
  {% do c.environment.add_env("TEMP_DIR", values.consts.temp_dir) %}
  {% do c.environment.add_user_envs(values.audiomuse.additional_envs) %}
  {% do c.add_storage(values.consts.temp_dir, values.storage.temp_audio) %}
{% endfor %}
{% do perm_container.add_or_skip_action("temp_audio", values.storage.temp_audio, perms_config) %}

{% for store in values.storage.additional_storage %}
  {% do flask.add_storage(store.mount_path, store) %}
  {% do worker.add_storage(store.mount_path, store) %}
  {% do perm_container.add_or_skip_action(store.mount_path, store, perms_config) %}
{% endfor %}

{% if perm_container.has_actions() %}
  {% do perm_container.activate() %}
  {% do flask.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
  {% do worker.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
  {% do postgres.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
  {% do redis.container.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
{% endif %}

{% do tpl.portals.add(values.network.web_port) %}

{{ tpl.render() | tojson }}
