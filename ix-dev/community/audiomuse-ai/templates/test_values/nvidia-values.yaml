TZ: America/New_York

audiomuse:
  image_selector: nvidia_image
  db_password: SecureDBPassword123!
  redis_password: SecureRedisPassword123!
  gpus:
    use_all_gpus: true
  additional_envs: []

run_as:
  user: 568
  group: 568

ix_volumes:
  postgres_data: /opt/tests/mnt/audiomuse-ai/postgres_data
  redis_data: /opt/tests/mnt/audiomuse-ai/redis_data
  temp_audio: /opt/tests/mnt/audiomuse-ai/temp_audio

network:
  web_port:
    bind_mode: published
    port_number: 30428
    host_ips: []

storage:
  postgres_data:
    type: ix_volume
    ix_volume_config:
      dataset_name: postgres_data
      create_host_path: true
  redis_data:
    type: ix_volume
    ix_volume_config:
      dataset_name: redis_data
      create_host_path: true
  temp_audio:
    type: ix_volume
    ix_volume_config:
      dataset_name: temp_audio
      create_host_path: true
  additional_storage: []

resources:
  limits:
    cpus: 4
    memory: 8192
