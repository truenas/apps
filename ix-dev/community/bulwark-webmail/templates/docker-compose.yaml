{% set tpl = ix_lib.base.render.Render(values) %}

{% set c1 = tpl.add_container(values.consts.bulwark_container_name, "image") %}
{% set perm_container = tpl.deps.perms(values.consts.perms_container_name) %}
{% set perms_config = {"uid": values.run_as.user, "gid": values.run_as.group, "mode": "check"} %}

{% do c1.set_user(values.run_as.user, values.run_as.group) %}
{% do c1.healthcheck.set_test("curl", {"port": values.consts.internal_web_port, "path": "/"}) %}

{# Required: JMAP server URL #}
{% do c1.environment.add_env("JMAP_SERVER_URL", values.bulwark.jmap_server_url) %}

{# Optional: Application display name #}
{% if values.bulwark.app_name %}
  {% do c1.environment.add_env("APP_NAME", values.bulwark.app_name) %}
{% endif %}

{# Optional: Session secret — only set if user provided a non-empty value #}
{% if values.bulwark.session_secret %}
  {% do c1.environment.add_env("SESSION_SECRET", values.bulwark.session_secret) %}
{% endif %}

{# Telemetry toggle #}
{% do c1.environment.add_env("BULWARK_TELEMETRY", values.bulwark.telemetry) %}

{# User-defined additional environment variables #}
{% do c1.environment.add_user_envs(values.bulwark.additional_envs) %}

{% do c1.add_port(values.network.web_port, {"container_port": values.consts.internal_web_port}) %}

{% do c1.add_storage(values.consts.data_path, values.storage.data) %}
{% do perm_container.add_or_skip_action("data", values.storage.data, perms_config) %}

{% for store in values.storage.additional_storage %}
  {% do c1.add_storage(store.mount_path, store) %}
  {% do perm_container.add_or_skip_action(store.mount_path, store, perms_config) %}
{% endfor %}

{% if perm_container.has_actions() %}
  {% do perm_container.activate() %}
  {% do c1.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
{% endif %}

{% do tpl.portals.add(values.network.web_port) %}

{{ tpl.render() | tojson }}
