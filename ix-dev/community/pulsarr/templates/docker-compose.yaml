{% set tpl = ix_lib.base.render.Render(values) %}

{% set c1 = tpl.add_container(values.consts.pulsarr_container_name, "image") %}
{% set perm_config = {"uid": values.run_as.user, "gid": values.run_as.group, "mode": "check"} %}

{% do c1.set_user(values.run_as.user, values.run_as.group) %}
{% set web_port = values.network.web_port %}

{% do c1.healthcheck.set_test("wget", {"port": web_port.port_number, "path": "/health"}) %}

{% do c1.environment.add_env("listenPort", values.network.web_port.port_number) %}
{% do c1.environment.add_env("cookieSecured", values.network.cookies_secured) %}
{% do c1.environment.add_env("authenticationMethod", values.pulsarr.authentication) %}
{% do c1.environment.add_env("allowIframes", values.pulsarr.allow_iframes) %}
{% do c1.environment.add_env("enableRequestLogging", values.pulsarr.log_requests) %}

{% do c1.environment.add_user_envs(values.pulsarr.additional_envs) %}
{% do c1.add_port(web_port, {'container_port': web_port.port_number}) %}

{% do c1.add_storage("/app/data", values.storage.app_data) %}

{% for store in values.storage.additional_storage %}
  {% do c1.add_storage(store.mount_path, store) %}
{% endfor %}

{% do tpl.portals.add(values.network.web_port) %}

{{ tpl.render() | tojson }}
