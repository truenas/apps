{% set tpl = ix_lib.base.render.Render(values) %}

{% set c1 = tpl.add_container(values.consts.pulsarr_container_name, "image") %}
{% set perm_config = {"uid": values.run_as.user, "gid": values.run_as.group, "mode": "check"} %}

{% do c1.set_user(values.run_as.user, values.run_as.group) %}
{% do c1.healthcheck.set_test("wget", {"port": 3003, "path": "/health"}) %}

{% do c1.environment.add_env("port", values.network.web_port.port_number) %}
{% do c1.environment.add_user_envs(values.pulsarr.additional_envs) %}

{% set web_port = values.network.web_port %}
{% do c1.add_port(web_port, {'container_port': 3003}) %}

{% do c1.add_storage("/app/data", values.storage.config) %}

{% for store in values.storage.additional_storage %}
  {% do c1.add_storage(store.mount_path, store) %}
{% endfor %}

{% do tpl.portals.add(values.network.web_port) %}

{{ tpl.render() | tojson }}
