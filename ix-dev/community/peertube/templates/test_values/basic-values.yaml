resources:
  limits:
    cpus: 2.0
    memory: 4096

TZ: Etc/UTC

peertube:
  postgres_image_selector: postgres_17_image
  db_password: testdbpassword
  redis_password: testredispassword
  secret: supersecretkey1234567890abcdef1234567890abcdef
  admin_email: admin@example.com
  initial_root_password: TestRootPass123!
  webserver_hostname: peertube.example.com
  webserver_port: 443
  webserver_https: true
  additional_envs: []

smtp:
  enabled: false

network:
  web_port:
    bind_mode: published
    port_number: 9000
  rtmp_enabled: false
  rtmp_port:
    bind_mode: published
    port_number: 1935

ix_volumes:
  peertube_data: /opt/tests/mnt/peertube/peertube_data
  peertube_config: /opt/tests/mnt/peertube/peertube_config
  peertube_pg_data: /opt/tests/mnt/peertube/peertube_pg_data

storage:
  data:
    type: ix_volume
    ix_volume_config:
      dataset_name: peertube_data
      create_host_path: true
  config:
    type: ix_volume
    ix_volume_config:
      dataset_name: peertube_config
      create_host_path: true
  postgres_data:
    type: ix_volume
    ix_volume_config:
      dataset_name: peertube_pg_data
      create_host_path: true
  additional_storage: []

labels: []
