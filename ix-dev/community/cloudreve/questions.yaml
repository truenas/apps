groups:
  - name: Cloudreve Configuration
    description: Configure Cloudreve
  - name: User and Group Configuration
    description: Configure User and Group for Cloudreve
  - name: Network Configuration
    description: Configure Network for Cloudreve
  - name: Storage Configuration
    description: Configure Storage for Cloudreve
  - name: Labels Configuration
    description: Configure Labels for Cloudreve
  - name: Resources Configuration
    description: Configure Resources for Cloudreve

questions:
  - variable: cloudreve
    label: ""
    group: Cloudreve Configuration
    schema:
      type: dict
      attrs:
        - variable: db_password
          label: Database Password
          description: The password for the Cloudreve PostgreSQL database.
          schema:
            type: string
            default: ""
            required: true
            private: true
        - variable: redis_password
          label: Redis Password
          description: The password for the Cloudreve Redis cache.
          schema:
            type: string
            default: ""
            required: true
            private: true
        - variable: additional_envs
          label: Additional Environment Variables
          description: Additional environment variables for Cloudreve.
          schema:
            type: list
            default: []
            items:
              - variable: env
                label: Environment Variable
                schema:
                  type: dict
                  attrs:
                    - variable: name
                      label: Name
                      schema:
                        type: string
                        required: true
                    - variable: value
                      label: Value
                      schema:
                        type: string

  - variable: run_as
    label: ""
    group: User and Group Configuration
    schema:
      type: dict
      attrs:
        - variable: user
          label: User ID
          description: The user id that Cloudreve will run as.
          schema:
            type: int
            min: 2
            default: 568
            required: true
        - variable: group
          label: Group ID
          description: The group id that Cloudreve will run as.
          schema:
            type: int
            min: 2
            default: 568
            required: true

  - variable: network
    label: ""
    group: Network Configuration
    schema:
      type: dict
      attrs:
        - variable: web_port
          label: WebUI Port
          schema:
            type: dict
            attrs:
              - variable: bind_mode
                label: Port Bind Mode
                description: |
                  The bind mode for the port.</br>
                  - published: The port will be published on the host.</br>
                  - exposed: The port will be exposed to linked services.</br>
                  - none: The port will not be published or exposed.
                schema:
                  type: string
                  default: published
                  enum:
                    - value: published
                      description: Published
                    - value: exposed
                      description: Exposed
                    - value: ""
                      description: None
              - variable: port_number
                label: Port Number
                schema:
                  type: int
                  default: 5212
                  required: true
                  min: 1
                  max: 65535

  - variable: storage
    label: ""
    group: Storage Configuration
    schema:
      type: dict
      attrs:
        - variable: data
          label: Cloudreve Data Storage
          description: The path to store Cloudreve uploaded files.
          schema:
            type: dict
            attrs:
              - variable: type
                label: Type
                description: |
                  ixVolume: Is managed by the system.</br>
                  Host Path: Is a path on the host system.
                schema:
                  type: string
                  default: ix_volume
                  required: true
                  enum:
                    - value: host_path
                      description: Host Path
                    - value: ix_volume
                      description: ixVolume
              - variable: ix_volume_config
                label: ixVolume Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "ix_volume"]]
                  attrs:
                    - variable: dataset_name
                      label: Dataset Name
                      schema:
                        type: string
                        default: data
                        required: true
              - variable: host_path_config
                label: Host Path Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "host_path"]]
                  attrs:
                    - variable: path
                      label: Host Path
                      schema:
                        type: hostpath
                        required: true
        - variable: postgres_data
          label: PostgreSQL Data Storage
          description: The path to store PostgreSQL data.
          schema:
            type: dict
            attrs:
              - variable: type
                label: Type
                schema:
                  type: string
                  default: ix_volume
                  required: true
                  enum:
                    - value: host_path
                      description: Host Path
                    - value: ix_volume
                      description: ixVolume
              - variable: ix_volume_config
                label: ixVolume Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "ix_volume"]]
                  attrs:
                    - variable: dataset_name
                      label: Dataset Name
                      schema:
                        type: string
                        default: postgres_data
                        required: true
              - variable: host_path_config
                label: Host Path Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "host_path"]]
                  attrs:
                    - variable: path
                      label: Host Path
                      schema:
                        type: hostpath
                        required: true
        - variable: redis_data
          label: Redis Data Storage
          description: The path to store Redis data.
          schema:
            type: dict
            attrs:
              - variable: type
                label: Type
                schema:
                  type: string
                  default: ix_volume
                  required: true
                  enum:
                    - value: host_path
                      description: Host Path
                    - value: ix_volume
                      description: ixVolume
              - variable: ix_volume_config
                label: ixVolume Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "ix_volume"]]
                  attrs:
                    - variable: dataset_name
                      label: Dataset Name
                      schema:
                        type: string
                        default: redis_data
                        required: true
              - variable: host_path_config
                label: Host Path Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "host_path"]]
                  attrs:
                    - variable: path
                      label: Host Path
                      schema:
                        type: hostpath
                        required: true
        - variable: additional_storage
          label: Additional Storage
          description: Additional storage for Cloudreve.
          schema:
            type: list
            default: []
            items:
              - variable: storageEntry
                label: Storage Entry
                schema:
                  type: dict
                  attrs:
                    - variable: type
                      label: Type
                      schema:
                        type: string
                        default: host_path
                        required: true
                        enum:
                          - value: host_path
                            description: Host Path
                          - value: ix_volume
                            description: ixVolume
                          - value: tmpfs
                            description: Tmpfs
                    - variable: mount_path
                      label: Mount Path
                      schema:
                        type: path
                        required: true
                    - variable: host_path_config
                      label: Host Path Configuration
                      schema:
                        type: dict
                        show_if: [["type", "=", "host_path"]]
                        attrs:
                          - variable: path
                            label: Host Path
                            schema:
                              type: hostpath
                              required: true
                    - variable: ix_volume_config
                      label: ixVolume Configuration
                      schema:
                        type: dict
                        show_if: [["type", "=", "ix_volume"]]
                        attrs:
                          - variable: dataset_name
                            label: Dataset Name
                            schema:
                              type: string
                              required: true
                    - variable: tmpfs_config
                      label: Tmpfs Configuration
                      schema:
                        type: dict
                        show_if: [["type", "=", "tmpfs"]]
                        attrs:
                          - variable: size
                            label: Size (in MB)
                            schema:
                              type: int
                              required: true
                              min: 1

  - variable: labels
    label: ""
    group: Labels Configuration
    schema:
      type: list
      default: []
      items:
        - variable: label
          label: Label
          schema:
            type: dict
            attrs:
              - variable: key
                label: Key
                schema:
                  type: string
                  required: true
              - variable: value
                label: Value
                schema:
                  type: string
                  required: true
              - variable: containers
                label: Containers
                schema:
                  type: list
                  items:
                    - variable: container
                      label: Container
                      schema:
                        type: string
                        required: true
                        enum:
                          - value: cloudreve
                            description: cloudreve
                          - value: postgres
                            description: postgres
                          - value: redis
                            description: redis

  - variable: resources
    label: ""
    group: Resources Configuration
    schema:
      type: dict
      attrs:
        - variable: limits
          label: Limits
          schema:
            type: dict
            attrs:
              - variable: cpus
                label: CPUs
                schema:
                  type: int
                  default: 2
                  required: true
              - variable: memory
                label: Memory (in MB)
                schema:
                  type: int
                  default: 4096
                  required: true
