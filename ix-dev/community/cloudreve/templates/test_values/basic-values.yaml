resources:
  limits:
    cpus: 2.0
    memory: 4096

TZ: Etc/UTC

cloudreve:
  postgres_image_selector: postgres_17_image
  db_password: cloudreve-db-pass
  redis_password: cloudreve-redis-pass
  additional_envs: []

network:
  web_port:
    bind_mode: published
    port_number: 35212

run_as:
  user: 568
  group: 568

ix_volumes:
  data: /opt/tests/cloudreve/data
  postgres_data: /opt/tests/cloudreve/postgres-data
  redis_data: /opt/tests/cloudreve/redis-data

storage:
  data:
    type: ix_volume
    ix_volume_config:
      dataset_name: data
      create_host_path: true
  postgres_data:
    type: ix_volume
    ix_volume_config:
      dataset_name: postgres_data
      create_host_path: true
  redis_data:
    type: ix_volume
    ix_volume_config:
      dataset_name: redis_data
      create_host_path: true
  additional_storage: []
