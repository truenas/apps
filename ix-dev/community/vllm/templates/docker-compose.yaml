{% set tpl = ix_lib.base.render.Render(values) %}

{% set c1 = tpl.add_container(values.consts.vllm_container_name, values.vllm.image_selector) %}
{% set perm_container = tpl.deps.perms(values.consts.perms_container_name) %}
{% set perms_config = {"uid": values.run_as.user, "gid": values.run_as.group, "mode": "check"} %}

{% do c1.set_user(values.run_as.user, values.run_as.group) %}
{% if values.vllm.image_selector != "cpu_image" %}
  {% do c1.set_ipc_mode("host") %}
{% endif %}

{% do c1.healthcheck.set_test("http", {"port": values.network.web_port.port_number, "path": "/health"}) %}
{% do c1.healthcheck.set_start_period(120) %}

{% set cmd = ["--model", values.vllm.model_name] %}
{% if values.vllm.max_model_len %}
  {% do cmd.extend(["--max-model-len", values.vllm.max_model_len|string]) %}
{% endif %}
{% do c1.set_command(cmd) %}

{% do c1.environment.add_env("USER", "vllm") %}
{% do c1.environment.add_env("HOME", "/data") %}
{% do c1.environment.add_env("HF_HOME", "/data") %}
{% if values.vllm.hf_token %}
  {% do c1.environment.add_env("HF_TOKEN", values.vllm.hf_token) %}
{% endif %}
{% do c1.environment.add_user_envs(values.vllm.additional_envs) %}

{% do c1.add_port(values.network.web_port) %}

{% do c1.add_storage("/data", values.storage.data) %}
{% do perm_container.add_or_skip_action("data", values.storage.data, perms_config) %}

{% for store in values.storage.additional_storage %}
  {% do c1.add_storage(store.mount_path, store) %}
  {% do perm_container.add_or_skip_action(store.mount_path, store, perms_config) %}
{% endfor %}

{% if values.vllm.image_selector == "rocm_image" %}
  {% do c1.add_caps(["SYS_PTRACE"]) %}
  {% do c1.add_security_opt("seccomp", "unconfined") %}
{% endif %}

{% if perm_container.has_actions() %}
  {% do perm_container.activate() %}
  {% do c1.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
{% endif %}

{% do tpl.portals.add(values.network.web_port) %}

{{ tpl.render() | tojson }}
