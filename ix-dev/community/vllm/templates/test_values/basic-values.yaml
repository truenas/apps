resources:
  limits:
    cpus: 4.0
    memory: 8192

vllm:
  image_selector: image
  model_name: "Qwen/Qwen3-0.6B"
  hf_token: ""
  additional_envs: []

network:
  host_network: false
  web_port:
    bind_mode: published
    port_number: 30423

run_as:
  user: 568
  group: 568

ix_volumes:
  data: /opt/tests/mnt/vllm/data

storage:
  data:
    type: ix_volume
    ix_volume_config:
      dataset_name: data
      create_host_path: true
  additional_storage: []
