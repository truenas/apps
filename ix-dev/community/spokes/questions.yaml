groups:
  - name: Spokes Configuration
    description: Configure Spokes Settings
  - name: Network
    description: Network Configuration
  - name: Storage
    description: Storage Configuration

questions:
  - variable: spokes
    label: ""
    group: Spokes Configuration
    schema:
      type: dict
      attrs:
        - variable: master_password
          label: Master Password
          description: Master encryption password
          schema:
            type: string
            required: true
            private: true

  - variable: network
    label: ""
    group: Network
    schema:
      type: dict
      attrs:
        - variable: web_port
          label: Web UI Port
          description: Web interface port
          schema:
            type: dict
            attrs:
              - variable: port
                label: Port Number
                schema:
                  type: int
                  default: 8080
                  min: 1024
                  max: 65535
                  required: true

  - variable: storage
    label: ""
    group: Storage
    schema:
      type: dict
      attrs:
        - variable: data
          label: Spokes Data Storage
          description: Persistent data storage
          schema:
            type: dict
            attrs:
              - variable: type
                label: Type
                schema:
                  type: string
                  default: "ix_volume"
                  enum:
                    - value: "host_path"
                      description: "Host Path"
                    - value: "ix_volume"
                      description: "TrueNAS Dataset"
              - variable: ix_volume_config
                label: Dataset Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "ix_volume"]]
                  attrs:
                    - variable: acl_enable
                      label: Enable ACL
                      schema:
                        type: boolean
                        default: false
              - variable: host_path_config
                label: Host Path Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "host_path"]]
                  attrs:
                    - variable: path
                      label: Host Path
                      schema:
                        type: hostpath
                        required: true
