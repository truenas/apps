groups:
  - name: "Domain Locker Configuration"
    description: "Configure Domain Locker"
  - name: "User and Group Configuration"
    description: "Configure the user and group for Domain Locker"
  - name: "Network Configuration"
    description: "Configure the network for Domain Locker"
  - name: "Storage Configuration"
    description: "Configure the storage for Domain Locker"
  - name: "Labels Configuration"
    description: "Configure the labels for Domain Locker"
  - name: "Resources Configuration"
    description: "Configure the resources for Domain Locker"

questions:
  # Domain Locker Configuration
  - variable: domain_locker
    label: ""
    group: "Domain Locker Configuration"
    schema:
      type: dict
      attrs:
        - variable: postgres_image_selector
          label: Postgres Image
          description: Select the Postgres image to use.
          schema:
            type: string
            default: "postgres_15_image"
            enum:
              - value: "postgres_15_image"
                description: Postgres 15
        - variable: db_password
          label: Database Password
          description: The password for the database.
          schema:
            type: string
            required: true
            private: true
        - variable: additional_envs
          label: Additional Environment Variables
          description: Configure additional environment variables for Domain Locker.
          schema:
            type: list
            default: []
            items:
              - variable: env
                label: Environment Variable
                schema:
                  type: dict
                  attrs:
                    - variable: name
                      label: Name
                      schema:
                        type: string
                        required: true
                    - variable: value
                      label: Value
                      schema:
                        type: string
                        required: true

  # User and Group Configuration
  - variable: run_as
    label: ""
    group: "User and Group Configuration"
    schema:
      type: dict
      attrs:
        - variable: user
          label: User ID
          description: The user ID for Domain Locker.
          schema:
            type: int
            default: 568
            min: 568
            required: true
        - variable: group
          label: Group ID
          description: The group ID for Domain Locker.
          schema:
            type: int
            default: 568
            min: 568
            required: true

  # Network Configuration
  - variable: network
    label: ""
    group: "Network Configuration"
    schema:
      type: dict
      attrs:
        - variable: web_port
          label: WebUI Port
          description: The port for Domain Locker WebUI.
          schema:
            type: dict
            attrs:
              - variable: bind_mode
                label: Port Bind Mode
                description: The bind mode for the port.
                schema:
                  type: string
                  default: "published"
                  enum:
                    - value: "published"
                      description: Publish port on the host for external access
                    - value: "internal"
                      description: Only expose port internally
              - variable: port_number
                label: Port Number
                schema:
                  type: int
                  show_if: [["bind_mode", "=", "published"]]
                  default: 30120
                  min: 1
                  max: 65535
                  required: true
              - variable: host_ips
                label: Host IPs
                description: IPs on the host to bind this port.
                schema:
                  type: list
                  show_if: [["bind_mode", "=", "published"]]
                  default: []
                  items:
                    - variable: host_ip
                      label: Host IP
                      schema:
                        type: string
                        required: true
        - variable: networks
          label: Additional Networks
          description: Additional networks for Domain Locker.
          schema:
            type: list
            default: []
            items:
              - variable: network
                label: Network
                schema:
                  type: dict
                  attrs:
                    - variable: name
                      label: Network Name
                      schema:
                        type: string
                        required: true
                    - variable: container
                      label: Container
                      description: The container to attach the network to.
                      schema:
                        type: string
                        required: true
                        enum:
                          - value: "domain-locker"
                            description: Domain Locker container
                          - value: "postgres"
                            description: Postgres container

  # Storage Configuration
  - variable: storage
    label: ""
    group: "Storage Configuration"
    schema:
      type: dict
      attrs:
        - variable: postgres_data
          label: "Postgres Data Storage"
          description: "Configure storage for Postgres data."
          schema:
            type: dict
            attrs:
              - variable: type
                label: Type
                schema:
                  type: string
                  default: "ix_volume"
                  enum:
                    - value: "host_path"
                      description: Host Path
                    - value: "ix_volume"
                      description: ixVolume
              - variable: ix_volume_config
                label: ixVolume Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "ix_volume"]]
                  $ref:
                    - "normalize/ix_volume"
                  attrs:
                    - variable: acl_enable
                      label: Enable ACL
                      schema:
                        type: boolean
                        default: false
                    - variable: dataset_name
                      label: Dataset Name
                      schema:
                        type: string
                        required: true
                        hidden: true
                        default: "postgres_data"
                    - variable: acl_entries
                      label: ACL Entries
                      schema:
                        type: dict
                        show_if: [["acl_enable", "=", true]]
                        attrs: []
              - variable: host_path_config
                label: Host Path Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "host_path"]]
                  attrs:
                    - variable: acl_enable
                      label: Enable ACL
                      schema:
                        type: boolean
                        default: false
                    - variable: acl
                      label: ACL
                      schema:
                        type: dict
                        show_if: [["acl_enable", "=", true]]
                        attrs: []
                        $ref:
                          - "normalize/acl"
                    - variable: path
                      label: Host Path
                      schema:
                        type: hostpath
                        show_if: [["acl_enable", "=", false]]
                        required: true
        - variable: additional_storage
          label: Additional Storage
          description: Configure additional storage for Domain Locker.
          schema:
            type: list
            default: []
            items:
              - variable: storage_entry
                label: Storage Entry
                schema:
                  type: dict
                  attrs:
                    - variable: type
                      label: Type
                      schema:
                        type: string
                        required: true
                        enum:
                          - value: "host_path"
                            description: Host Path
                          - value: "ix_volume"
                            description: ixVolume
                          - value: "cifs"
                            description: CIFS (SMB) Share
                          - value: "nfs"
                            description: NFS Share
                    - variable: mount_path
                      label: Mount Path
                      description: The path inside the container to mount the storage.
                      schema:
                        type: path
                        required: true
                    - variable: ix_volume_config
                      label: ixVolume Configuration
                      schema:
                        type: dict
                        show_if: [["type", "=", "ix_volume"]]
                        $ref:
                          - "normalize/ix_volume"
                        attrs:
                          - variable: acl_enable
                            label: Enable ACL
                            schema:
                              type: boolean
                              default: false
                          - variable: dataset_name
                            label: Dataset Name
                            schema:
                              type: string
                              required: true
                              hidden: true
                              default: "additional_storage"
                          - variable: acl_entries
                            label: ACL Entries
                            schema:
                              type: dict
                              show_if: [["acl_enable", "=", true]]
                              attrs: []
                    - variable: host_path_config
                      label: Host Path Configuration
                      schema:
                        type: dict
                        show_if: [["type", "=", "host_path"]]
                        attrs:
                          - variable: acl_enable
                            label: Enable ACL
                            schema:
                              type: boolean
                              default: false
                          - variable: acl
                            label: ACL
                            schema:
                              type: dict
                              show_if: [["acl_enable", "=", true]]
                              attrs: []
                              $ref:
                                - "normalize/acl"
                          - variable: path
                            label: Host Path
                            schema:
                              type: hostpath
                              show_if: [["acl_enable", "=", false]]
                              required: true
                    - variable: cifs_config
                      label: CIFS Configuration
                      schema:
                        type: dict
                        show_if: [["type", "=", "cifs"]]
                        attrs:
                          - variable: server
                            label: Server
                            schema:
                              type: string
                              required: true
                          - variable: path
                            label: Path
                            schema:
                              type: string
                              required: true
                          - variable: username
                            label: Username
                            schema:
                              type: string
                              required: true
                          - variable: password
                            label: Password
                            schema:
                              type: string
                              required: true
                              private: true
                          - variable: domain
                            label: Domain
                            schema:
                              type: string
                    - variable: nfs_config
                      label: NFS Configuration
                      schema:
                        type: dict
                        show_if: [["type", "=", "nfs"]]
                        attrs:
                          - variable: server
                            label: Server
                            schema:
                              type: string
                              required: true
                          - variable: path
                            label: Path
                            schema:
                              type: string
                              required: true

  # Labels Configuration
  - variable: labels
    label: ""
    group: "Labels Configuration"
    schema:
      type: list
      default: []
      items:
        - variable: label
          label: Label
          schema:
            type: dict
            attrs:
              - variable: key
                label: Key
                schema:
                  type: string
                  required: true
              - variable: value
                label: Value
                schema:
                  type: string
                  required: true
              - variable: containers
                label: Containers
                description: Containers to apply the label to.
                schema:
                  type: list
                  items:
                    - variable: container
                      label: Container
                      schema:
                        type: string
                        required: true
                        enum:
                          - value: "domain-locker"
                            description: Domain Locker container
                          - value: "postgres"
                            description: Postgres container

  # Resources Configuration
  - variable: resources
    label: ""
    group: "Resources Configuration"
    schema:
      type: dict
      attrs:
        - variable: limits
          label: Resource Limits
          schema:
            type: dict
            attrs:
              - variable: cpus
                label: CPUs
                description: The number of CPUs to allocate.
                schema:
                  type: int
                  default: 2
                  required: true
              - variable: memory
                label: Memory (MB)
                description: The amount of memory to allocate in MB.
                schema:
                  type: int
                  default: 2048
                  required: true
