resources:
  limits:
    cpus: 2.0
    memory: 4096

swiparr:
  provider: tmdb
  provider_lock: true
  jellyfin_url: ""
  jellyfin_public_url: ""
  jellyfin_use_watchlist: false
  emby_url: ""
  emby_public_url: ""
  plex_url: ""
  plex_public_url: ""
  plex_token: ""
  tmdb_access_token: test-token
  tmdb_default_region: ""
  auth_secret: ""
  use_secure_cookies: false
  use_watchlist: false
  admin_username: ""
  jellyfin_admin_username: ""
  emby_admin_username: ""
  plex_admin_username: ""
  allow_private_provider_urls: false
  enable_debug: false
  additional_envs: []

network:
  host_network: false
  web_port:
    bind_mode: published
    port_number: 4321

run_as:
  user: 568
  group: 568

ix_volumes:
  config: /opt/tests/mnt/config

storage:
  config:
    type: ix_volume
    ix_volume_config:
      dataset_name: config
      create_host_path: true
  additional_storage:
    - type: anonymous
      mount_path: /scratchpad
      volume_config:
        nocopy: true
