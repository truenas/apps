{% set tpl = ix_lib.base.render.Render(values) %}

{% set c1 = tpl.add_container(values.consts.swiparr_container_name, "image") %}
{% set perm_container = tpl.deps.perms(values.consts.perms_container_name) %}
{% set perms_config = {"uid": values.run_as.user, "gid": values.run_as.group, "mode": "check"} %}

{% do c1.set_user(values.run_as.user, values.run_as.group) %}
{% do c1.healthcheck.set_test("curl", {"port": values.network.web_port.port_number, "path": "/api/health"}) %}

{# Core provider configuration #}
{% do c1.environment.add_env("PROVIDER", values.swiparr.provider) %}
{% do c1.environment.add_env("PROVIDER_LOCK", values.swiparr.provider_lock | string | lower) %}

{# Provider-specific URLs #}
{% if values.swiparr.jellyfin_url %}
  {% do c1.environment.add_env("JELLYFIN_URL", values.swiparr.jellyfin_url) %}
{% endif %}
{% if values.swiparr.jellyfin_public_url %}
  {% do c1.environment.add_env("JELLYFIN_PUBLIC_URL", values.swiparr.jellyfin_public_url) %}
{% endif %}
{% if values.swiparr.jellyfin_use_watchlist %}
  {% do c1.environment.add_env("JELLYFIN_USE_WATCHLIST", values.swiparr.jellyfin_use_watchlist | string | lower) %}
{% endif %}

{% if values.swiparr.emby_url %}
  {% do c1.environment.add_env("EMBY_URL", values.swiparr.emby_url) %}
{% endif %}
{% if values.swiparr.emby_public_url %}
  {% do c1.environment.add_env("EMBY_PUBLIC_URL", values.swiparr.emby_public_url) %}
{% endif %}

{% if values.swiparr.plex_url %}
  {% do c1.environment.add_env("PLEX_URL", values.swiparr.plex_url) %}
{% endif %}
{% if values.swiparr.plex_public_url %}
  {% do c1.environment.add_env("PLEX_PUBLIC_URL", values.swiparr.plex_public_url) %}
{% endif %}
{% if values.swiparr.plex_token %}
  {% do c1.environment.add_env("PLEX_TOKEN", values.swiparr.plex_token) %}
{% endif %}

{# TMDB-specific #}
{% if values.swiparr.tmdb_access_token %}
  {% do c1.environment.add_env("TMDB_ACCESS_TOKEN", values.swiparr.tmdb_access_token) %}
{% endif %}
{% if values.swiparr.tmdb_default_region %}
  {% do c1.environment.add_env("TMDB_DEFAULT_REGION", values.swiparr.tmdb_default_region) %}
{% endif %}

{# Auth and security #}
{% if values.swiparr.auth_secret %}
  {% do c1.environment.add_env("AUTH_SECRET", values.swiparr.auth_secret) %}
{% endif %}
{% if values.swiparr.use_secure_cookies %}
  {% do c1.environment.add_env("USE_SECURE_COOKIES", "true") %}
{% endif %}

{# Admin usernames #}
{% if values.swiparr.admin_username %}
  {% do c1.environment.add_env("ADMIN_USERNAME", values.swiparr.admin_username) %}
{% endif %}
{% if values.swiparr.jellyfin_admin_username %}
  {% do c1.environment.add_env("JELLYFIN_ADMIN_USERNAME", values.swiparr.jellyfin_admin_username) %}
{% endif %}
{% if values.swiparr.emby_admin_username %}
  {% do c1.environment.add_env("EMBY_ADMIN_USERNAME", values.swiparr.emby_admin_username) %}
{% endif %}
{% if values.swiparr.plex_admin_username %}
  {% do c1.environment.add_env("PLEX_ADMIN_USERNAME", values.swiparr.plex_admin_username) %}
{% endif %}

{# Security options #}
{% if values.swiparr.allow_private_provider_urls %}
  {% do c1.environment.add_env("ALLOW_PRIVATE_PROVIDER_URLS", "true") %}
{% endif %}

{# Debug #}
{% if values.swiparr.enable_debug %}
  {% do c1.environment.add_env("ENABLE_DEBUG", "true") %}
{% endif %}

{# Additional user-defined env vars #}
{% do c1.environment.add_user_envs(values.swiparr.additional_envs) %}

{# Port and storage #}
{% do c1.add_port(values.network.web_port) %}

{% do c1.add_storage("/app/data", values.storage.config) %}
{% do perm_container.add_or_skip_action("config", values.storage.config, perms_config) %}

{% for store in values.storage.additional_storage %}
  {% do c1.add_storage(store.mount_path, store) %}
  {% do perm_container.add_or_skip_action(store.mount_path, store, perms_config) %}
{% endfor %}

{% if perm_container.has_actions() %}
  {% do perm_container.activate() %}
  {% do c1.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
{% endif %}

{% do tpl.portals.add(values.network.web_port) %}

{{ tpl.render() | tojson }}
