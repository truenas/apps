groups:
  - name: Swiparr Configuration
    description: Configure Swiparr Settings
  - name: User and Group Configuration
    description: Configure User and Group for Swiparr
  - name: Network Configuration
    description: Configure Network for Swiparr
  - name: Storage Configuration
    description: Configure Storage for Swiparr
  - name: Labels Configuration
    description: Configure Labels for Swiparr
  - name: Resources Configuration
    description: Configure Resources for Swiparr

questions:
  - variable: TZ
    group: Swiparr Configuration
    label: Timezone
    schema:
      type: string
      default: Etc/UTC
      required: true
      $ref:
        - definitions/timezone

  - variable: swiparr
    label: ""
    group: Swiparr Configuration
    schema:
      type: dict
      attrs:
        - variable: provider
          label: Media Provider
          description: The media provider Swiparr connects to. Jellyfin, Emby, and Plex require server URLs. TMDB works standalone.
          schema:
            type: string
            default: jellyfin
            required: true
            enum:
              - value: jellyfin
                description: Jellyfin
              - value: emby
                description: Emby (Experimental)
              - value: plex
                description: Plex (Experimental)
              - value: tmdb
                description: TMDB (No Server Required)

        - variable: provider_lock
          label: Provider Lock
          description: If enabled, users cannot change the provider at runtime. Disable for BYOP (Bring Your Own Provider) mode.
          schema:
            type: boolean
            default: true

        - variable: jellyfin_url
          label: Jellyfin URL
          description: Internal URL of your Jellyfin server (e.g. http://jellyfin:8096)
          schema:
            type: string
            default: ""
            show_if: [["provider", "=", "jellyfin"]]

        - variable: jellyfin_public_url
          label: Jellyfin Public URL
          description: Public URL of your Jellyfin server for client-side links (optional)
          schema:
            type: string
            default: ""
            show_if: [["provider", "=", "jellyfin"]]

        - variable: jellyfin_use_watchlist
          label: Use Jellyfin Watchlist
          description: Use Watchlist instead of Favorites (requires Jellyfin Watchlist plugin)
          schema:
            type: boolean
            default: false
            show_if: [["provider", "=", "jellyfin"]]

        - variable: emby_url
          label: Emby URL
          description: Internal URL of your Emby server (e.g. http://emby:8096)
          schema:
            type: string
            default: ""
            show_if: [["provider", "=", "emby"]]

        - variable: emby_public_url
          label: Emby Public URL
          description: Public URL of your Emby server for client-side links (optional)
          schema:
            type: string
            default: ""
            show_if: [["provider", "=", "emby"]]

        - variable: plex_url
          label: Plex URL
          description: Internal URL of your Plex server (e.g. http://plex:32400)
          schema:
            type: string
            default: ""
            show_if: [["provider", "=", "plex"]]

        - variable: plex_public_url
          label: Plex Public URL
          description: Public URL of your Plex server for client-side links (optional)
          schema:
            type: string
            default: ""
            show_if: [["provider", "=", "plex"]]

        - variable: plex_token
          label: Plex Token
          description: Plex Admin/Access Token (optional)
          schema:
            type: string
            private: true
            default: ""
            show_if: [["provider", "=", "plex"]]

        - variable: tmdb_access_token
          label: TMDB Access Token
          description: TMDB API Read-Only Access Token. Get one at https://www.themoviedb.org/settings/api
          schema:
            type: string
            private: true
            default: ""
            show_if: [["provider", "=", "tmdb"]]

        - variable: tmdb_default_region
          label: TMDB Default Region
          description: Default TMDB region for streaming availability and certifications (ISO 3166-1, e.g. US, SE, DE)
          schema:
            type: string
            default: ""
            show_if: [["provider", "=", "tmdb"]]

        - variable: auth_secret
          label: Auth Secret
          description: Secret for session encryption (min 32 chars). Auto-generated if left empty, but setting a fixed value ensures sessions survive container restarts.
          schema:
            type: string
            private: true
            default: ""

        - variable: use_secure_cookies
          label: Use Secure Cookies
          description: Set to true for HTTPS deployments. Required when using a reverse proxy with TLS.
          schema:
            type: boolean
            default: false

        - variable: use_watchlist
          label: Default Watchlist Setting
          description: Default watchlist behavior (can be changed per-user in settings)
          schema:
            type: boolean
            default: false

        - variable: admin_username
          label: Global Admin Username
          description: Username to auto-grant admin privileges. First logged-in user becomes admin if unset.
          schema:
            type: string
            default: ""

        - variable: jellyfin_admin_username
          label: Jellyfin Admin Username
          description: Overrides Global Admin Username for Jellyfin
          schema:
            type: string
            default: ""
            show_if: [["provider", "=", "jellyfin"]]

        - variable: emby_admin_username
          label: Emby Admin Username
          description: Overrides Global Admin Username for Emby
          schema:
            type: string
            default: ""
            show_if: [["provider", "=", "emby"]]

        - variable: plex_admin_username
          label: Plex Admin Username
          description: Overrides Global Admin Username for Plex
          schema:
            type: string
            default: ""
            show_if: [["provider", "=", "plex"]]

        - variable: allow_private_provider_urls
          label: Allow Private Provider URLs
          description: Allow private/LAN URLs for user-supplied provider URLs in BYOP mode. Disabled by default for security.
          schema:
            type: boolean
            default: false
            show_if: [["provider_lock", "=", false]]

        - variable: enable_debug
          label: Enable Debug Logging
          description: Enable verbose debug logging and client-server error mapping
          schema:
            type: boolean
            default: false

        - variable: additional_envs
          label: Additional Environment Variables
          schema:
            type: list
            default: []
            items:
              - variable: env
                label: Environment Variable
                schema:
                  type: dict
                  attrs:
                    - variable: name
                      label: Name
                      schema:
                        type: string
                        required: true
                    - variable: value
                      label: Value
                      schema:
                        type: string

  - variable: run_as
    label: ""
    group: User and Group Configuration
    schema:
      type: dict
      attrs:
        - variable: user
          label: User ID
          description: The user id that Swiparr files will be owned by.
          schema:
            type: int
            min: 568
            default: 568
            required: true
        - variable: group
          label: Group ID
          description: The group id that Swiparr files will be owned by.
          schema:
            type: int
            min: 568
            default: 568
            required: true

  - variable: network
    label: ""
    group: Network Configuration
    schema:
      type: dict
      attrs:
        - variable: web_port
          label: WebUI Port
          schema:
            type: dict
            attrs:
              - variable: bind_mode
                label: Port Bind Mode
                description: |
                  The port bind mode.</br>
                  - Publish: The port will be published on the host for external access.</br>
                  - Expose: The port will be exposed for inter-container communication.</br>
                  - None: The port will not be exposed or published.</br>
                  Note: If the Dockerfile defines an EXPOSE directive,
                  the port will still be exposed for inter-container communication regardless of this setting.
                schema:
                  type: string
                  default: "published"
                  enum:
                    - value: "published"
                      description: Publish port on the host for external access
                    - value: "exposed"
                      description: Expose port for inter-container communication
                    - value: ""
                      description: None
              - variable: port_number
                label: Port Number
                schema:
                  type: int
                  default: 4321
                  min: 1
                  max: 65535
                  required: true
              - variable: host_ips
                label: Host IPs
                description: IPs on the host to bind this port
                schema:
                  type: list
                  show_if: [["bind_mode", "=", "published"]]
                  default: []
                  items:
                    - variable: host_ip
                      label: Host IP
                      schema:
                        type: string
                        required: true
                        $ref:
                          - definitions/node_bind_ip
        - variable: host_network
          label: Host Network
          description: |
            Bind to the host network. It's recommended to keep this disabled.
          schema:
            type: boolean
            default: false

  - variable: storage
    label: ""
    group: Storage Configuration
    schema:
      type: dict
      attrs:
        - variable: config
          label: Swiparr Data Storage
          description: The path to store Swiparr data (database, config, etc.)
          schema:
            type: dict
            attrs:
              - variable: type
                label: Type
                description: |
                  ixVolume: Is dataset created automatically by the system.</br>
                  Host Path: Is a path that already exists on the system.
                schema:
                  type: string
                  required: true
                  default: "ix_volume"
                  enum:
                    - value: "host_path"
                      description: Host Path (Path that already exists on the system)
                    - value: "ix_volume"
                      description: ixVolume (Dataset created automatically by the system)
              - variable: ix_volume_config
                label: ixVolume Configuration
                description: The configuration for the ixVolume dataset.
                schema:
                  type: dict
                  show_if: [["type", "=", "ix_volume"]]
                  $ref:
                    - "normalize/ix_volume"
                  attrs:
                    - variable: acl_enable
                      label: Enable ACL
                      description: Enable ACL for the storage.
                      schema:
                        type: boolean
                        default: false
                    - variable: dataset_name
                      label: Dataset Name
                      description: The name of the dataset to use for storage.
                      schema:
                        type: string
                        required: true
                        hidden: true
                        default: "config"
                    - variable: acl_entries
                      label: ACL Configuration
                      schema:
                        type: dict
                        show_if: [["acl_enable", "=", true]]
                        attrs: []
              - variable: host_path_config
                label: Host Path Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "host_path"]]
                  attrs:
                    - variable: acl_enable
                      label: Enable ACL
                      description: Enable ACL for the storage.
                      schema:
                        type: boolean
                        default: false
                    - variable: acl
                      label: ACL Configuration
                      schema:
                        type: dict
                        show_if: [["acl_enable", "=", true]]
                        attrs: []
                        $ref:
                          - "normalize/acl"
                    - variable: path
                      label: Host Path
                      description: The host path to use for storage.
                      schema:
                        type: hostpath
                        show_if: [["acl_enable", "=", false]]
                        required: true
        - variable: additional_storage
          label: Additional Storage
          schema:
            type: list
            default: []
            items:
              - variable: storageEntry
                label: Storage Entry
                schema:
                  type: dict
                  attrs:
                    - variable: type
                      label: Type
                      description: |
                        ixVolume: Is dataset created automatically by the system.</br>
                        Host Path: Is a path that already exists on the system.</br>
                        SMB Share: Is a SMB share that is mounted to as a volume.</br>
                        NFS Share: Is a NFS share that is mounted to as a volume.
                      schema:
                        type: string
                        required: true
                        default: "ix_volume"
                        enum:
                          - value: "host_path"
                            description: Host Path (Path that already exists on the system)
                          - value: "ix_volume"
                            description: ixVolume (Dataset created automatically by the system)
                          - value: "cifs"
                            description: SMB/CIFS Share (Mounts a volume to a SMB share)
                          - value: "nfs"
                            description: NFS Share (Mounts a volume to a NFS share)
                    - variable: read_only
                      label: Read Only
                      description: Mount the volume as read only.
                      schema:
                        type: boolean
                        default: false
                    - variable: mount_path
                      label: Mount Path
                      description: The path inside the container to mount the storage.
                      schema:
                        type: path
                        required: true
                    - variable: host_path_config
                      label: Host Path Configuration
                      schema:
                        type: dict
                        show_if: [["type", "=", "host_path"]]
                        attrs:
                          - variable: acl_enable
                            label: Enable ACL
                            description: Enable ACL for the storage.
                            schema:
                              type: boolean
                              default: false
                          - variable: acl
                            label: ACL Configuration
                            schema:
                              type: dict
                              show_if: [["acl_enable", "=", true]]
                              attrs: []
                              $ref:
                                - "normalize/acl"
                          - variable: path
                            label: Host Path
                            description: The host path to use for storage.
                            schema:
                              type: hostpath
                              show_if: [["acl_enable", "=", false]]
                              required: true
                    - variable: ix_volume_config
                      label: ixVolume Configuration
                      description: The configuration for the ixVolume dataset.
                      schema:
                        type: dict
                        show_if: [["type", "=", "ix_volume"]]
                        $ref:
                          - "normalize/ix_volume"
                        attrs:
                          - variable: acl_enable
                            label: Enable ACL
                            description: Enable ACL for the storage.
                            schema:
                              type: boolean
                              default: false
                          - variable: dataset_name
                            label: Dataset Name
                            description: The name of the dataset to use for storage.
                            schema:
                              type: string
                              required: true
                              default: "storage_entry"
                          - variable: acl_entries
                            label: ACL Configuration
                            schema:
                              type: dict
                              show_if: [["acl_enable", "=", true]]
                              attrs: []
                    - variable: cifs_config
                      label: SMB Configuration
                      description: The configuration for the SMB dataset.
                      schema:
                        type: dict
                        show_if: [["type", "=", "cifs"]]
                        attrs:
                          - variable: server
                            label: Server
                            description: The server to mount the SMB share.
                            schema:
                              type: string
                              required: true
                          - variable: path
                            label: Path
                            description: The path to mount the SMB share.
                            schema:
                              type: string
                              required: true
                          - variable: username
                            label: Username
                            description: The username to use for the SMB share.
                            schema:
                              type: string
                              required: true
                          - variable: password
                            label: Password
                            description: The password to use for the SMB share.
                            schema:
                              type: string
                              required: true
                              private: true
                          - variable: domain
                            label: Domain
                            description: The domain to use for the SMB share.
                            schema:
                              type: string
                    - variable: nfs_config
                      label: NFS Configuration
                      description: The configuration for the NFS dataset.
                      schema:
                        type: dict
                        show_if: [["type", "=", "nfs"]]
                        attrs:
                          - variable: server
                            label: Server
                            description: The server to mount the NFS share.
                            schema:
                              type: string
                              required: true
                          - variable: path
                            label: Path
                            description: The path to mount the NFS share.
                            schema:
                              type: string
                              required: true

  - variable: labels
    label: ""
    group: Labels Configuration
    schema:
      type: list
      default: []
      items:
        - variable: label
          label: Label
          schema:
            type: dict
            attrs:
              - variable: key
                label: Key
                schema:
                  type: string
                  required: true
              - variable: value
                label: Value
                schema:
                  type: string
                  required: true
              - variable: containers
                label: Containers
                description: Containers where the label should be applied
                schema:
                  type: list
                  items:
                    - variable: container
                      label: Container
                      schema:
                        type: string
                        required: true
                        enum:
                          - value: swiparr
                            description: swiparr

  - variable: resources
    label: ""
    group: Resources Configuration
    schema:
      type: dict
      attrs:
        - variable: limits
          label: Limits
          schema:
            type: dict
            attrs:
              - variable: cpus
                label: CPUs
                description: CPUs limit for Swiparr.
                schema:
                  type: int
                  default: 2
                  required: true
              - variable: memory
                label: Memory (in MB)
                description: Memory limit for Swiparr.
                schema:
                  type: int
                  default: 4096
                  required: true
