{% set tpl = ix_lib.base.render.Render(values) %}

{% set tm_net = tpl.networks.create_internal("teslamate-net") %}

{% set perm_container = tpl.deps.perms(values.consts.perms_container_name) %}
{% set perms_config = {"uid": values.consts.run_as_user, "gid": values.consts.run_as_group, "mode": "check"} %}

{# PostgreSQL #}
{% set pg_config = {
  "user": values.consts.db_user,
  "password": values.teslamate.db_password,
  "database": values.consts.db_name,
  "volume": values.storage.postgres_data,
} %}
{% set postgres = tpl.deps.postgres(values.consts.postgres_container_name, "postgres_image", pg_config, perm_container) %}
{% do postgres.container.add_network(tm_net) %}

{# TeslaMate #}
{% set tm = tpl.add_container(values.consts.teslamate_container_name, "image") %}
{% do tm.add_network(tm_net) %}
{% do tm.set_user(values.consts.run_as_user, values.consts.run_as_group) %}
{% do tm.depends.add_dependency(values.consts.postgres_container_name, "service_healthy") %}
{% do tm.healthcheck.set_test("wget", {"port": values.consts.internal_web_port, "path": "/"}) %}
{% do tm.add_port(values.network.web_port, {"container_port": values.consts.internal_web_port}) %}

{% do tm.environment.add_env("ENCRYPTION_KEY", values.teslamate.encryption_key) %}
{% do tm.environment.add_env("DATABASE_USER", values.consts.db_user) %}
{% do tm.environment.add_env("DATABASE_PASS", values.teslamate.db_password) %}
{% do tm.environment.add_env("DATABASE_NAME", values.consts.db_name) %}
{% do tm.environment.add_env("DATABASE_HOST", values.consts.postgres_container_name) %}
{% do tm.environment.add_env("DATABASE_PORT", postgres.get_port()) %}

{% if values.teslamate.disable_mqtt %}
  {% do tm.environment.add_env("DISABLE_MQTT", "true") %}
{% else %}
  {% do tm.environment.add_env("MQTT_HOST", values.teslamate.mqtt_host) %}
  {% do tm.environment.add_env("MQTT_PORT", values.teslamate.mqtt_port) %}
  {% if values.teslamate.mqtt_username %}
    {% do tm.environment.add_env("MQTT_USERNAME", values.teslamate.mqtt_username) %}
  {% endif %}
  {% if values.teslamate.mqtt_password %}
    {% do tm.environment.add_env("MQTT_PASSWORD", values.teslamate.mqtt_password) %}
  {% endif %}
{% endif %}

{% do tm.environment.add_user_envs(values.teslamate.additional_envs) %}

{% do tm.add_storage("/opt/app/import", values.storage.import_data) %}
{% do perm_container.add_or_skip_action("import_data", values.storage.import_data, perms_config) %}
{% for store in values.storage.additional_storage %}
  {% do tm.add_storage(store.mount_path, store) %}
  {% do perm_container.add_or_skip_action(store.mount_path, store, perms_config) %}
{% endfor %}

{# Grafana (always enabled, uses teslamate/grafana with pre-loaded dashboards) #}
{% set grafana = tpl.add_container(values.consts.grafana_container_name, "grafana_image") %}
{% do grafana.add_network(tm_net) %}
{% do grafana.set_user(values.consts.run_as_user, values.consts.run_as_group) %}
{% do grafana.depends.add_dependency(values.consts.postgres_container_name, "service_healthy") %}
{% do grafana.healthcheck.set_test("curl", {"port": values.consts.internal_grafana_port, "path": "/api/health"}) %}
{% do grafana.add_port(values.network.grafana_port, {"container_port": values.consts.internal_grafana_port}) %}

{% do grafana.environment.add_env("DATABASE_USER", values.consts.db_user) %}
{% do grafana.environment.add_env("DATABASE_PASS", values.teslamate.db_password) %}
{% do grafana.environment.add_env("DATABASE_NAME", values.consts.db_name) %}
{% do grafana.environment.add_env("DATABASE_HOST", values.consts.postgres_container_name) %}
{% do grafana.environment.add_env("DATABASE_PORT", postgres.get_port()) %}

{% do grafana.add_storage("/var/lib/grafana", values.storage.grafana_data) %}
{% do perm_container.add_or_skip_action("grafana_data", values.storage.grafana_data, perms_config) %}

{# TeslaMateAPI (optional) #}
{% set api = namespace(x=None) %}
{% if values.teslamate.enable_api %}
  {% set api.x = tpl.add_container(values.consts.api_container_name, "api_image") %}
  {% do api.x.add_network(tm_net) %}
  {% do api.x.set_user(values.consts.run_as_user, values.consts.run_as_group) %}
  {% do api.x.depends.add_dependency(values.consts.postgres_container_name, "service_healthy") %}
  {% do api.x.depends.add_dependency(values.consts.teslamate_container_name, "service_healthy") %}
  {% do api.x.healthcheck.set_test("wget", {"port": values.consts.internal_api_port, "path": "/api/ping"}) %}
  {% do api.x.add_port(values.network.api_port, {"container_port": values.consts.internal_api_port}) %}

  {% do api.x.environment.add_env("ENCRYPTION_KEY", values.teslamate.encryption_key) %}
  {% do api.x.environment.add_env("DATABASE_USER", values.consts.db_user) %}
  {% do api.x.environment.add_env("DATABASE_PASS", values.teslamate.db_password) %}
  {% do api.x.environment.add_env("DATABASE_NAME", values.consts.db_name) %}
  {% do api.x.environment.add_env("DATABASE_HOST", values.consts.postgres_container_name) %}
  {% do api.x.environment.add_env("DATABASE_PORT", postgres.get_port()) %}
  {% do api.x.environment.add_env("TESLAMATE_HOST", values.consts.teslamate_container_name) %}
  {% do api.x.environment.add_env("TESLAMATE_PORT", values.consts.internal_web_port) %}

  {% if values.teslamate.disable_mqtt %}
    {% do api.x.environment.add_env("DISABLE_MQTT", "true") %}
  {% else %}
    {% do api.x.environment.add_env("MQTT_HOST", values.teslamate.mqtt_host) %}
    {% do api.x.environment.add_env("MQTT_PORT", values.teslamate.mqtt_port) %}
    {% if values.teslamate.mqtt_username %}
      {% do api.x.environment.add_env("MQTT_USERNAME", values.teslamate.mqtt_username) %}
    {% endif %}
    {% if values.teslamate.mqtt_password %}
      {% do api.x.environment.add_env("MQTT_PASSWORD", values.teslamate.mqtt_password) %}
    {% endif %}
  {% endif %}

  {% if values.teslamate.api_token %}
    {% do api.x.environment.add_env("API_TOKEN", values.teslamate.api_token) %}
  {% else %}
    {% do api.x.environment.add_env("API_TOKEN_DISABLE", "true") %}
  {% endif %}
{% endif %}

{# Permissions #}
{% if perm_container.has_actions() %}
  {% do perm_container.activate() %}
  {% do tm.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
  {% do grafana.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
  {% do postgres.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
  {% if values.teslamate.enable_api %}
    {% do api.x.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
  {% endif %}
{% endif %}

{# Portals #}
{% do tpl.portals.add(values.network.web_port) %}
{% do tpl.portals.add(values.network.grafana_port, {"name": "Grafana"}) %}
{% if values.teslamate.enable_api %}
  {% do tpl.portals.add(values.network.api_port, {"name": "API"}) %}
{% endif %}

{{ tpl.render() | tojson }}
