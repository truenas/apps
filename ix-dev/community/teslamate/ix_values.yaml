images:
  image:
    repository: teslamate/teslamate
    tag: "3.0.0"
  grafana_init_image:
    repository: curlimages/curl
    tag: "8.13.0"
  api_image:
    repository: tobiasehlert/teslamateapi
    tag: "1.24.2"
  postgres_image:
    repository: postgres
    tag: 18.3-trixie
  container_utils_image:
    repository: ixsystems/container-utils
    tag: 1.0.2
  postgres_upgrade_image:
    repository: ixsystems/postgres-upgrade
    tag: 1.2.4

consts:
  teslamate_container_name: teslamate
  grafana_init_container_name: grafana-importer
  api_container_name: teslamate-api
  perms_container_name: permissions
  postgres_container_name: postgres
  db_user: teslamate
  db_name: teslamate
  run_as_user: 568
  run_as_group: 568
  internal_web_port: 4000
  internal_api_port: 8080
