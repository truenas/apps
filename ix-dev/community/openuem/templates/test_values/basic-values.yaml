resources:
  limits:
    cpus: 2.0
    memory: 4096

TZ: Etc/UTC

openuem:
  postgres_image_selector: postgres_18_image
  postgres_password: secret
  domain: openuem.example
  nats_subdomain: nats
  ocsp_subdomain: ocsp
  console_subdomain: console

  org_name: OpenUEM
  org_province: State
  org_locality: City
  org_address: Address
  org_country: Country
  additional_envs: []

run_as:
  user: 568
  group: 568

network:
  web_port:
    bind_mode: published
    port_number: 8080
  auth_port:
    bind_mode: published
    port_number: 8081
  nats_port:
    bind_mode: published
    port_number: 8082
  ocsp_port:
    bind_mode: published
    port_number: 8083

ix_volumes:
  nats_data: /opt/tests/mnt/openuem/nats_data
  certificates: /opt/tests/mnt/openuem/certificates
  postgres_data: /opt/tests/mnt/openuem.postgres_data

storage:
  nats_data:
    type: ix_volume
    ix_volume_config:
      dataset_name: nats_data
      create_host_path: true
  certificates:
    type: ix_volume
    ix_volume_config:
      dataset_name: certificates
      create_host_path: true
  postgres_data:
    type: ix_volume
    ix_volume_config:
      dataset_name: postgres_data
      create_host_path: true
  additional_storage: []
