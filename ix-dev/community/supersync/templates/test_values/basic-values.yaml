resources:
  limits:
    cpus: 2.0
    memory: 4096

supersync:
  jwt_secret: "test-secret-minimum-32-characters-long"
  public_url: "http://localhost:31900"
  cors_origins: "https://app.super-productivity.com"
  webauthn_rp_id: "localhost"
  db_password: "testpassword123"
  smtp_host: ""
  additional_envs: []

network:
  web_port:
    bind_mode: published
    port_number: 31900

ix_volumes:
  test_supersync_data: /opt/tests/mnt/supersync/data
  test_supersync_pgdata: /opt/tests/mnt/supersync/pgdata

storage:
  data:
    type: ix_volume
    ix_volume_config:
      dataset_name: test_supersync_data
      create_host_path: true
  postgres_data:
    type: ix_volume
    ix_volume_config:
      dataset_name: test_supersync_pgdata
      create_host_path: true
