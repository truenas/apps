{% set tpl = ix_lib.base.render.Render(values) %}

{# Permissions container config #}
{% set perms = tpl.deps.perms(values.consts.perms_container_name) %}
{% set perms_config = {"uid": values.run_as.user, "gid": values.run_as.group, "mode": "check"} %}
{% do perms.add_or_skip_action("data", values.storage.data, perms_config) %}

{# Postgres dependency #}
{% set pg_config = {
  "user": values.consts.db_user,
  "password": values.supersync.db_password,
  "database": values.consts.db_name,
  "volume": values.storage.postgres_data,
} %}
{% set postgres = tpl.deps.postgres(values.consts.postgres_container_name, "postgres_image", pg_config, perms) %}

{# Main app container #}
{% set app = tpl.add_container(values.consts.supersync_container_name, "image") %}
{% do app.set_user(values.run_as.user, values.run_as.group) %}
{% do app.healthcheck.set_test("curl", {"port": values.network.web_port.port_number, "path": "/api/health"}) %}

{% do app.environment.add_env("NODE_ENV", "production") %}
{% do app.environment.add_env("PORT", values.network.web_port.port_number) %}
{% do app.environment.add_env("JWT_SECRET", values.supersync.jwt_secret) %}
{% do app.environment.add_env("PUBLIC_URL", values.supersync.public_url) %}
{% do app.environment.add_env("CORS_ORIGINS", values.supersync.cors_origins) %}
{% do app.environment.add_env("WEBAUTHN_RP_ID", values.supersync.webauthn_rp_id) %}
{% do app.environment.add_env("WEBAUTHN_ORIGIN", values.supersync.public_url) %}
{% do app.environment.add_env("DATA_DIR", "/data") %}
{% do app.environment.add_env("DATABASE_URL", postgres.get_url("postgresql")) %}

{% if values.supersync.smtp_host %}
{% do app.environment.add_env("SMTP_HOST", values.supersync.smtp_host) %}
{% do app.environment.add_env("SMTP_PORT", values.supersync.smtp_port) %}
{% do app.environment.add_env("SMTP_USER", values.supersync.smtp_user) %}
{% do app.environment.add_env("SMTP_PASS", values.supersync.smtp_pass) %}
{% do app.environment.add_env("SMTP_FROM", values.supersync.smtp_from) %}
{% endif %}

{% for env in values.supersync.additional_envs %}
{% do app.environment.add_env(env.name, env.value) %}
{% endfor %}

{% do app.add_port(values.network.web_port) %}
{% do app.add_storage("/data", values.storage.data) %}
{% do app.depends.add_dependency(values.consts.postgres_container_name, "service_healthy") %}

{% if perms.has_actions() %}
{% do perms.activate() %}
{% do app.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
{% endif %}

{% do tpl.portals.add(values.network.web_port) %}
{{ tpl.render() | tojson }}
