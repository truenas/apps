{% from "macros/config.sh" import config %}
{% set tpl = ix_lib.base.render.Render(values) %}

{% set nb_net = tpl.networks.create_internal("nb-net") %}

{% set addr = tpl.funcs.url_to_dict(values.netbird.address) %}
{% set addr_port = "%s://%s:%d"|format(addr.scheme, addr.host, addr.port) %}
{% set addr_port = addr_port.lstrip(":443").lstrip(":80") %}

{% set cfg = tpl.add_container(values.consts.cfg_container_name, "yq_image") %}
{% set srv = tpl.add_container(values.consts.netbird_container_name, "image") %}
{% set dashboard = tpl.add_container(values.consts.dashboard_container_name, "dashboard_image") %}

{% set perm_container = tpl.deps.perms(values.consts.perms_container_name) %}
{% set perm_config = {"uid": values.run_as.user, "gid": values.run_as.group, "mode": "check"} %}

{% set payload = [
  {"server.dataDir": values.consts.data_path},
  {"server.store.engine": "sqlite"},
  {"server.healthcheckAddress": ":9000"},
  {"server.stunPorts": [values.network.stun_port.port_number]},
  {"server.listenAddress": ":%d"|format(values.network.mgmt_port.port_number)},

  {"server.exposedAddress": values.netbird.address},
  {"server.store.encryptionKey": values.netbird.store_encryption_key},
  {"server.authSecret": values.netbird.auth_secret},
  {"server.auth.issuer": "%s/oauth2"|format(addr_port)},
  {"server.auth.cliRedirectURIs[0]": "http://localhost:53000/"},
  {"server.auth.signKeyRefreshEnabled": true},
  {"server.auth.dashboardRedirectURIs[0]": "%s/nb-auth"|format(addr_port)},
  {"server.auth.dashboardRedirectURIs[1]": "%s/nb-silent-auth"|format(addr_port)},
] %}

{% do cfg.set_user(values.run_as.user, values.run_as.group) %}
{% do cfg.setup_as_helper() %}
{% do cfg.add_storage(values.consts.config_path, values.storage.config) %}
{% do cfg.configs.add("config.sh", config(values=values, cfg=payload), "/setup/config.sh", "0755") %}
{% do cfg.set_entrypoint(["/setup/config.sh"]) %}

{% do srv.add_network(nb_net) %}
{% do dashboard.add_network(nb_net) %}

{% do srv.depends.add_dependency(values.consts.cfg_container_name, "service_completed_successfully") %}
{% do srv.set_user(values.run_as.user, values.run_as.group) %}
{% do srv.set_command(["--config", "%s/%s"|format(values.consts.config_path, values.consts.config_file_name)]) %}
{% do srv.healthcheck.set_test("http", {"port": values.network.mgmt_port.port_number, "path": "/api/instance"}) %}
{% do srv.environment.add_user_envs(values.netbird.additional_envs) %}

{% do dashboard.add_caps(["NET_BIND_SERVICE", "CHOWN", "FOWNER", "DAC_OVERRIDE", "SETUID", "SETGID"]) %}
{% do dashboard.depends.add_dependency(values.consts.netbird_container_name, "service_healthy") %}
{% do dashboard.healthcheck.set_test("http", {"port": 80, "path": "/"}) %}
{% do dashboard.environment.add_env("NETBIRD_MGMT_API_ENDPOINT", addr_port) %}
{% do dashboard.environment.add_env("NETBIRD_MGMT_GRPC_API_ENDPOINT", addr_port) %}
{% do dashboard.environment.add_env("AUTH_AUTHORITY", "%s/oauth2"|format(addr_port)) %}
{% do dashboard.environment.add_env("AUTH_REDIRECT_URI", "/nb-auth") %}
{% do dashboard.environment.add_env("AUTH_SILENT_REDIRECT_URI", "/nb-silent-auth") %}
{% if values.netbird.embedded_idp %}
  {% do dashboard.environment.add_env("AUTH_CLIENT_ID", "netbird-dashboard") %}
  {% do dashboard.environment.add_env("AUTH_AUDIENCE", "netbird-dashboard") %}
  {% do dashboard.environment.add_env("USE_AUTH0", "false") %}
  {% do dashboard.environment.add_env("AUTH_SUPPORTED_SCOPES", ["openid", "profile", "email", "groups"]|join(" ")) %}
{% endif %}
{% do dashboard.environment.add_user_envs(values.netbird.additional_envs) %}

{% do srv.add_port(values.network.mgmt_port) %}
{% do srv.add_port(values.network.stun_port) %}

{% do dashboard.add_port(values.network.web_port, {"container_port": 80}) %}

{% do srv.add_storage(values.consts.data_path, values.storage.data) %}
{% do perm_container.add_or_skip_action("data", values.storage.data, perm_config) %}

{% do srv.add_storage(values.consts.config_path, values.storage.config) %}
{% do perm_container.add_or_skip_action("config", values.storage.config, perm_config) %}

{% for store in values.storage.additional_storage %}
  {% do srv.add_storage(store.mount_path, store) %}
  {% do perm_container.add_or_skip_action(store.mount_path, store, perm_config) %}
{% endfor %}

{% if perm_container.has_actions() %}
  {% do perm_container.activate() %}
  {% do srv.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
  {% do cfg.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
{% endif %}

{% do tpl.portals.add(values.network.web_port) %}

{{ tpl.render() | tojson }}
