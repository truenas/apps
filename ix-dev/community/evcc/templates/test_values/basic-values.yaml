resources:
  limits:
    cpus: 2.0
    memory: 512

evcc:
  devices: []
  additional_envs: []

run_as:
  user: 0
  group: 0

network:
  host_network: false
  additional_ports: []
  web_port:
    bind_mode: published
    port_number: 37070

ix_volumes:
  config: /opt/tests/mnt/evcc/config
  data: /opt/tests/mnt/evcc/data

storage:
  config:
    type: ix_volume
    ix_volume_config:
      dataset_name: config
      create_host_path: true
  data:
    type: ix_volume
    ix_volume_config:
      dataset_name: data
      create_host_path: true
  additional_storage: []
