groups:
  - name: SparkyFitness Configuration
    description: Configure SparkyFitness
  - name: User and Group Configuration
    description: Configure User and Group for SparkyFitness
  - name: Network Configuration
    description: Configure Network for SparkyFitness
  - name: Storage Configuration
    description: Configure Storage for SparkyFitness
  - name: Labels Configuration
    description: Configure Labels for SparkyFitness
  - name: Resources Configuration
    description: Configure Resources for SparkyFitness

questions:
  - variable: TZ
    group: SparkyFitness Configuration
    label: Timezone
    schema:
      type: string
      default: Etc/UTC
      required: true
      $ref:
        - definitions/timezone

  - variable: sparkyfitness
    label: ""
    group: SparkyFitness Configuration
    schema:
      type: dict
      attrs:
        - variable: postgres_image_selector
          label: Postgres Image (CAUTION)
          description: |
            If you are changing this after the postgres directory has been initialized,</br>
            STOP! and make sure you have a backup of your data.</br>
            Changing this will trigger a one-way database upgrade.</br>
            You can only select newer versions of postgres.</br>
            Selecting an older version will refuse to start.</br>
            If something goes wrong, you will have to restore from backup.
          schema:
            type: string
            default: postgres_18_image
            required: true
            enum:
              - value: postgres_18_image
                description: Postgres 18

        - variable: db_password
          label: Database Password
          description: The password for the SparkyFitness database.
          schema:
            type: string
            default: ""
            required: true
            private: true

        - variable: api_encryption_key
          label: API Encryption Key
          description: |
            A 64-character hex string used for encrypting sensitive data.</br>
            Generate with: <code>openssl rand -hex 32</code></br>
            WARNING: Changing this after setup will invalidate external data source integrations.
          schema:
            type: string
            default: ""
            min_length: 64
            required: true
            private: true

        - variable: better_auth_secret
          label: Auth Secret
          description: |
            A strong secret key for session signing and 2FA.</br>
            Generate with: <code>openssl rand -base64 32</code></br>
            WARNING: Changing this after 2FA setup will lock out users with TOTP enabled.
          schema:
            type: string
            default: ""
            min_length: 32
            required: true
            private: true

        - variable: frontend_url
          label: Frontend URL
          description: |
            The URL that SparkyFitness will be accessible from.</br>
            Example:</br>
            http://server.ip:30840</br>
            https://fitness.example.com
          schema:
            type: uri
            default: ""
            required: true

        - variable: admin_email
          label: Admin Email (Optional)
          description: |
            A user with this email will automatically be granted admin access on startup.
          schema:
            type: string
            default: ""

        - variable: disable_signup
          label: Disable New User Signup
          description: Prevent new users from self-registering.
          schema:
            type: boolean
            default: false

        - variable: additional_envs
          label: Additional Environment Variables
          schema:
            type: list
            default: []
            items:
              - variable: env
                label: Environment Variable
                schema:
                  type: dict
                  attrs:
                    - variable: name
                      label: Name
                      schema:
                        type: string
                        required: true
                    - variable: value
                      label: Value
                      schema:
                        type: string

  - variable: run_as
    label: ""
    group: User and Group Configuration
    schema:
      type: dict
      attrs:
        - variable: user
          label: User ID
          description: The user id that SparkyFitness files will be owned by.
          schema:
            type: int
            min: 568
            default: 568
            required: true
        - variable: group
          label: Group ID
          description: The group id that SparkyFitness files will be owned by.
          schema:
            type: int
            min: 568
            default: 568
            required: true

  - variable: network
    label: ""
    group: Network Configuration
    schema:
      type: dict
      attrs:
        - variable: web_port
          label: WebUI Port
          schema:
            type: dict
            attrs:
              - variable: bind_mode
                label: Port Bind Mode
                description: |
                  The port bind mode.</br>
                  - Publish: The port will be published on the host for external access.</br>
                  - Expose: The port will be exposed for inter-container communication.</br>
                  - None: The port will not be exposed or published.</br>
                  Note: If the Dockerfile defines an EXPOSE directive,
                  the port will still be exposed for inter-container communication regardless of this setting.
                schema:
                  type: string
                  default: "published"
                  enum:
                    - value: "published"
                      description: Publish port on the host for external access
                    - value: "exposed"
                      description: Expose port for inter-container communication
                    - value: ""
                      description: None
              - variable: port_number
                label: Port Number
                schema:
                  type: int
                  default: 30840
                  min: 1
                  max: 65535
                  required: true
              - variable: host_ips
                label: Host IPs
                description: IPs on the host to bind this port
                schema:
                  type: list
                  show_if: [["bind_mode", "=", "published"]]
                  default: []
                  items:
                    - variable: host_ip
                      label: Host IP
                      schema:
                        type: string
                        required: true
                        $ref:
                          - definitions/node_bind_ip
        - variable: networks
          label: Networks
          description: The docker networks to join
          schema:
            type: list
            default: []
            items:
              - variable: network
                label: Network
                schema:
                  type: dict
                  attrs:
                    - variable: name
                      label: Name
                      description: |
                        The name of the network to join.</br>
                        The network must already exist.
                      schema:
                        type: string
                        default: ""
                        required: true
                    - variable: containers
                      label: Containers
                      description: The containers to add to this network.
                      schema:
                        type: list
                        items:
                          - variable: container
                            label: Container
                            schema:
                              type: dict
                              attrs:
                                - variable: name
                                  label: Container Name
                                  schema:
                                    type: string
                                    required: true
                                    enum:
                                      - value: sparkyfitness-frontend
                                        description: sparkyfitness-frontend
                                      - value: sparkyfitness-server
                                        description: sparkyfitness-server
                                      - value: sparkyfitness-db
                                        description: sparkyfitness-db
                                - variable: config
                                  label: Container Network Configuration
                                  schema:
                                    type: dict
                                    attrs:
                                      - variable: aliases
                                        label: Aliases (Optional)
                                        description: The network aliases to use for this container on this network.
                                        schema:
                                          type: list
                                          default: []
                                          items:
                                            - variable: alias
                                              label: Alias
                                              schema:
                                                type: string
                                      - variable: interface_name
                                        label: Interface Name (Optional)
                                        description: The network interface name to use for this network
                                        schema:
                                          type: string
                                      - variable: mac_address
                                        label: MAC Address (Optional)
                                        description: The MAC address to use for this network interface.
                                        schema:
                                          type: string
                                      - variable: ipv4_address
                                        label: IPv4 Address (Optional)
                                        description: The IPv4 address to use for this network interface.
                                        schema:
                                          type: string
                                      - variable: ipv6_address
                                        label: IPv6 Address (Optional)
                                        description: The IPv6 address to use for this network interface.
                                        schema:
                                          type: string
                                      - variable: gw_priority
                                        label: Gateway Priority (Optional)
                                        description: Indicates the priority of the gateway for this network interface.
                                        schema:
                                          type: int
                                          "null": true
                                      - variable: priority
                                        label: Priority (Optional)
                                        description: Indicates in which order Compose connects the service's containers to its networks.
                                        schema:
                                          type: int
                                          "null": true

  - variable: storage
    label: ""
    group: Storage Configuration
    schema:
      type: dict
      attrs:
        - variable: postgres_data
          label: Postgres Data Storage
          schema:
            type: dict
            attrs:
              - variable: type
                label: Type
                description: |
                  ixVolume: Is dataset created automatically by the system.</br>
                  Host Path: Is a path that already exists on the system.
                schema:
                  type: string
                  required: true
                  default: "ix_volume"
                  enum:
                    - value: "host_path"
                      description: Host Path (Path that already exists on the system)
                    - value: "ix_volume"
                      description: ixVolume (Dataset created automatically by the system)
              - variable: ix_volume_config
                label: ixVolume Configuration
                description: The configuration for the ixVolume dataset.
                schema:
                  type: dict
                  show_if: [["type", "=", "ix_volume"]]
                  $ref:
                    - "normalize/ix_volume"
                  attrs:
                    - variable: acl_enable
                      label: Enable ACL
                      description: Enable ACL for the storage.
                      schema:
                        type: boolean
                        default: false
                    - variable: dataset_name
                      label: Dataset Name
                      description: The name of the dataset to use for storage.
                      schema:
                        type: string
                        required: true
                        hidden: true
                        default: "postgres_data"
                    - variable: acl_entries
                      label: ACL Configuration
                      schema:
                        type: dict
                        show_if: [["acl_enable", "=", true]]
                        attrs: []
              - variable: host_path_config
                label: Host Path Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "host_path"]]
                  attrs:
                    - variable: acl_enable
                      label: Enable ACL
                      description: Enable ACL for the storage.
                      schema:
                        type: boolean
                        default: false
                    - variable: acl
                      label: ACL Configuration
                      schema:
                        type: dict
                        show_if: [["acl_enable", "=", true]]
                        attrs: []
                        $ref:
                          - "normalize/acl"
                    - variable: path
                      label: Host Path
                      description: The host path to use for storage.
                      schema:
                        type: hostpath
                        show_if: [["acl_enable", "=", false]]
                        required: true

        - variable: backup
          label: Backup Storage
          schema:
            type: dict
            attrs:
              - variable: type
                label: Type
                description: |
                  ixVolume: Is dataset created automatically by the system.</br>
                  Host Path: Is a path that already exists on the system.
                schema:
                  type: string
                  required: true
                  default: "ix_volume"
                  enum:
                    - value: "host_path"
                      description: Host Path (Path that already exists on the system)
                    - value: "ix_volume"
                      description: ixVolume (Dataset created automatically by the system)
              - variable: ix_volume_config
                label: ixVolume Configuration
                description: The configuration for the ixVolume dataset.
                schema:
                  type: dict
                  show_if: [["type", "=", "ix_volume"]]
                  $ref:
                    - "normalize/ix_volume"
                  attrs:
                    - variable: acl_enable
                      label: Enable ACL
                      description: Enable ACL for the storage.
                      schema:
                        type: boolean
                        default: false
                    - variable: dataset_name
                      label: Dataset Name
                      description: The name of the dataset to use for storage.
                      schema:
                        type: string
                        required: true
                        hidden: true
                        default: "backup"
                    - variable: acl_entries
                      label: ACL Configuration
                      schema:
                        type: dict
                        show_if: [["acl_enable", "=", true]]
                        attrs: []
              - variable: host_path_config
                label: Host Path Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "host_path"]]
                  attrs:
                    - variable: acl_enable
                      label: Enable ACL
                      description: Enable ACL for the storage.
                      schema:
                        type: boolean
                        default: false
                    - variable: acl
                      label: ACL Configuration
                      schema:
                        type: dict
                        show_if: [["acl_enable", "=", true]]
                        attrs: []
                        $ref:
                          - "normalize/acl"
                    - variable: path
                      label: Host Path
                      description: The host path to use for storage.
                      schema:
                        type: hostpath
                        show_if: [["acl_enable", "=", false]]
                        required: true

        - variable: uploads
          label: Uploads Storage
          description: Storage for profile pictures and exercise images.
          schema:
            type: dict
            attrs:
              - variable: type
                label: Type
                description: |
                  ixVolume: Is dataset created automatically by the system.</br>
                  Host Path: Is a path that already exists on the system.
                schema:
                  type: string
                  required: true
                  default: "ix_volume"
                  enum:
                    - value: "host_path"
                      description: Host Path (Path that already exists on the system)
                    - value: "ix_volume"
                      description: ixVolume (Dataset created automatically by the system)
              - variable: ix_volume_config
                label: ixVolume Configuration
                description: The configuration for the ixVolume dataset.
                schema:
                  type: dict
                  show_if: [["type", "=", "ix_volume"]]
                  $ref:
                    - "normalize/ix_volume"
                  attrs:
                    - variable: acl_enable
                      label: Enable ACL
                      description: Enable ACL for the storage.
                      schema:
                        type: boolean
                        default: false
                    - variable: dataset_name
                      label: Dataset Name
                      description: The name of the dataset to use for storage.
                      schema:
                        type: string
                        required: true
                        hidden: true
                        default: "uploads"
                    - variable: acl_entries
                      label: ACL Configuration
                      schema:
                        type: dict
                        show_if: [["acl_enable", "=", true]]
                        attrs: []
              - variable: host_path_config
                label: Host Path Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "host_path"]]
                  attrs:
                    - variable: acl_enable
                      label: Enable ACL
                      description: Enable ACL for the storage.
                      schema:
                        type: boolean
                        default: false
                    - variable: acl
                      label: ACL Configuration
                      schema:
                        type: dict
                        show_if: [["acl_enable", "=", true]]
                        attrs: []
                        $ref:
                          - "normalize/acl"
                    - variable: path
                      label: Host Path
                      description: The host path to use for storage.
                      schema:
                        type: hostpath
                        show_if: [["acl_enable", "=", false]]
                        required: true

        - variable: additional_storage
          label: Additional Storage
          description: Additional storage to mount in the SparkyFitness server container.
          schema:
            type: list
            default: []
            items:
              - variable: storage_entry
                label: Storage Entry
                schema:
                  type: dict
                  attrs:
                    - variable: type
                      label: Type
                      description: |
                        ixVolume: Is dataset created automatically by the system.</br>
                        Host Path: Is a path that already exists on the system.</br>
                        SMB Share: Is a SMB share that is mounted to the system.</br>
                        NFS Share: Is a NFS share that is mounted to the system.</br>
                        Tmpfs: Is a temporary filesystem that is stored in memory.
                      schema:
                        type: string
                        required: true
                        default: "ix_volume"
                        enum:
                          - value: "host_path"
                            description: Host Path (Path that already exists on the system)
                          - value: "ix_volume"
                            description: ixVolume (Dataset created automatically by the system)
                          - value: "smb"
                            description: SMB Share
                          - value: "nfs"
                            description: NFS Share
                          - value: "tmpfs"
                            description: Tmpfs
                    - variable: mount_path
                      label: Mount Path
                      description: The path inside the container to mount the storage.
                      schema:
                        type: path
                        required: true
                    - variable: ix_volume_config
                      label: ixVolume Configuration
                      schema:
                        type: dict
                        show_if: [["type", "=", "ix_volume"]]
                        $ref:
                          - "normalize/ix_volume"
                        attrs:
                          - variable: acl_enable
                            label: Enable ACL
                            schema:
                              type: boolean
                              default: false
                          - variable: dataset_name
                            label: Dataset Name
                            schema:
                              type: string
                              required: true
                          - variable: acl_entries
                            label: ACL Configuration
                            schema:
                              type: dict
                              show_if: [["acl_enable", "=", true]]
                              attrs: []
                    - variable: host_path_config
                      label: Host Path Configuration
                      schema:
                        type: dict
                        show_if: [["type", "=", "host_path"]]
                        attrs:
                          - variable: acl_enable
                            label: Enable ACL
                            schema:
                              type: boolean
                              default: false
                          - variable: acl
                            label: ACL Configuration
                            schema:
                              type: dict
                              show_if: [["acl_enable", "=", true]]
                              attrs: []
                              $ref:
                                - "normalize/acl"
                          - variable: path
                            label: Host Path
                            schema:
                              type: hostpath
                              show_if: [["acl_enable", "=", false]]
                              required: true
                    - variable: smb_config
                      label: SMB Configuration
                      schema:
                        type: dict
                        show_if: [["type", "=", "smb"]]
                        attrs:
                          - variable: server
                            label: Server
                            schema:
                              type: string
                              required: true
                          - variable: path
                            label: Path
                            schema:
                              type: string
                              required: true
                          - variable: username
                            label: Username
                            schema:
                              type: string
                              required: true
                          - variable: password
                            label: Password
                            schema:
                              type: string
                              required: true
                              private: true
                          - variable: domain
                            label: Domain
                            schema:
                              type: string
                          - variable: options
                            label: Options
                            schema:
                              type: string
                    - variable: nfs_config
                      label: NFS Configuration
                      schema:
                        type: dict
                        show_if: [["type", "=", "nfs"]]
                        attrs:
                          - variable: server
                            label: Server
                            schema:
                              type: string
                              required: true
                          - variable: path
                            label: Path
                            schema:
                              type: string
                              required: true
                          - variable: options
                            label: Options
                            schema:
                              type: string
                    - variable: tmpfs_config
                      label: Tmpfs Configuration
                      schema:
                        type: dict
                        show_if: [["type", "=", "tmpfs"]]
                        attrs:
                          - variable: size
                            label: Size (MiB)
                            schema:
                              type: int
                              "null": true

  - variable: labels
    group: Labels Configuration
    label: ""
    schema:
      type: list
      default: []
      items:
        - variable: label
          label: Label
          schema:
            type: dict
            attrs:
              - variable: key
                label: Key
                schema:
                  type: string
                  required: true
              - variable: value
                label: Value
                schema:
                  type: string
                  required: true
              - variable: containers
                label: Containers
                description: Containers to apply the label to.
                schema:
                  type: list
                  items:
                    - variable: container
                      label: Container
                      schema:
                        type: string
                        required: true
                        enum:
                          - value: sparkyfitness-frontend
                            description: sparkyfitness-frontend
                          - value: sparkyfitness-server
                            description: sparkyfitness-server
                          - value: sparkyfitness-db
                            description: sparkyfitness-db

  - variable: resources
    group: Resources Configuration
    label: ""
    schema:
      type: dict
      attrs:
        - variable: limits
          label: Limits
          schema:
            type: dict
            attrs:
              - variable: cpus
                label: CPUs
                schema:
                  type: float
                  default: 2.0
                  required: true
              - variable: memory
                label: Memory (in MB)
                schema:
                  type: int
                  default: 4096
                  required: true
              - variable: gpu_configuration
                label: GPU Configuration
                schema:
                  type: dict
                  $ref:
                    - "definitions/gpu_configuration"
                  attrs: []
