{% set tpl = ix_lib.base.render.Render(values) %}

{% set sparky_net = tpl.networks.create_internal("sparky-net") %}

{% set perm_container = tpl.deps.perms(values.consts.perms_container_name) %}
{% set perms_config = {"uid": values.run_as.user, "gid": values.run_as.group, "mode": "check"} %}

{% set pg_config = {
  "user": values.consts.db_user,
  "password": values.sparkyfitness.db_password,
  "database": values.consts.db_name,
  "volume": values.storage.postgres_data,
} %}
{% set postgres = tpl.deps.postgres(values.consts.sparkyfitness_db_container_name, values.sparkyfitness.postgres_image_selector, pg_config, perm_container) %}
{% do postgres.container.add_network(sparky_net) %}

{% set server = tpl.add_container(values.consts.sparkyfitness_server_container_name, "server_image") %}
{% do server.set_user(values.run_as.user, values.run_as.group) %}
{% do server.add_network(sparky_net) %}
{% do server.depends.add_dependency(values.consts.sparkyfitness_db_container_name, "service_healthy") %}
{% do server.healthcheck.set_test("wget", {"port": values.consts.server_port, "path": "/"}) %}

{% do server.environment.add_env("NODE_ENV", "production") %}
{% do server.environment.add_env("SPARKY_FITNESS_DB_HOST", values.consts.sparkyfitness_db_container_name) %}
{% do server.environment.add_env("SPARKY_FITNESS_DB_PORT", "5432") %}
{% do server.environment.add_env("SPARKY_FITNESS_DB_NAME", values.consts.db_name) %}
{% do server.environment.add_env("SPARKY_FITNESS_DB_USER", values.consts.db_user) %}
{% do server.environment.add_env("SPARKY_FITNESS_DB_PASSWORD", values.sparkyfitness.db_password) %}
{% do server.environment.add_env("SPARKY_FITNESS_APP_DB_USER", values.consts.db_user) %}
{% do server.environment.add_env("SPARKY_FITNESS_APP_DB_PASSWORD", values.sparkyfitness.db_password) %}
{% do server.environment.add_env("SPARKY_FITNESS_API_ENCRYPTION_KEY", values.sparkyfitness.api_encryption_key) %}
{% do server.environment.add_env("BETTER_AUTH_SECRET", values.sparkyfitness.better_auth_secret) %}
{% do server.environment.add_env("SPARKY_FITNESS_FRONTEND_URL", values.sparkyfitness.frontend_url) %}
{% do server.environment.add_env("SPARKY_FITNESS_FORCE_EMAIL_LOGIN", "true") %}
{% if values.sparkyfitness.admin_email %}
  {% do server.environment.add_env("SPARKY_FITNESS_ADMIN_EMAIL", values.sparkyfitness.admin_email) %}
{% endif %}
{% if values.sparkyfitness.disable_signup %}
  {% do server.environment.add_env("SPARKY_FITNESS_DISABLE_SIGNUP", "true") %}
{% endif %}
{% do server.environment.add_user_envs(values.sparkyfitness.additional_envs) %}

{% do server.add_storage("/app/SparkyFitnessServer/backup", values.storage.backup) %}
{% do server.add_storage("/app/SparkyFitnessServer/uploads", values.storage.uploads) %}
{% do perm_container.add_or_skip_action("backup", values.storage.backup, perms_config) %}
{% do perm_container.add_or_skip_action("uploads", values.storage.uploads, perms_config) %}

{% for store in values.storage.additional_storage %}
  {% do server.add_storage(store.mount_path, store) %}
  {% do perm_container.add_or_skip_action(store.mount_path, store, perms_config) %}
{% endfor %}

{% set frontend = tpl.add_container(values.consts.sparkyfitness_frontend_container_name, "image") %}
{% do frontend.add_network(sparky_net) %}
{% do frontend.depends.add_dependency(values.consts.sparkyfitness_server_container_name, "service_healthy") %}
{% do frontend.healthcheck.set_test("wget", {"port": 80, "path": "/"}) %}
{% do frontend.environment.add_env("SPARKY_FITNESS_SERVER_HOST", values.consts.sparkyfitness_server_container_name) %}
{% do frontend.environment.add_env("SPARKY_FITNESS_SERVER_PORT", values.consts.server_port) %}
{% do frontend.add_port({"port_number": values.network.web_port.port_number, "bind_mode": values.network.web_port.bind_mode, "container_port": 80, "host_ips": values.network.web_port.host_ips}) %}

{% if perm_container.has_actions() %}
  {% do perm_container.activate() %}
  {% do server.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
  {% do postgres.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
{% endif %}

{% do tpl.portals.add(values.network.web_port) %}

{{ tpl.render() | tojson }}
