groups:
  - name: wallabag Configuration
    description: Configure wallabag
  - name: User and Group Configuration
    description: Configure User and Group for the container
  - name: Network Configuration
    description: Configure Network for the container
  - name: Storage Configuration
    description: Configure Storage for the container
  - name: Resources Configuration
    description: Configure Resources for the container

questions:
  - variable: wallabag
    label: ""
    group: wallabag Configuration
    schema:
      type: dict
      attrs:
        - variable: domain_name
          label: Domain Name
          description: |
            The domain name or IP address wallabag is accessed by (e.g., https://wallabag.example.com).</br>
            It is highly recommended to set this, as it is used to generate internal URLs correctly.
          schema:
            type: string
            default: "http://localhost:30430"
            required: true

# Run As Configuration
  - variable: run_as
    label: ""
    group: User and Group Configuration
    schema:
      type: dict
      attrs:
        - variable: user
          label: User ID
          description: The User ID that the container will run as
          schema:
            type: int
            default: 568
            required: true
        - variable: group
          label: Group ID
          description: The Group ID that the container will run as
          schema:
            type: int
            default: 568
            required: true

# Network Configuration
  - variable: network
    label: ""
    group: Network Configuration
    schema:
      type: dict
      attrs:
        - variable: host_network
          label: Host Network
          description: Enable Host Network
          schema:
            type: boolean
            default: false
            required: true
            show_if: [["never", "=", "true"]]
        - variable: web_port
          label: wallabag Web Port
          description: Port to access the wallabag web interface
          schema:
            type: dict
            attrs:
              - variable: port_number
                label: Port Number
                description: The port number to expose
                schema:
                  type: int
                  default: 30430
                  required: true
              - variable: bind_mode
                label: Bind Mode
                description: How the port should be bound
                schema:
                  type: string
                  default: published
                  enum:
                    - value: published
                      description: Published
                  required: true
                  show_if: [["never", "=", "true"]]

# Storage Configuration
  - variable: storage
    label: ""
    group: Storage Configuration
    schema:
      type: dict
      attrs:
        - variable: data
          label: Data Storage
          description: Storage for wallabag database and data
          schema:
            type: dict
            attrs:
              - variable: type
                label: Type
                schema:
                  type: string
                  required: true
                  default: "ix_volume"
                  enum:
                    - value: "host_path"
                      description: Host Path
                    - value: "ix_volume"
                      description: ixVolume
              - variable: ix_volume_config
                label: ixVolume Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "ix_volume"]]
                  $ref:
                    - "normalize/ix_volume"
                  attrs:
                    - variable: dataset_name
                      label: Dataset Name
                      schema:
                        type: string
                        required: true
                        default: "data"
              - variable: host_path_config
                label: Host Path Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "host_path"]]
                  attrs:
                    - variable: host_path
                      label: Host Path
                      schema:
                        type: hostpath
                        required: true
        - variable: images
          label: Images Storage
          description: Storage for downloaded images
          schema:
            type: dict
            attrs:
              - variable: type
                label: Type
                schema:
                  type: string
                  required: true
                  default: "ix_volume"
                  enum:
                    - value: "host_path"
                      description: Host Path
                    - value: "ix_volume"
                      description: ixVolume
              - variable: ix_volume_config
                label: ixVolume Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "ix_volume"]]
                  $ref:
                    - "normalize/ix_volume"
                  attrs:
                    - variable: dataset_name
                      label: Dataset Name
                      schema:
                        type: string
                        required: true
                        default: "images"
              - variable: host_path_config
                label: Host Path Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "host_path"]]
                  attrs:
                    - variable: host_path
                      label: Host Path
                      schema:
                        type: hostpath
                        required: true

