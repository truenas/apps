{% set tpl = ix_lib.base.render.Render(values) %}

{% set c1 = tpl.add_container(values.consts.wallabag_container_name, "image") %}
{% do c1.healthcheck.set_test("wget", {"port": values.consts.internal_web_port}) %}

{% do c1.environment.add_env("SYMFONY__ENV__DOMAIN_NAME", values.wallabag.domain_name) %}

{% do c1.add_port(values.network.web_port, {"container_port": values.consts.internal_web_port}) %}

{% do c1.add_storage(values.consts.data_path, values.storage.data) %}
{% do c1.add_storage(values.consts.images_path, values.storage.images) %}

{% do tpl.portals.add(values.network.web_port) %}

{{ tpl.render() | tojson }}
