resources:
  limits:
    cpus: 2.0
    memory: 4096

openclaw:
  auth_mode: trusted-proxy
  gateway_token: test-token
  gateway_password: test-password
  proxy_trusted_proxies: ["127.0.0.1"]
  proxy_user_header: x-forwarded-user
  proxy_required_headers: [x-forwarded-proto]
  proxy_allow_users: []
  additional_envs: []

run_as:
  user: 568
  group: 568

network:
  gateway_port:
    bind_mode: published
    port_number: 8085

ix_volumes:
  config: /opt/tests/mnt/openclaw/config

storage:
  config:
    type: ix_volume
    ix_volume_config:
      dataset_name: config
      create_host_path: true
