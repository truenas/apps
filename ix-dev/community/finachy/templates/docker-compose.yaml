{% set tpl = ix_lib.base.render.Render(values) %}

{% set app = tpl.add_container(values.consts.finachy_container_name, "image") %}
{% set sidekiq = tpl.add_container(values.consts.sidekiq_container_name, "image") %}
{% set migrations = tpl.add_container(values.consts.migrations_container_name, "image") %}
{% set perm_container = tpl.deps.perms(values.consts.perms_container_name) %}
{% set perms_config = {"uid": values.run_as.user, "gid": values.run_as.group, "mode": "check"} %}

{% set pg_config = {
  "user": values.consts.db_user,
  "password": values.finachy.db_password,
  "database": values.consts.db_name,
  "volume": values.storage.postgres_data,
} %}
{% set postgres = tpl.deps.postgres(
  values.consts.postgres_container_name,
  values.finachy.postgres_image_selector,
  pg_config, perm_container
) %}

{% set redis_config = {
  "password": values.finachy.redis_password,
  "volume": {"type": "temporary", "volume_config": {"volume_name": "redis-data"}},
} %}
{% set redis = tpl.deps.redis(values.consts.redis_container_name, "redis_image", redis_config, perm_container) %}

{# Construct Redis URL with database index /1 as required by Finachy #}
{% set redis_url = redis.get_url("redis") + "/1" %}

{% set containers = [app, sidekiq, migrations] %}
{% for c in containers %}
  {% do c.environment.add_env("RAILS_ENV", "production") %}
  {% do c.environment.add_env("SECRET_KEY_BASE", values.finachy.secret_key_base) %}
  {% do c.environment.add_env("SELF_HOSTED", "true") %}
  {% do c.environment.add_env("RAILS_FORCE_SSL", "false") %}
  {% do c.environment.add_env("RAILS_ASSUME_SSL", "false") %}
  {% do c.environment.add_env("DB_HOST", values.consts.postgres_container_name) %}
  {% do c.environment.add_env("DB_PORT", "5432") %}
  {% do c.environment.add_env("POSTGRES_USER", values.consts.db_user) %}
  {% do c.environment.add_env("POSTGRES_PASSWORD", values.finachy.db_password) %}
  {% do c.environment.add_env("POSTGRES_DB", values.consts.db_name) %}
  {% do c.environment.add_env("REDIS_URL", redis_url) %}

  {% do c.environment.add_user_envs(values.finachy.additional_envs) %}
  {% do c.add_storage("/rails/storage", values.storage.data) %}

  {% for store in values.storage.additional_storage %}
    {% do c.add_storage(store.mount_path, store) %}
    {% do perm_container.add_or_skip_action(store.mount_path, store, perms_config) %}
  {% endfor %}
{% endfor %}

{% do perm_container.add_or_skip_action("data", values.storage.data, perms_config) %}

{# Migrations #}
{% do migrations.depends.add_dependency(values.consts.postgres_container_name, "service_healthy") %}
{% do migrations.depends.add_dependency(values.consts.redis_container_name, "service_healthy") %}
{% do migrations.setup_as_helper(disable_network=false) %}
{% do migrations.set_entrypoint(["/bin/bash", "-c"]) %}
{% do migrations.set_command(["./bin/rails db:prepare"]) %}

{# Sidekiq #}
{% do sidekiq.healthcheck.set_custom_test(["CMD", "bash", "-c", "cat /proc/1/cmdline | tr '\\0' ' ' | grep -q sidekiq"]) %}
{% do sidekiq.set_entrypoint(["/bin/bash", "-c"]) %}
{% do sidekiq.set_command(["bundle exec sidekiq"]) %}
{% do sidekiq.depends.add_dependency(values.consts.postgres_container_name, "service_healthy") %}
{% do sidekiq.depends.add_dependency(values.consts.redis_container_name, "service_healthy") %}
{% do sidekiq.depends.add_dependency(values.consts.migrations_container_name, "service_completed_successfully") %}

{# Application #}
{% do app.healthcheck.set_test("curl", {"port": values.consts.internal_web_port, "path": "/up"}) %}
{% do app.depends.add_dependency(values.consts.postgres_container_name, "service_healthy") %}
{% do app.depends.add_dependency(values.consts.redis_container_name, "service_healthy") %}
{% do app.depends.add_dependency(values.consts.migrations_container_name, "service_completed_successfully") %}

{% do app.add_port(values.network.web_port, {"container_port": values.consts.internal_web_port}) %}

{% if perm_container.has_actions() %}
  {% do perm_container.activate() %}
  {% do postgres.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
  {% do redis.container.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
  {% for c in containers %}
    {% do c.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
  {% endfor %}
{% endif %}

{% do tpl.portals.add(values.network.web_port) %}

{{ tpl.render() | tojson }}
