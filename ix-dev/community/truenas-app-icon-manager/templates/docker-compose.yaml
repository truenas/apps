{% set tpl = ix_lib.base.render.Render(values) %}

{% set c1 = tpl.add_container(values.consts.truenas_app_icon_manager_container_name, "image") %}

{% do c1.healthcheck.set_test("wget", {"port": values.consts.internal_web_port, "path": "/api/health"}) %}

{% do c1.environment.add_env("NODE_ENV", "production") %}
{% do c1.environment.add_env("PORT", values.consts.internal_web_port) %}
{% do c1.environment.add_env("CONFIG_DIR", values.consts.config_path) %}
{% do c1.environment.add_env("IX_APPS_PATH", values.consts.ix_apps_path) %}
{% do c1.environment.add_env("METADATA_FILE", values.consts.metadata_file) %}
{% do c1.environment.add_env("POLL_INTERVAL_SECONDS", values.truenas_app_icon_manager.poll_interval_seconds) %}
{% do c1.environment.add_env("MAX_ICON_SIZE_BYTES", values.truenas_app_icon_manager.max_icon_size_bytes) %}
{% do c1.environment.add_env("BACKUP_RETENTION_COUNT", values.truenas_app_icon_manager.backup_retention_count) %}
{% do c1.environment.add_user_envs(values.truenas_app_icon_manager.additional_envs) %}

{% do c1.add_port(values.network.web_port, {"container_port": values.consts.internal_web_port}) %}

{% do c1.add_storage(values.consts.config_path, values.storage.config) %}
{% do c1.add_storage(values.consts.ix_apps_path, values.storage.ix_apps) %}

{% for store in values.storage.additional_storage %}
  {% do c1.add_storage(store.mount_path, store) %}
{% endfor %}

{% do tpl.portals.add(values.network.web_port) %}

{{ tpl.render() | tojson }}
