images:
  image:
    repository: ghcr.io/heyputer/puter
    tag: "26.06.1"
  container_utils_image:
    repository: ixsystems/container-utils
    tag: 1.0.2
  valkey_image:
    repository: valkey/valkey
    tag: "8-alpine"
  mariadb_image:
    repository: mariadb
    tag: "11"
  dynamodb_image:
    repository: amazon/dynamodb-local
    tag: latest
  s3_image:
    repository: rustfs/rustfs
    tag: latest
  s3_init_image:
    repository: amazon/aws-cli
    tag: latest

consts:
  puter_container_name: puter
  valkey_container_name: valkey
  mariadb_container_name: mariadb
  dynamodb_container_name: dynamo
  s3_container_name: s3
  s3_init_container_name: s3-init
  perms_container_name: permissions
  internal_web_port: 4100
  internal_valkey_port: 6379
  internal_mariadb_port: 3306
  internal_dynamodb_port: 8000
  internal_s3_port: 9000
  db_user: puter
  db_name: puter
  run_user: 1000
  run_group: 1000